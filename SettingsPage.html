<div id="settingsPage" class="page">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Settings</div>
    </div>
    <div class="settings-grid">
      <div>
        <h3 style="margin-bottom:16px;font-size:15px">Departments</h3>
        <div class="inline-flex mb-12">
          <input type="text" class="form-control" id="newDept" placeholder="New department name">
          <button class="btn btn-primary" onclick="addDepartment()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><circle cx="10" cy="10" r="9"/><path d="M10 6v8"/><path d="M6 10h8"/></svg> Add</button>
        </div>
        <div id="deptList"></div>

        <h3 style="margin:24px 0 16px;font-size:15px">Areas</h3>
        <div class="inline-flex mb-12">
          <input type="text" class="form-control" id="newArea" placeholder="New area">
          <button class="btn btn-primary" onclick="saveSimpleSetting('areas', 'newArea')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><circle cx="10" cy="10" r="9"/><path d="M10 6v8"/><path d="M6 10h8"/></svg> Add</button>
        </div>
        <div id="areasList"></div>

        <h3 style="margin:24px 0 16px;font-size:15px">Lines</h3>
        <div class="inline-flex mb-12">
          <input type="text" class="form-control" id="newLine" placeholder="New line">
          <button class="btn btn-primary" onclick="saveSimpleSetting('lines', 'newLine')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><circle cx="10" cy="10" r="9"/><path d="M10 6v8"/><path d="M6 10h8"/></svg> Add</button>
        </div>
        <div id="linesList"></div>
      </div>
      <div>
        <h3 style="margin-bottom:16px;font-size:15px">Job Types</h3>
        <div class="inline-flex mb-12">
          <input type="text" class="form-control" id="newJobType" placeholder="New job type">
          <button class="btn btn-primary" onclick="saveSimpleSetting('jobTypes', 'newJobType')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><circle cx="10" cy="10" r="9"/><path d="M10 6v8"/><path d="M6 10h8"/></svg> Add</button>
        </div>
        <div id="jobTypesList"></div>

        <h3 style="margin:24px 0 16px;font-size:15px">Priorities</h3>
        <div class="inline-flex mb-12">
          <input type="text" class="form-control" id="newPriority" placeholder="New priority">
          <button class="btn btn-primary" onclick="saveSimpleSetting('priorities', 'newPriority')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><circle cx="10" cy="10" r="9"/><path d="M10 6v8"/><path d="M6 10h8"/></svg> Add</button>
        </div>
        <div id="prioritiesList"></div>

        <h3 style="margin:24px 0 16px;font-size:15px">Machine Types</h3>
        <div class="inline-flex mb-12">
          <input type="text" class="form-control" id="newMachineType" placeholder="New machine type">
          <button class="btn btn-primary" onclick="saveSimpleSetting('machineTypes', 'newMachineType')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><circle cx="10" cy="10" r="9"/><path d="M10 6v8"/><path d="M6 10h8"/></svg> Add</button>
        </div>
        <div id="machineTypesList"></div>
      </div>
    </div>
  </div>

  <div class="card" id="themeSettingsCard">
    <div class="card-header">
      <div class="card-title">Theme & Display</div>
    </div>
    <div class="theme-section">
      <label>Theme Mode</label>
      <div class="theme-options" id="themeModeOptions">
        <button class="theme-option" data-value="dark" onclick="setThemePref('mode','dark')">Dark</button>
        <button class="theme-option" data-value="light" onclick="setThemePref('mode','light')">Light</button>
        <button class="theme-option" data-value="auto" onclick="setThemePref('mode','auto')">Auto</button>
      </div>
    </div>
    <div class="theme-section">
      <label>Accent Color</label>
      <div class="theme-options" id="accentColorOptions">
        <button class="color-swatch" data-value="#6366f1" style="background:#6366f1" onclick="setThemePref('accentColor','#6366f1')" title="Indigo"></button>
        <button class="color-swatch" data-value="#3b82f6" style="background:#3b82f6" onclick="setThemePref('accentColor','#3b82f6')" title="Blue"></button>
        <button class="color-swatch" data-value="#06b6d4" style="background:#06b6d4" onclick="setThemePref('accentColor','#06b6d4')" title="Cyan"></button>
        <button class="color-swatch" data-value="#22c55e" style="background:#22c55e" onclick="setThemePref('accentColor','#22c55e')" title="Green"></button>
        <button class="color-swatch" data-value="#f59e0b" style="background:#f59e0b" onclick="setThemePref('accentColor','#f59e0b')" title="Amber"></button>
        <button class="color-swatch" data-value="#ef4444" style="background:#ef4444" onclick="setThemePref('accentColor','#ef4444')" title="Red"></button>
        <button class="color-swatch" data-value="#a855f7" style="background:#a855f7" onclick="setThemePref('accentColor','#a855f7')" title="Purple"></button>
        <button class="color-swatch" data-value="#f97316" style="background:#f97316" onclick="setThemePref('accentColor','#f97316')" title="Orange"></button>
      </div>
    </div>
    <div class="theme-section">
      <label>Card Style</label>
      <div class="theme-options" id="cardStyleOptions">
        <button class="theme-option" data-value="glass" onclick="setThemePref('cardStyle','glass')">Glass</button>
        <button class="theme-option" data-value="solid" onclick="setThemePref('cardStyle','solid')">Solid</button>
      </div>
    </div>
    <div class="theme-section">
      <label>Sidebar Style</label>
      <div class="theme-options" id="sidebarStyleOptions">
        <button class="theme-option" data-value="default" onclick="setThemePref('sidebarStyle','default')">Default</button>
        <button class="theme-option" data-value="borderless" onclick="setThemePref('sidebarStyle','borderless')">Borderless</button>
        <button class="theme-option" data-value="elevated" onclick="setThemePref('sidebarStyle','elevated')">Elevated</button>
      </div>
    </div>
    <div class="theme-section">
      <label>Font Size</label>
      <div class="theme-options" id="fontSizeOptions">
        <button class="theme-option" data-value="small" onclick="setThemePref('fontSize','small')">Small</button>
        <button class="theme-option" data-value="medium" onclick="setThemePref('fontSize','medium')">Medium</button>
        <button class="theme-option" data-value="large" onclick="setThemePref('fontSize','large')">Large</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">User Management</div>
      <div class="card-actions">
        <button class="btn btn-primary" onclick="openUserForm()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><circle cx="10" cy="10" r="9"/><path d="M10 6v8"/><path d="M6 10h8"/></svg> Add User</button>
      </div>
    </div>
    <div id="usersTableContainer"></div>
  </div>
</div>

<div class="modal-overlay" id="userFormModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="userFormTitle">Add User</div>
      <button class="modal-close" onclick="hideModal('userFormModal')">&times;</button>
    </div>
    <form id="userForm" onsubmit="return saveUser(event)">
      <div class="modal-body">
        <input type="hidden" name="originalEmail" id="editUserEmail">
        <div class="form-row">
          <div class="form-group">
            <label>Employee ID</label>
            <input type="text" name="EmployeeID" class="form-control" placeholder="e.g. EMP-001">
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" name="Email" class="form-control" required id="userEmail">
          </div>
        </div>
        <div class="form-group">
          <label>Name *</label>
          <input type="text" name="Name" class="form-control" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Password *</label>
            <input type="password" name="Password" class="form-control" id="userPassword">
          </div>
          <div class="form-group">
            <label>Mobile</label>
            <input type="text" name="Mobile" class="form-control" placeholder="e.g. 9876543210">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Department</label>
            <select name="Department" class="form-control" id="userDepartmentSelect" onchange="onUserDeptChange()">
              <option value="">Select Department</option>
            </select>
          </div>
          <div class="form-group">
            <label>Section</label>
            <select name="Section" class="form-control" id="userSectionSelect">
              <option value="">Select Section</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Designation</label>
            <input type="text" name="Designation" class="form-control" placeholder="Job title / designation">
          </div>
          <div class="form-group">
            <label>Role</label>
            <select name="Role" class="form-control">
              <option value="Admin">Admin</option>
              <option value="Department Manager">Department Manager</option>
              <option value="Maintenance Manager">Maintenance Manager</option>
              <option value="Supervisor">Supervisor</option>
              <option value="Technician">Technician</option>
              <option value="Operator">Operator</option>
              <option value="Viewer">Viewer</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Status</label>
            <select name="Status" class="form-control">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
              <option value="Blocked">Blocked</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label style="display:block;margin-bottom:8px">Job Card Permissions</label>
          <div class="perm-checkbox-grid">
            <label class="perm-checkbox"><input type="checkbox" name="CanOpenJobCard"> Open Job Card</label>
            <label class="perm-checkbox"><input type="checkbox" name="CanStartJobCard"> Start Job Card</label>
            <label class="perm-checkbox"><input type="checkbox" name="CanCloseJobCard"> Close Job Card</label>
            <label class="perm-checkbox"><input type="checkbox" name="CanApproveJobCard"> Approve Job Card</label>
          </div>
        </div>
        <div class="form-group">
          <label style="display:block;margin-bottom:8px">Management Permissions</label>
          <div class="perm-checkbox-grid">
            <label class="perm-checkbox"><input type="checkbox" name="CanManageMachines"> Manage Machines</label>
            <label class="perm-checkbox"><input type="checkbox" name="CanManageAssets"> Manage Assets</label>
            <label class="perm-checkbox"><input type="checkbox" name="CanManageSpareParts"> Manage Spare Parts</label>
            <label class="perm-checkbox"><input type="checkbox" name="CanManagePM"> Manage PM</label>
            <label class="perm-checkbox"><input type="checkbox" name="CanManageTechnicians"> Manage Technicians</label>
            <label class="perm-checkbox"><input type="checkbox" name="CanManageDepartments"> Manage Departments</label>
            <label class="perm-checkbox"><input type="checkbox" name="CanManageSections"> Manage Sections</label>
            <label class="perm-checkbox"><input type="checkbox" name="CanManageUsers"> Manage Users</label>
          </div>
        </div>
        <div class="form-group">
          <label style="display:block;margin-bottom:8px">General Permissions</label>
          <div class="perm-checkbox-grid">
            <label class="perm-checkbox"><input type="checkbox" name="CanViewDashboard"> View Dashboard</label>
            <label class="perm-checkbox"><input type="checkbox" name="CanViewReports"> View Reports</label>
            <label class="perm-checkbox perm-checkbox-admin"><input type="checkbox" name="IsAdmin"> System Administrator</label>
          </div>
          <small style="color:var(--text-muted);font-size:11px">System Administrator overrides all individual permissions</small>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="hideModal('userFormModal')">Cancel</button>
        <button type="submit" class="btn btn-primary"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><path d="M15 17v-5H5v5"/><path d="M5 3v4h7"/><path d="M4 3h10l3 3v10a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1z"/></svg> Save</button>
      </div>
    </form>
  </div>
</div>

<script>
var usersData = [];
var usersPage = 1;

function loadSettingsData() {
  loadDepartments();
  loadSimpleSettings();
  loadUsers();
  initThemeSettingsUI();
}

function initThemeSettingsUI() {
  var prefs = loadTheme();
  document.querySelectorAll('#themeModeOptions .theme-option').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.value === prefs.mode);
  });
  document.querySelectorAll('#accentColorOptions .color-swatch').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.value === prefs.accentColor);
  });
  document.querySelectorAll('#cardStyleOptions .theme-option').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.value === prefs.cardStyle);
  });
  document.querySelectorAll('#sidebarStyleOptions .theme-option').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.value === prefs.sidebarStyle);
  });
  document.querySelectorAll('#fontSizeOptions .theme-option').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.value === prefs.fontSize);
  });
}

function setThemePref(key, value) {
  var prefs = loadTheme();
  prefs[key] = value;
  saveThemePrefs(prefs);
  applyTheme(prefs);
  initThemeSettingsUI();
  showToast(key === 'accentColor' ? 'Accent color updated' : 'Theme preference saved', 'success');
}

function loadDepartments() {
  google.script.run
    .withSuccessHandler(function(data) {
      var html = '';
      var deptSelect = document.getElementById('userDepartmentSelect');
      if (deptSelect) {
        deptSelect.innerHTML = '<option value="">Select Department</option>';
        (data || []).forEach(function(d) {
          if (d.Status === 'Active') {
            deptSelect.innerHTML += '<option value="' + escapeHtml(d.Department) + '">' + escapeHtml(d.Department) + '</option>';
          }
        });
      }
      (data || []).forEach(function(d) {
        if (d.Status === 'Active') {
          html += '<div class="list-item"><span>' + escapeHtml(d.Department) + '</span>' +
            '<button class="btn btn-sm btn-danger" onclick="deleteDept(\'' + (d.DepartmentID || '').replace(/'/g, "\\'") + '\')">Remove</button></div>';
        }
      });
      var el = document.getElementById('deptList'); if (el) el.innerHTML = html || '<div style="color:var(--text-light);padding:6px 0">No departments</div>';
    })
    .withFailureHandler(function() {})
    .getDepartmentList();
}

function onUserDeptChange() {
  var dept = document.getElementById('userDepartmentSelect').value;
  var secSel = document.getElementById('userSectionSelect');
  if (secSel) secSel.innerHTML = '<option value="">Select Section</option>';
  if (!dept) return;
  google.script.run
    .withSuccessHandler(function(sections) {
      (sections || []).forEach(function(s) {
        secSel.innerHTML += '<option value="' + escapeHtml(s.Section) + '">' + escapeHtml(s.Section) + '</option>';
      });
    })
    .withFailureHandler(function(err) { console.error('Failed to load sections'); })
    .getSectionList();
}

function addDepartment() {
  var name = document.getElementById('newDept').value.trim();
  if (!name) { showToast('Enter department name', 'warning'); return; }
  showLoading(true);
  google.script.run
    .withSuccessHandler(function(data) { showLoading(false);             var el = document.getElementById('newDept'); if (el) el.value = ''; showToast('Department added'); loadDepartments(); })
    .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to add department', 'error'); })
    .addDepartment(name);
}

function deleteDept(id) {
  showConfirm('Remove Department', 'Are you sure?', function() {
    showLoading(true);
    google.script.run.withSuccessHandler(function() { showLoading(false); loadDepartments(); showToast('Department removed'); }).withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to delete department', 'error'); }).deleteDepartment(id);
  });
}

function loadSimpleSettings() {
  google.script.run
    .withSuccessHandler(function(data) {
      var settings = data.settings || [];
      renderSimpleList('areasList', settings, 'areas');
      renderSimpleList('linesList', settings, 'lines');
      renderSimpleList('jobTypesList', settings, 'jobTypes');
      renderSimpleList('prioritiesList', settings, 'priorities');
      renderSimpleList('machineTypesList', settings, 'machineTypes');
    })
    .withFailureHandler(function() {})
    .getSettingsData();
}

function renderSimpleList(containerId, settings, key) {
  var container = document.getElementById(containerId);
  var values = [];
  settings.forEach(function(s) {
    if (s.Setting === key) values = (s.Value || '').split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v; });
  });
  var html = values.map(function(v) {
    return '<div class="list-item"><span>' + v + '</span>' +
      '<button class="btn btn-sm btn-danger" onclick="removeSimpleValue(\'' + key + '\',\'' + v.replace(/'/g, "\\'") + '\')">Remove</button></div>';
  }).join('');
  if (container) container.innerHTML = html || '<div style="color:var(--text-light);padding:6px 0">No items</div>';
}

function saveSimpleSetting(key, inputId) {
  var value = document.getElementById(inputId).value.trim();
  if (!value) { showToast('Enter a value', 'warning'); return; }
  showLoading(true);
  google.script.run
    .withSuccessHandler(function(data) {
      var existing = '';
      (data.settings || []).forEach(function(s) { if (s.Setting === key) existing = s.Value || ''; });
      var values = existing ? existing.split(',').map(function(v) { return v.trim(); }) : [];
      if (values.indexOf(value) === -1) values.push(value);
      google.script.run
        .withSuccessHandler(function() { showLoading(false);             var el = document.getElementById(inputId); if (el) el.value = ''; showToast('Saved'); loadSimpleSettings(); })
        .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to save setting', 'error'); })
        .saveSettingValue(key, values.join(','));
    })
    .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to load settings', 'error'); })
    .getSettingsData();
}

function removeSimpleValue(key, value) {
  showLoading(true);
  google.script.run
    .withSuccessHandler(function(data) {
      var existing = '';
      (data.settings || []).forEach(function(s) { if (s.Setting === key) existing = s.Value || ''; });
      var values = existing.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v !== value; });
      google.script.run
        .withSuccessHandler(function() { showLoading(false); loadSimpleSettings(); showToast('Removed'); })
        .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to remove value', 'error'); })
        .saveSettingValue(key, values.join(','));
    })
    .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to load settings', 'error'); })
    .getSettingsData();
}

var PERM_FIELDS = ['CanOpenJobCard','CanStartJobCard','CanCloseJobCard','CanApproveJobCard','CanManageMachines','CanManageAssets','CanManageSpareParts','CanManagePM','CanManageTechnicians','CanManageDepartments','CanManageSections','CanManageUsers','CanViewDashboard','CanViewReports','IsAdmin'];

function loadUsers() {
  showLoading(true);
  google.script.run
    .withSuccessHandler(function(data) { usersData = data || []; showLoading(false); renderUsersTable(); })
    .withFailureHandler(function(err) { showLoading(false); showToast('Failed to load users', 'error'); })
    .getUsers();
}

function renderUsersTable() {
  var container = document.getElementById('usersTableContainer');
  var list = usersData;
  var page = usersPage;
  var pageSize = PAGE_SIZE;
  var totalPages = Math.ceil(list.length / pageSize) || 1;
  var start = (page - 1) * pageSize;
  var paged = list.slice(start, start + pageSize);

  var html = '<div class="table-wrap"><table class="table user-perms-table"><thead><tr>' +
    '<th>EmpID</th><th>Name</th><th>Email</th><th>Dept</th><th>Section</th><th>Role</th><th>Status</th><th>Actions</th>' +
    '</tr></thead><tbody>';
  paged.forEach(function(u) {
    var roleBadge = { 'Admin':'danger', 'Department Manager':'primary', 'Maintenance Manager':'warning', 'Supervisor':'info', 'Technician':'info', 'Operator':'secondary', 'Viewer':'secondary' };
    var rb = roleBadge[u.Role] || 'secondary';
    var statusClass = u.Status === 'Active' ? 'success' : (u.Status === 'Blocked' ? 'danger' : 'secondary');
    html += '<tr>' +
      '<td>' + escHtml(u.EmployeeID || '-') + '</td>' +
      '<td>' + escHtml(u.Name || '') + '</td>' +
      '<td>' + escHtml(u.Email || '') + '</td>' +
      '<td>' + escHtml(u.Department || '') + '</td>' +
      '<td>' + escHtml(u.Section || '-') + '</td>' +
      '<td><span class="badge badge-' + rb + '">' + escHtml(u.Role) + '</span></td>' +
      '<td><span class="badge badge-' + statusClass + '">' + escHtml(u.Status) + '</span></td>' +
      '<td class="actions-cell">' + statusToggle(u) + ' ' +
        iconBtn('edit', "editUser('" + u.Email.replace(/'/g, "\\'") + "')", 'Edit') + ' ' +
        iconBtn('trash', "deleteUser('" + u.Email.replace(/'/g, "\\'") + "')", 'Delete', 'icon-btn-danger') +
      '</td></tr>';
  });
  html += '</tbody></table></div>';

  if (totalPages > 1) {
    html += '<div class="pagination">';
    for (var p = 1; p <= totalPages; p++) {
      html += '<button class="btn btn-sm ' + (p === page ? 'btn-primary' : 'btn-secondary') + '" onclick="usersPage=' + p + ';renderUsersTable()">' + p + '</button>';
    }
    html += '</div>';
  }

  if (container)   if (container) container.innerHTML = html;
}

function statusToggle(u) {
  if (u.Status === 'Active') {
    return '<span class="status-toggle-btn status-active" onclick="toggleUserStatus(\'' + u.Email.replace(/'/g, "\\'") + '\',\'Inactive\')" title="Click to deactivate">Active</span>';
  } else if (u.Status === 'Blocked') {
    return '<span class="status-toggle-btn status-blocked" onclick="toggleUserStatus(\'' + u.Email.replace(/'/g, "\\'") + '\',\'Active\')" title="Click to unblock" style="background:#ef4444;color:#fff;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px">Blocked</span>';
  } else {
    return '<span class="status-toggle-btn status-inactive" onclick="toggleUserStatus(\'' + u.Email.replace(/'/g, "\\'") + '\',\'Active\')" title="Click to activate">Inactive</span>';
  }
}

function toggleUserPerm(email, field, newVal) {
  console.log('toggleUserPerm(): email=' + email + ', field=' + field + ', newVal=' + newVal);
  var data = {};
  data[field] = newVal ? 'TRUE' : 'FALSE';
  showLoading(true);
  google.script.run
    .withSuccessHandler(function(result) { usersData = result || []; showLoading(false); renderUsersTable(); showToast('Permission updated', 'success'); })
    .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to update permission', 'error'); })
    .updateUser(email, data);
}

function toggleUserStatus(email, newStatus) {
  showLoading(true);
  google.script.run
    .withSuccessHandler(function(result) { usersData = result || []; showLoading(false); renderUsersTable(); showToast('Status updated to ' + newStatus, 'success'); })
    .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to update status', 'error'); })
    .updateUser(email, { Status: newStatus });
}

function openUserForm() {
  var el = document.getElementById('editUserEmail'); if (el) el.value = '';
  var el = document.getElementById('userEmail'); if (el) el.disabled = false;
  var el = document.getElementById('userPassword'); if (el) el.required = true;
  resetForm('userForm');
  var el2 = document.getElementById('userSectionSelect'); if (el2) el2.innerHTML = '<option value="">Select Section</option>';
  PERM_FIELDS.forEach(function(f) {
    var el = document.querySelector('input[name="' + f + '"]');
    if (el) el.checked = false;
  });
  openModalForm('userForm', 'Add User');
}

function editUser(email) {
  var item = usersData.find(function(r) { return r.Email === email; });
  if (!item) return;
  setFormData('userForm', item);
  var el = document.getElementById('editUserEmail'); if (el) el.value = email;
          var el = document.getElementById('userEmail'); if (el) el.disabled = true;
  var el = document.getElementById('userPassword'); if (el) el.required = false;
  PERM_FIELDS.forEach(function(f) {
    var el = document.querySelector('input[name="' + f + '"]');
    if (el) {
      var val = item[f];
      el.checked = val === true || val === 'Yes' || val === 'true' || val === 'TRUE';
    }
  });
  if (item.Department) {
    onUserDeptChange();
    setTimeout(function() {
      if (item.Section) {
        var secSel = document.getElementById('userSectionSelect'); if (secSel) secSel.value = item.Section;
      }
    }, 300);
  }
  openModalForm('userForm', 'Edit User - ' + email);
}

function saveUser(e) {
  e.preventDefault();
  var data = getFormData('userForm');
  PERM_FIELDS.forEach(function(f) {
    var el = document.querySelector('input[name="' + f + '"]');
    data[f] = el && el.checked ? 'TRUE' : 'FALSE';
  });
  var origEmail = document.getElementById('editUserEmail').value;
  showLoading(true);
  if (origEmail) {
    if (!data.Password) delete data.Password;
    google.script.run
      .withSuccessHandler(function(result) { usersData = result; showLoading(false); hideModal('userFormModal'); showToast('User updated'); renderUsersTable(); })
      .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to update user', 'error'); })
      .updateUser(origEmail, data);
  } else {
    google.script.run
      .withSuccessHandler(function(result) { usersData = result; showLoading(false); hideModal('userFormModal'); showToast('User added'); renderUsersTable(); })
      .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to add user', 'error'); })
      .addUser(data);
  }
}

function deleteUser(email) {
  if (email === (currentUser && currentUser.email)) { showToast('Cannot delete yourself', 'error'); return; }
  showConfirm('Delete User', 'Are you sure?', function() {
    showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) { usersData = result; showLoading(false); showToast('User deleted'); renderUsersTable(); })
      .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to delete user', 'error'); })
      .deleteUser(email);
  });
}
</script>
