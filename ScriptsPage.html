<script>
var LOGO_URL = '?img=logo';

(function() {
  var cached = localStorage.getItem('cmms_logo_cache');
  if (cached) {
    LOGO_URL = cached;
    document.querySelectorAll('.logo-img, .login-logo-img, .topbar-logo-img, .loading-logo-img, .sidebar-logo-img').forEach(function(el) { if (el) el.src = cached; });
    document.querySelectorAll('link[rel="icon"], link[rel="apple-touch-icon"]').forEach(function(el) { if (el) el.href = cached; });
  } else {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      var dataUrl = canvas.toDataURL('image/png');
      localStorage.setItem('cmms_logo_cache', dataUrl);
      LOGO_URL = dataUrl;
      document.querySelectorAll('.logo-img, .login-logo-img, .topbar-logo-img, .loading-logo-img, .sidebar-logo-img').forEach(function(el) { if (el) el.src = dataUrl; });
      document.querySelectorAll('link[rel="icon"], link[rel="apple-touch-icon"]').forEach(function(el) { if (el) el.href = dataUrl; });
    };
    img.src = LOGO_URL;
  }
})();

function iconBtn(iconName, onclick, tooltip, extraClass) {
  var svg = ICONS[iconName] || '';

  return '<button class="' + cls + '" onclick="' + onclick + '" title="' + (tooltip || '') + '">' + svg + '</button>';
}

function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function showApp() {

  var loginPage = document.getElementById('loginPage'); if (loginPage) loginPage.style.display = 'none';
  var appContainer = document.getElementById('appContainer'); if (appContainer) appContainer.style.display = 'flex';
  applyTheme();
  updateUserInfo();
  initSidebar();
  loadNotifications();
  startNotificationRefresh();
  loadEmailPanelData();
  startEmailPanelRefresh();
  startBadgeRefresh();
  startClock();
  initLiveTimers();
  startSessionMonitor();
  // Restore last active page from localStorage or default to dashboard
  var lastPage = localStorage.getItem('cmms_last_page');
  var validPages = Object.keys(window.__loadFnMap || {}).concat(['dashboard', 'assets', 'technicians', 'departments', 'sections', 'users', 'machines', 'openjobcard', 'breakdown', 'notifications', 'email', 'whatsapp', 'reports', 'backuprestore', 'settings', 'checklists']);
  if (lastPage && validPages.indexOf(lastPage) !== -1 && lastPage !== 'dashboard') {
    navigateTo(lastPage);
  } else {
    navigateTo('dashboard');
  }
  setTimeout(function() { runFrontendDiagnostic('showApp'); }, 200);
  checkQRUrlParameter();
}

      el.innerHTML = '<img src="' + photoUrl.replace(/"/g, '&quot;') + '" style="width:' + size + ';height:' + size + ';border-radius:50%;object-fit:cover">';

    else if (page === 'technicians') { show = isAdmin || hasPermission('manageMachines'); }
    else if (page === 'departments') { show = isAdmin || hasPermission('manageMachines'); }
    else if (page === 'sections') { show = isAdmin || hasPermission('manageMachines'); }
    else if (page === 'users') { show = isAdmin || hasPermission('manageUsers'); }
    else if (page === 'openjobcard') { show = isAdmin || hasPermission('openJobCard'); }
    else if (page === 'startjobcard') { show = isAdmin || hasPermission('startJobCard'); }
    else if (page === 'closejobcard') { show = isAdmin || hasPermission('closeJobCard'); }
    else if (page === 'pendingjobcard') { show = isAdmin || hasPermission('reviewPendingJobCard'); }
    else if (page === 'jobcards') { show = isAdmin || hasPermission('viewAllJobCards'); }
    else if (page === 'approvejobcard') { show = isAdmin || hasPermission('approveJobCard'); }
    else if (page === 'checklists') { show = isAdmin || hasPermission('managePM'); }
    else if (page === 'pm') { show = isAdmin || hasPermission('managePM'); }
    else if (page === 'spareparts') { show = isAdmin || hasPermission('manageSpareParts'); }
    else if (page === 'inventory') { show = isAdmin || hasPermission('manageInventory'); }
    else if (page === 'inventorytransactions') { show = isAdmin || hasPermission('manageInventory'); }
    else if (page === 'stockhistory') { show = isAdmin || hasPermission('manageInventory'); }
    else if (page === 'goodsreceipt') { show = isAdmin || hasPermission('manageInventory'); }
    else if (page === 'pmhistory') { show = isAdmin || hasPermission('managePM'); }

var __sessionMonitorTimer = null;

function startSessionMonitor() {
  if (__sessionMonitorTimer) return;
  __sessionMonitorTimer = setInterval(function() {
    if (!currentUser) { stopSessionMonitor(); return; }
    var email = currentUser.email || '';
    google.script.run
      .withSuccessHandler(function(result) {
        if (!result || !result.valid) {
          console.warn('Session monitor: session invalid, logging out');
          stopSessionMonitor();
          currentUser = null;
          localStorage.removeItem('cmms_user');
          var appContainer = document.getElementById('appContainer');
          if (appContainer) appContainer.style.display = 'none';
          var loginPage = document.getElementById('loginPage');
          if (loginPage) loginPage.style.display = 'block';
        }
      })
      .withFailureHandler(function() {})
      .validateAppSession(email);
  }, 300000);
}

function stopSessionMonitor() {
  if (__sessionMonitorTimer) { clearInterval(__sessionMonitorTimer); __sessionMonitorTimer = null; }
}

function handleLogout() {
  showConfirm('Sign Out', 'Are you sure you want to sign out?', function() {
    var email = (currentUser && currentUser.email) || '';
    if (email) {
      google.script.run.logUserLogout(email);
    }
    stopAutoRefresh();
    stopNotificationRefresh();
    stopSessionMonitor();
    currentUser = null;
    localStorage.removeItem('cmms_user');
    var appContainer = document.getElementById('appContainer'); if (appContainer) appContainer.style.display = 'none';
    var loginPage = document.getElementById('loginPage'); if (loginPage) loginPage.style.display = 'block';
    var emailEl = document.getElementById('loginEmail');
    var passEl = document.getElementById('loginPassword');
    if (emailEl) emailEl.value = '';
    if (passEl) passEl.value = '';
  });
}

function navigateTo(page) {
  console.log('navigateTo() called: ' + page);
  if (!currentUser) {
    console.warn('navigateTo(): no session, redirecting to login');
    var lp = document.getElementById('loginPage'); if (lp) lp.style.display = 'block';
    var ac = document.getElementById('appContainer'); if (ac) ac.style.display = 'none';
    return;
  }
  currentPage = page;
  // Save last active page for session persistence
  try { localStorage.setItem('cmms_last_page', page); } catch(e) {}
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.sidebar-item').forEach(function(i) { i.classList.remove('active'); });

  var mc = document.querySelector('.main-content');
  if (mc) mc.scrollTop = 0;

  var pageEl = document.getElementById(page + 'Page');
  if (pageEl) {
    console.log('navigateTo() found page element: #' + page + 'Page');
    pageEl.classList.add('active');
  } else {
    console.error('navigateTo() MISSING page element: #' + page + 'Page');
  }

  var menuItem = document.querySelector('.sidebar-item[data-page="' + page + '"]');
  if (menuItem) {
    menuItem.classList.add('active');
    var parentGroup = menuItem.closest('.sidebar-group');
    if (parentGroup) parentGroup.classList.add('open');
  }

  var titles = {
    dashboard: 'Dashboard', assets: 'Asset Master', machines: 'Machine Master',
    technicians: 'Technician Master', departments: 'Department Master', sections: 'Section Master', jobcards: 'All Job Cards', checklists: 'Checklists',

    stockhistory: 'Stock History', goodsreceipt: 'Goods Receipt', pmhistory: 'PM History', notifications: 'Notifications',
    breakdown: 'Breakdown History', audit: 'Audit Trail',
    qr: 'QR & Barcode Center',
    qrmachines: 'Machine QR Management',
    qrassets: 'Asset QR Management',
    qrspareparts: 'Spare Parts QR Management',
    qrjobcards: 'Job Card QR Management',
    qrprint: 'Print QR Labels',
    qrhistory: 'QR Scan History',
    email: 'Email Notification Settings',
    reports: 'Reports', backuprestore: 'Backup & Restore', settings: 'Settings', openjobcard: 'Open Job Card',
    users: 'Users',
    startjobcard: 'Start Job Card', closejobcard: 'Close Job Card',
    pendingjobcard: 'Pending Review',
    approvejobcard: 'Approve Job Cards',
    whatsapp: 'WhatsApp Notifications'
  };
  setText('pageTitle', titles[page] || page);

  window.__loadFnMap = window.__loadFnMap || {
    jobcards: 'loadJobCardsData',
    openjobcard: 'loadOpenJobCardsData',
    startjobcard: 'loadStartJobCardsData',
    closejobcard: 'loadCloseJobCardsData',
    pendingjobcard: 'loadPendingJobCardsData',
    pm: 'loadPMData',
    spareparts: 'loadSparePartsData',
    inventory: 'loadInventoryData',
    inventorytransactions: 'loadInventoryTransactionsData',
    stockhistory: 'loadStockHistoryData',
    goodsreceipt: 'loadGoodsReceiptData',
    pmhistory: 'loadPMHistoryData',
    notifications: 'loadNotificationsData',
    audit: 'loadAuditLogsData',
    qr: 'loadQRBarcodeData',
    qrmachines: 'loadQRMachines',
    qrassets: 'loadQRAssets',
    qrspareparts: 'loadQRSpareParts',
    qrjobcards: 'loadQRJobCards',
    qrprint: 'loadQRPrint',
    qrhistory: 'loadQRHistory',
    email: 'loadEmailSettingsData',
    users: 'loadUsersData',
    whatsapp: 'loadWhatsAppData',
    approvejobcard: 'loadApproveJobCardData',
    backuprestore: 'loadBackupRestoreData'
  };
  var fnName = window.__loadFnMap[page] || 'load' + capitalize(page) + 'Data';
  console.log('navigateTo() looking for function: ' + fnName + ' exists:', typeof window[fnName] === 'function');
  var loadFn = window[fnName];

function openApproveJobCard() {
  if (!isAdmin() && !hasPermission('approveJobCard')) {
    showToast('You do not have permission to approve job cards', 'warning');
    return;
  }
  navigateTo('approvejobcard');
}

function toggleSidebar() {
  var sidebar = document.getElementById('mainSidebar');
  if (window.innerWidth <= 768) {
    sidebar.classList.toggle('open');
  } else {
    sidebar.classList.toggle('collapsed');
  }
}

function initSidebar() {
  var sidebar = document.getElementById('mainSidebar');
  if (!sidebar) return;
  try {
    var saved = JSON.parse(localStorage.getItem('cmms_sidebarGroups') || '{}');
    var hasSaved = Object.keys(saved).length > 0;
    document.querySelectorAll('.sidebar-group').forEach(function(g) {
      var key = g.dataset.group;
      if (hasSaved) {
        if (saved[key] === true) g.classList.add('open');
      } else {
        g.classList.add('open');
      }
    });
  } catch(e) {}
  if (window.innerWidth > 768) {
    sidebar.classList.add('collapsed');
    sidebar.addEventListener('mouseenter', function() {
      if (window.innerWidth > 768) sidebar.classList.remove('collapsed');
    });
    sidebar.addEventListener('mouseleave', function() {
      if (window.innerWidth > 768) sidebar.classList.add('collapsed');
    });
  }
}

function toggleSidebarGroup(header) {
  var group = header.parentElement;
  group.classList.toggle('open');
  var key = group.dataset.group;
  if (key) {
    try {
      var saved = JSON.parse(localStorage.getItem('cmms_sidebarGroups') || '{}');
      saved[key] = group.classList.contains('open');
      localStorage.setItem('cmms_sidebarGroups', JSON.stringify(saved));
    } catch(e) {}
  }
}

function startClock() {
  function updateClock() {
    var now = new Date();
    var formatted = formatDateTime(now);
    var clockEl = document.getElementById('topbarClock');
    if (clockEl) clockEl.textContent = formatted;
    else setText('clockTime', formatted);
  }
  updateClock();
  setInterval(updateClock, 30000);
}

function loadTheme() {
  var prefs = localStorage.getItem('cmms_themePrefs');
  if (prefs) {
    try { return JSON.parse(prefs); } catch(e) {}
  }
  return { mode: 'dark', accentColor: '#6366f1', cardStyle: 'glass', sidebarStyle: 'default', fontSize: 'medium' };
}

function saveThemePrefs(prefs) {
  localStorage.setItem('cmms_themePrefs', JSON.stringify(prefs));
}

function applyTheme(prefs) {
  prefs = prefs || loadTheme();
  var mode = prefs.mode;
  if (mode === 'auto') {
    mode = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', mode === 'light' ? 'light' : 'dark');
  if (prefs.accentColor) {
    document.documentElement.style.setProperty('--primary', prefs.accentColor);
    var r = parseInt(prefs.accentColor.slice(1,3), 16);
    var g = parseInt(prefs.accentColor.slice(3,5), 16);

function formatDate(date) {
  if (!date) return '';
  var d = date instanceof Date ? date : new Date(date);
  if (isNaN(d.getTime())) return '';
  var y = d.getFullYear();
  var m = ('0' + (d.getMonth() + 1)).slice(-2);
  var day = ('0' + d.getDate()).slice(-2);
  return y + '-' + m + '-' + day;
}

function formatDateTime(date) {
  if (!date) return '';
  var d = date instanceof Date ? date : new Date(date);
  if (isNaN(d.getTime())) return '';
  var day = String(d.getDate()).padStart(2, '0');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var month = months[d.getMonth()];
  var year = d.getFullYear();
  var hours = d.getHours();
  var ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12 || 12;
  var mins = String(d.getMinutes()).padStart(2, '0');
  return day + ' ' + month + ' ' + year + ' | ' + String(hours).padStart(2, '0') + ':' + mins + ' ' + ampm;
}

function nowLocalISO() {
  var d = new Date();
  var offset = -d.getTimezoneOffset();
  var sign = offset >= 0 ? '+' : '-';
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' +
         pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()) +
         sign + pad(Math.floor(Math.abs(offset) / 60)) + ':' + pad(Math.abs(offset) % 60);
}

function autoFillDateTime(inputId) {
  var el = document.getElementById(inputId);
  if (!el) return;
  var d = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  el.value = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' +
             pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function recordTimestamp(fieldId) {
  autoFillDateTime(fieldId);
}

function pad(n) {
  return n < 10 ? '0' + n : '' + n;
}

function formatDuration(ms) {
  if (!ms || ms < 0) ms = 0;
  var totalMinutes = Math.floor(ms / 60000);
  var days = Math.floor(totalMinutes / 1440);
  var hours = Math.floor((totalMinutes % 1440) / 60);
  var minutes = totalMinutes % 60;
  var parts = [];
  if (days > 0) parts.push(days + 'd');
  if (hours > 0 || days > 0) parts.push(hours + 'h');
  parts.push(minutes + 'm');
  return parts.join(' ');
}

function formatDurationFromDates(startStr, endStr) {
  if (!startStr) return '—';
  var start = new Date(startStr);
  var end = endStr ? new Date(endStr) : new Date();
  return formatDuration(end.getTime() - start.getTime());
}

function displayDuration(val) {
  if (!val && val !== 0 && val !== '0') return '0m';
  if (typeof val === 'string' && val.indexOf('h ') > -1) return val;
  var totalMinutes;
  if (val instanceof Date) {
    totalMinutes = Math.round(val.getTime() / 60000);
  } else if (typeof val === 'number') {
    totalMinutes = Math.floor(val);
  } else if (typeof val === 'string') {
    var s = val.trim();
    if (s === '') return '0m';
    var daysTimeMatch = s.match(/(\d+)\s+Days?\s+(\d{1,2}):(\d{2})/i);
    if (daysTimeMatch) {
      totalMinutes = parseInt(daysTimeMatch[1]) * 1440 + parseInt(daysTimeMatch[2]) * 60 + parseInt(daysTimeMatch[3]);
    } else if (s.indexOf(':') > -1) {
      var parts = s.split(':');
      if (parts.length === 3) {
        totalMinutes = (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0) + Math.round((parseInt(parts[2]) || 0) / 60);
      } else if (parts.length === 2) {
        totalMinutes = (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
      } else {
        totalMinutes = 0;
      }
    } else {
      var num = parseFloat(s);
      totalMinutes = isNaN(num) ? 0 : Math.round(num);
    }
  } else {
    totalMinutes = 0;
  }
  if (totalMinutes < 0) totalMinutes = 0;
  var d = Math.floor(totalMinutes / 1440);
  var h = Math.floor((totalMinutes % 1440) / 60);
  var m = totalMinutes % 60;
  if (d > 0) return d + ' Days ' + h + 'h ' + m + 'm';
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
}

function parseDurationToHours(val) {
  if (!val && val !== 0 && val !== '0') return 0;
  if (val instanceof Date) return Math.round(val.getTime() / 3600000 * 100) / 100;
  if (typeof val === 'number') return Math.round(val / 60 * 100) / 100;
  if (typeof val === 'string') {
    if (val.indexOf(':') === -1 && val.indexOf('Day') === -1) {
      var num = parseFloat(val);
      return isNaN(num) ? 0 : Math.round(num * 100) / 100;
    }
    var daysMatch = val.match(/(\d+)\s*Days?\s*/);
    var timeMatch = val.match(/(\d+):(\d+)/);
    var totalMinutes = 0;
    if (daysMatch) totalMinutes += parseInt(daysMatch[1]) * 1440;
    if (timeMatch) {
      totalMinutes += parseInt(timeMatch[1]) * 60;
      totalMinutes += parseInt(timeMatch[2]);
    }
    return Math.round(totalMinutes / 60 * 100) / 100;
  }
  return 0;
}

function getFormData(formId) {
  var form = document.getElementById(formId);
  if (!form) { console.warn('Form not found:', formId); return {}; }
  var data = {};
  var elements = form.elements;
  for (var i = 0; i < elements.length; i++) {
    var el = elements[i];
    var name = el.name || el.id;
    if (!name) continue;
    if (el.type === 'checkbox') {
      data[name] = el.checked;
    } else if (el.type === 'radio') {
      if (el.checked) data[name] = el.value;
    } else {
      data[name] = el.value;
    }
  }
  return data;
}

var qrScannerActive = false;

function openQRScanner() {
  if (qrScannerActive) return;
  qrScannerActive = true;

  var overlay = document.createElement('div');
  overlay.className = 'qr-scanner-overlay';
  overlay.id = 'qrScannerOverlay';
  overlay.innerHTML =
    '<div class="qr-scanner-header">Scan Machine / Asset / Job Card QR</div>' +
    '<div class="qr-scanner-viewfinder" id="qrReader"></div>' +
    '<div style="color:rgba(255,255,255,0.6);font-size:12px;margin-top:12px;text-align:center">Position QR code within the frame</div>' +
    '<button class="qr-scanner-close" onclick="closeQRScanner()">Close Scanner</button>';
  document.body.appendChild(overlay);

  if (typeof Html5Qrcode === 'undefined') {
    var script = document.createElement('script');
    script.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
    script.onload = function() { startQRScanning(); };
    script.onerror = function() {
      closeQRScanner();
      showToast('Failed to load QR scanner library', 'error');
    };
    document.head.appendChild(script);
  } else {
    startQRScanning();
  }
}

function startQRScanning() {
  try {
    var html5QrCode = new Html5Qrcode('qrReader');
    html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
      function onScanSuccess(decodedText) {
        html5QrCode.stop().then(function() {
          closeQRScanner();
          processQRScanResult(decodedText);
        }).catch(function() {});
      },
      function onScanFailure() {}
    ).catch(function(err) {
      closeQRScanner();
      if (err && err.toString().indexOf('NotAllowedError') !== -1) {
        showToast('Camera permission denied. Please allow camera access.', 'error');
      } else {
        showToast('Could not access camera: ' + (err.message || err), 'error');
      }
    });
  } catch(e) {
    closeQRScanner();
    showToast('QR scanner error: ' + e.message, 'error');
  }
}

function closeQRScanner() {
  qrScannerActive = false;
  var overlay = document.getElementById('qrScannerOverlay');
  if (overlay) overlay.remove();
}

function processQRScanResult(decodedText) {
  if (!currentUser) {
    showToast('Please login to scan QR codes', 'warning');
    return;
  }

  showToast('QR scanned: processing...', 'info');

  google.script.run
    .withSuccessHandler(function(result) {
      if (!result || result.error) {
        showToast(result ? result.error : 'QR code not recognized', 'error');
        return;
      }
      showQRDetail(result);
    })
    .withFailureHandler(function(err) {
      showToast('Failed to process QR code', 'error');
    })
    .getQRDetail(decodedText);
}

function createJobCardFromQR(machineId, machineName) {
  closeQRDetail();
  navigateTo('openjobcard');
  var attempts = 0;
  var maxAttempts = 10;
  var checkInterval = setInterval(function() {
    attempts++;
    var machineSelect = document.getElementById('jcMachine');
    if (machineSelect && machineSelect.options.length > 1) {
      clearInterval(checkInterval);
      for (var i = 0; i < machineSelect.options.length; i++) {
        if (machineSelect.options[i].value === machineName || machineSelect.options[i].text === machineName) {
          machineSelect.selectedIndex = i;
          if (typeof onJcMachineChange === 'function') onJcMachineChange();
          break;

    }
    if (attempts >= maxAttempts) {
      clearInterval(checkInterval);
      showToast('Machine list still loading. Please select manually.', 'warning');
    }
  }, 150);
}

/* ========================================================
   PART-6: BROWSER NOTIFICATIONS
   ======================================================== */
var lastNotifCount = 0;
var notifPermissionGranted = false;

function requestNotificationPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    notifPermissionGranted = true;
    return;
  }
  if (Notification.permission !== 'denied') {
    Notification.requestPermission().then(function(perm) {
      notifPermissionGranted = (perm === 'granted');
    });
  }
}

function sendBrowserNotification(title, body, tag) {
  if (!notifPermissionGranted || !('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    var n = new Notification(title, {
      body: body,
      icon: LOGO_URL,
      badge: LOGO_URL,
      tag: tag || 'cmms-' + Date.now(),
      requireInteraction: false,
      silent: false
    });
    n.onclick = function() { window.focus(); n.close(); };
    setTimeout(function() { n.close(); }, 8000);
  } catch(e) {}
}

var _lastNotifIds = [];
function checkForNewNotifications(data) {
  if (!data || !data.data) return;
  var newIds = data.data.map(function(n) { return n.NotificationID; });
  if (_lastNotifIds.length > 0) {
    var newOnes = data.data.filter(function(n) {
      return _lastNotifIds.indexOf(n.NotificationID) === -1 && (n.Priority === 'Critical' || n.Priority === 'High');
    });
    newOnes.forEach(function(n) {
      sendBrowserNotification(n.Title, n.Message, n.NotificationID);
    });
  }
  _lastNotifIds = newIds;
}

/* ========================================================
   PART-7: OFFLINE MODE
   ======================================================== */
var isOffline = !navigator.onLine;
var offlineQueue = [];

function setupOfflineMode() {
  window.addEventListener('online', function() {
    isOffline = false;
    var banner = document.getElementById('offlineBanner');
    if (banner) banner.style.display = 'none';
    showToast('Connection restored. Syncing...', 'success');
    syncOfflineActions();
  });

  window.addEventListener('offline', function() {
    isOffline = true;
    var banner = document.getElementById('offlineBanner');
    if (banner) banner.style.display = 'flex';
    showToast('You are offline. Changes will be saved locally.', 'warning');
  });

  try {
    var saved = localStorage.getItem('cmms_offline_queue');
    if (saved) offlineQueue = JSON.parse(saved);
    if (offlineQueue.length > 0 && navigator.onLine) syncOfflineActions();
  } catch(e) {}

  if (!navigator.onLine) {
    var banner = document.getElementById('offlineBanner');
    if (banner) banner.style.display = 'flex';
  }
}

function queueOfflineAction(type, data) {
  var action = { type: type, data: data, timestamp: Date.now(), id: 'offline_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5) };
  offlineQueue.push(action);
  try { localStorage.setItem('cmms_offline_queue', JSON.stringify(offlineQueue)); } catch(e) {}
  return action.id;
}

function syncOfflineActions() {
  if (offlineQueue.length === 0) return;
  var toProcess = offlineQueue.slice();
  var processed = 0;
  var failed = 0;

  function processNext() {
    if (processed + failed >= toProcess.length) {
      offlineQueue = [];
      try { localStorage.removeItem('cmms_offline_queue'); } catch(e) {}
      if (processed > 0) showToast('Synced ' + processed + ' offline action(s)' + (failed > 0 ? ', ' + failed + ' failed' : ''), failed > 0 ? 'warning' : 'success');
      return;
    }
    var action = toProcess[processed + failed];
    var fnMap = {
      'addJobCard': 'addJobCard',
      'updateJobCard': 'updateJobCard',
      'updateJobCardStatus': 'updateJobCardStatus',
      'createNotification': 'createNotification'
    };
    var fnName = fnMap[action.type];
    if (!fnName) { failed++; processNext(); return; }
    google.script.run
      .withSuccessHandler(function() { processed++; processNext(); })
      .withFailureHandler(function() { failed++; processNext(); })
      [fnName](action.data);
  }
  processNext();
}

   ======================================================== */
var qrCache = {};
var QR_CACHE_TTL = 300000;

function cacheQRScan(qrContent, result) {
  qrCache[qrContent] = { result: result, timestamp: Date.now() };
}

function getCachedQR(qrContent) {
  var cached = qrCache[qrContent];
  if (cached && (Date.now() - cached.timestamp) < QR_CACHE_TTL) return cached.result;
  delete qrCache[qrContent];
  return null;
}

/* ========================================================
   QR URL PARAMETER HANDLER
   ======================================================== */
function checkQRUrlParameter() {
  try {
    // First check if QR URL was preserved in localStorage (from WelcomePage redirect)
    var savedQrUrl = localStorage.getItem('cmms_qr_url');
    if (savedQrUrl) {
      localStorage.removeItem('cmms_qr_url');
      processQRScanResult(savedQrUrl);
      return;
    }
    // Check current URL for ?qr= parameter
    var params = new URLSearchParams(window.location.search);
    var qrParam = params.get('qr');
    if (qrParam) {
      // Pass the FULL URL to processQRScanResult so scanQRCode can match
      // against the stored QRCode value in the sheet
      var fullUrl = window.location.origin + window.location.pathname + window.location.search;
      processQRScanResult(fullUrl);
      if (window.history && window.history.replaceState) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }
  } catch(e) {}
}

function renderTable(data, columns, actions, page, pageSize, containerId) {
  containerId = containerId || 'tableContainer';
  var container = document.getElementById(containerId);
  if (!container) { console.error('renderTable() container not found: #' + containerId); return; }
  page = page || 1;
  pageSize = pageSize || PAGE_SIZE;

  console.log('renderTable() [' + containerId + '] INPUT data type:', typeof data, 'length:', data ? data.length : 'N/A', 'isArray:', Array.isArray(data));
  if (data && data.length > 0) {
    console.log('renderTable() [' + containerId + '] first record keys:', Object.keys(data[0]).join(','));
    console.log('renderTable() [' + containerId + '] first record:', JSON.stringify(data[0]));
  } else if (data && data.length === 0) {
    console.warn('renderTable() [' + containerId + '] DATA IS AN EMPTY ARRAY');
  } else if (!data) {
    console.error('renderTable() [' + containerId + '] DATA IS NULL/UNDEFINED');
  }

  if (!data || data.length === 0) {
    console.warn('renderTable() [' + containerId + '] No data to render. typeof data:', typeof data, 'isArray:', Array.isArray(data), 'isNull:', data === null, 'isUndefined:', data === undefined);
    if (data && typeof data === 'object' && !Array.isArray(data)) {
      console.warn('renderTable() [' + containerId + '] data is an OBJECT (not array) with keys:', Object.keys(data).join(','));
    }
    container.innerHTML =
      '<div class="empty-state">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>' +
        '<h3>No Data Found</h3>' +
        '<p>No records available in this module.</p>' +
      '</div>';
    return;
  }

  var totalPages = Math.ceil(data.length / pageSize);
  var start = (page - 1) * pageSize;
  var end = Math.min(start + pageSize, data.length);
  var pageData = data.slice(start, end);

  var html = '<div class="table-container"><table><thead><tr>';
  columns.forEach(function(col) {
    html += '<th>' + (col.label || col) + '</th>';
  });
  if (actions) html += '<th style="width:120px">Actions</th>';
  html += '</tr></thead><tbody>';

  pageData.forEach(function(row) {
    html += '<tr>';
    columns.forEach(function(col) {
      var key = col.key || col;
      var val = row[key] !== undefined && row[key] !== null ? row[key] : '';

      if (col.badge) {
        var badgeClass = 'badge badge-primary';
        if (col.badgeMap) {
          var mapKey = val;
          if (!(mapKey in col.badgeMap)) {
            mapKey = Object.keys(col.badgeMap).find(function(k) { return k.toLowerCase() === String(val).toLowerCase(); }) || mapKey;
          }
          badgeClass = 'badge badge-' + (col.badgeMap[mapKey] || 'primary');
        }
        val = '<span class="badge badge-' + (col.badgeMap ? (function() {
          var bm = col.badgeMap;
          var mapKey = val;
          if (!(mapKey in bm)) {
            mapKey = Object.keys(bm).find(function(k) { return k.toLowerCase() === String(val).toLowerCase(); }) || mapKey;
          }
          return bm[mapKey] || 'primary';
        })() : 'primary') + '">' + (col.badgeMap ? (function() {
          var bm = col.badgeMap;
          var mapKey = val;
          if (!(mapKey in bm)) {
            mapKey = Object.keys(bm).find(function(k) { return k.toLowerCase() === String(val).toLowerCase(); }) || mapKey;
          }
          return bm[mapKey] || val;
        })() : val) + '</span>';
      }

      if (col.format) val = col.format(val, row);

      if (col.date) {
        var d = new Date(val);
        if (!isNaN(d.getTime())) val = formatDateTime(d).split(' | ')[0];
      }

      if (col.datetime) {
        var d = new Date(val);
        if (!isNaN(d.getTime())) val = formatDateTime(d);
      }

      html += '<td>' + val + '</td>';
    });

    if (actions) {
      html += '<td><div class="actions-cell">';
      actions.forEach(function(action) {
        if (action.condition && !action.condition(row)) return;
        var idField = action.idField || Object.keys(row)[0];
        var onclick = action.onclick ? action.onclick.replace(/\{id\}/g, row[idField]) : '';
        if (action.icon && ICONS[action.icon]) {
          var svg = ICONS[action.icon];
          var cls = 'icon-btn icon-btn-' + (action.color || 'primary');
          html += '<button class="' + cls + '" onclick="' + onclick + '" title="' + (action.label || '') + '">' + svg + '</button>';
        } else {
          var cls = action.class || 'btn-primary';
          html += '<button class="btn btn-sm ' + cls + '" onclick="' + onclick + '" title="' + (action.label || '') + '">' + action.label + '</button>';
        }
      });
      html += '</div></td>';
    }
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  if (totalPages > 1) {
    var pageFn = containerId.charAt(0).toUpperCase() + containerId.slice(1) + 'Page';
    html += '<div class="pagination">' +
      '<div class="pagination-info">Showing ' + (start + 1) + ' to ' + end + ' of ' + data.length + ' entries</div>' +
      '<div class="pagination-btns">' +
      '<button onclick="changePage(\'' + containerId + '\',' + (page - 1) + ')" ' + (page <= 1 ? 'disabled' : '') + '>Prev</button>';
    for (var p = 1; p <= totalPages; p++) {
      html += '<button class="' + (p === page ? 'active' : '') + '" onclick="changePage(\'' + containerId + '\',' + p + ')">' + p + '</button>';
    }
    html += '<button onclick="changePage(\'' + containerId + '\',' + (page + 1) + ')" ' + (page >= totalPages ? 'disabled' : '') + '>Next</button>' +
      '</div></div>';
  }
  container.innerHTML = html;
}

function changePage(containerId, page) {
  var state = window.__pageStates || {};
  if (state[containerId]) {
    state[containerId](page);
  }
}

function registerPageState(containerId, renderFn) {
  if (!window.__pageStates) window.__pageStates = {};
  window.__pageStates[containerId] = renderFn;
}

// ─── Global Refresh System ───────────────────────────────────────────
var __refreshActive = false;
var __autoRefreshTimer = null;
var __lastDataVersion = '';
var __formEditing = false;

document.addEventListener('focusin', function(e) {
  var tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') __formEditing = true;
});
document.addEventListener('focusout', function(e) {
  var tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
    setTimeout(function() {
      var ft = document.activeElement && document.activeElement.tagName;
      if (ft !== 'INPUT' && ft !== 'TEXTAREA' && ft !== 'SELECT') __formEditing = false;
    }, 100);
  }
});

function refreshCurrentPage() {
  if (__refreshActive) return;
  __refreshActive = true;

  var page = currentPage;
  if (!page || page === 'login') { __refreshActive = false; return; }

  var state = capturePageState(page);
  window.__refreshState = state;
  window.__refreshPage = page;
  showRefreshSpinner(true);

  google.script.run
    .withSuccessHandler(function() { callRefreshLoad(page, state); })
    .withFailureHandler(function() { callRefreshLoad(page, state); })
    .flushSpreadsheet();
}

function callRefreshLoad(page, state) {
  var fnName = (window.__loadFnMap && window.__loadFnMap[page]) || 'load' + capitalize(page) + 'Data';
  var loadFn = window[fnName];
  if (loadFn) {
    loadFn();
    scheduleRefreshRestore(state);
  } else {
    finishRefresh();
  }
}

function showRefreshSpinner(show) {
  var btn = document.getElementById('topbarRefreshBtn');
  if (!btn) return;
  btn.classList.toggle('refreshing', show);
}

function capturePageState(page) {
  var pageEl = document.getElementById(page + 'Page');
  if (!pageEl) return { searchValues: {}, filterValues: {}, pageNumber: 1 };

  var state = { searchValues: {}, filterValues: {}, pageNumber: 1 };

  pageEl.querySelectorAll('input[type="text"], input[type="search"]').forEach(function(inp) {
    if (inp.id) state.searchValues[inp.id] = inp.value;
  });
  pageEl.querySelectorAll('select').forEach(function(sel) {
    if (sel.id) state.filterValues[sel.id] = sel.value;
  });

  var activePage = pageEl.querySelector('.pagination .active');
  if (activePage) state.pageNumber = parseInt(activePage.textContent) || 1;

  return state;
}

function scheduleRefreshRestore(state) {
  var attempts = 0;
  var check = setInterval(function() {
    attempts++;
    var overlay = document.getElementById('loadingOverlay');
    var isLoading = overlay && overlay.classList.contains('show');
    if (!isLoading || attempts >= 15) {
      clearInterval(check);
      setTimeout(function() { applyRefreshRestore(state); }, 200);
    }
  }, 100);
}

function applyRefreshRestore(state) {
  if (!state) { finishRefresh(); return; }

  var pageEl = document.getElementById(currentPage + 'Page');

  if (pageEl) {
    Object.keys(state.searchValues).forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = state.searchValues[id];
    });
    Object.keys(state.filterValues).forEach(function(id) {
      restoreSelectDelayed(id, state.filterValues[id]);
    });
    reRenderCurrentTable(state.pageNumber);
  }

  showToast('Data refreshed successfully.', 'success');
  finishRefresh();
  showAutoRefreshBanner();
}

function finishRefresh() {
  __refreshActive = false;
  window.__refreshState = null;
  window.__refreshPage = null;
  showRefreshSpinner(false);
}

function restoreSelectDelayed(id, value, retries) {
  retries = retries || 8;
  var el = document.getElementById(id);
  if (!el) return;
  var exists = Array.from(el.options).some(function(o) { return o.value === value; });
  if (exists) { el.value = value; }
  else if (retries > 0) { setTimeout(function() { restoreSelectDelayed(id, value, retries - 1); }, 150); }
}

function reRenderCurrentTable(pageNumber) {
  var pageEl = document.getElementById(currentPage + 'Page');
  if (!pageEl) return;
  var states = window.__pageStates || {};
  for (var cid in states) {
    var c = document.getElementById(cid);
    if (c && pageEl.contains(c)) { states[cid](pageNumber); return; }
  }
}

// ─── Auto Refresh ────────────────────────────────────────────────────
function startAutoRefresh() {
  if (__autoRefreshTimer) return;
  google.script.run
    .withSuccessHandler(function(v) { __lastDataVersion = v; })
    .withFailureHandler(function() {})
    .getDataVersion();
  __autoRefreshTimer = setInterval(autoRefreshCheck, 120000);
}

function stopAutoRefresh() {
  if (__autoRefreshTimer) { clearInterval(__autoRefreshTimer); __autoRefreshTimer = null; }
}

function autoRefreshCheck() {
  if (__formEditing || __refreshActive) return;
  google.script.run
    .withSuccessHandler(function(v) {
      if (__lastDataVersion && v !== __lastDataVersion) showNewDataBanner();
      __lastDataVersion = v;
    })
    .withFailureHandler(function() {})
    .getDataVersion();
}

function showNewDataBanner() {
  if (document.getElementById('newDataBanner')) return;
  var container = document.getElementById('toastContainer');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    container.id = 'toastContainer';
    document.body.appendChild(container);
  }
  var toast = document.createElement('div');
  toast.className = 'toast toast-info';
  toast.id = 'newDataBanner';
  toast.style.cursor = 'pointer';
  toast.innerHTML = '<span>\u2139</span><span>New data is available. <strong id="newDataRefreshLink" style="color:var(--primary);text-decoration:underline;cursor:pointer">Click Refresh</strong></span>';
  toast.onclick = function(e) { if (e.target.id === 'newDataRefreshLink' || this === e.target) { refreshCurrentPage(); this.remove(); } };
  container.appendChild(toast);
}

function populateSelect(id, data, valueField, labelField, defaultText) {
  data = data || [];
  var select = document.getElementById(id);
  if (!select) return;
  select.innerHTML = '';
  if (defaultText) {
    var opt = document.createElement('option');
    opt.value = '';
    opt.textContent = defaultText;
    select.appendChild(opt);
  }
  data.forEach(function(item) {
    var opt = document.createElement('option');
    opt.value = item[valueField];
    opt.textContent = item[labelField] || item[valueField];
    select.appendChild(opt);
  });
}

function populateSelectFromList(id, list, defaultText) {
  list = list || [];
  var select = document.getElementById(id);
  if (!select) return;
  select.innerHTML = '';
  if (defaultText) {
    var opt = document.createElement('option');
    opt.value = '';
    opt.textContent = defaultText;
    select.appendChild(opt);
  }
  list.forEach(function(val) {
    if (val) {
      var opt = document.createElement('option');
      opt.value = val;
      opt.textContent = val;
      select.appendChild(opt);
    }
  });
}

function getUniqueValues(data, field) {
  var map = {};
  data.forEach(function(row) {
    if (row[field]) map[row[field]] = true;
  });
  return Object.keys(map).sort();
}

function getFilteredNotifications() {
  var searchQ = (document.getElementById('notifSearchInput') && document.getElementById('notifSearchInput').value || '').toLowerCase().trim();
  var priorityFilter = (document.getElementById('notifFilterPriority') && document.getElementById('notifFilterPriority').value || '');
  var moduleFilter = (document.getElementById('notifFilterModule') && document.getElementById('notifFilterModule').value || '');
  var typeFilter = (document.getElementById('notifFilterType') && document.getElementById('notifFilterType').value || '');
  var list = notifications;
  if (__notifListFilter === 'unread') list = list.filter(function(n) { return (n.ReadStatus || '').toLowerCase() !== 'read'; });
  else if (__notifListFilter === 'read') list = list.filter(function(n) { return (n.ReadStatus || '').toLowerCase() === 'read'; });
  if (searchQ) {
    list = list.filter(function(n) {
      return (n.Title && n.Title.toLowerCase().indexOf(searchQ) > -1) ||
             (n.Message && n.Message.toLowerCase().indexOf(searchQ) > -1) ||
             (n.Module && n.Module.toLowerCase().indexOf(searchQ) > -1) ||
             (n.NotificationID && n.NotificationID.toLowerCase().indexOf(searchQ) > -1);
    });
  }
  if (priorityFilter) list = list.filter(function(n) { return n.Priority === priorityFilter; });
  if (moduleFilter) list = list.filter(function(n) { return n.Module === moduleFilter; });
  if (typeFilter) list = list.filter(function(n) { return (n.NotificationType || 'Information') === typeFilter; });
  return list;
}

          '<div class="notif-title">' + safeTitle + '<span class="notif-type-dot" style="background:' + typeCfg.color + '"></span></div>' +

  }
  list.innerHTML = html;

function getTimeAgo(dateTimeStr) {
  if (!dateTimeStr) return '';
  var now = new Date();
  var d = new Date(dateTimeStr);
  if (isNaN(d.getTime())) return dateTimeStr;
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 172800) return 'Yesterday';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return formatDate(d);
}

function getBadgeColorClass(count) {
  if (count === 0) return 'badge-zero';
  if (count <= 9) return 'badge-low';
  if (count <= 49) return 'badge-medium';
  return 'badge-high';
}

  if (count === 0) return { bg: 'var(--bg-card)', color: 'var(--text-muted)' };
  if (count <= 9) return { bg: 'var(--primary)', color: '#fff' };
  if (count <= 49) return { bg: 'var(--warning)', color: '#000' };

function updateSidebarCounters(data) {
  var map = {

    'startjobcard':    { count: data.startedJobCards,  status: 'running' },
    'pendingjobcard':  { count: data.pendingJobCards,  status: 'pending' },
    'closejobcard':    { count: data.closedJobCards,   status: 'closed' },
    'approvejobcard':  { count: data.approvedJobCards, status: 'approved' },
    'pm':              { count: data.pendingPM,        status: 'all' },
    'inventory':       { count: data.inventoryAlerts,  status: 'all' },
    'goodsreceipt':    { count: data.pendingGR,        status: 'all' }
  };
  for (var key in map) {
    var el = document.getElementById('badge-' + key);
    if (!el) continue;
    var item = map[key];
    var count = item.count || 0;
    el.textContent = count > 99 ? '99+' : count;
    if (count === 0) {
      el.className = 'sidebar-badge badge-zero';

function initMultiSelect(wrapperId, options) {
  var wrapper = document.getElementById(wrapperId);
  if (!wrapper) return;
  var tagsEl = wrapper.querySelector('.multi-select-tags');
  var searchEl = wrapper.querySelector('.multi-select-search');
  var hiddenEl = wrapper.querySelector('input[type="hidden"]');
  var dropdownEl = wrapper.querySelector('.multi-select-dropdown');
  if (!tagsEl || !searchEl || !hiddenEl || !dropdownEl) return;
  var selected = [];
  var allOptions = options || [];
  var isOpen = false;

  function renderTags() {
    var existing = tagsEl.querySelectorAll('.multi-select-tag');
    existing.forEach(function(el) { el.remove(); });
    selected.forEach(function(val) {
      var opt = allOptions.find(function(o) { return o.value === val; });
      var label = opt ? opt.label : val;
      var tag = document.createElement('span');
      tag.className = 'multi-select-tag';
      tag.innerHTML = label + '<span class="multi-select-tag-remove" data-value="' + val + '">&times;</span>';
      tag.querySelector('.multi-select-tag-remove').addEventListener('click', function(e) {
        e.stopPropagation();
        removeValue(val);
      });
      tagsEl.insertBefore(tag, searchEl);
    });
    hiddenEl.value = selected.join(',');
    if (typeof onMultiSelectChange === 'function') onMultiSelectChange(selected, allOptions);
  }

  function removeValue(val) {
    selected = selected.filter(function(v) { return v !== val; });
    renderTags();
    renderDropdown();
  }

  function toggleValue(val) {
    var idx = selected.indexOf(val);
    if (idx === -1) {
      selected.push(val);
    } else {
      selected.splice(idx, 1);
    }
    renderTags();
    renderDropdown();
  }

  function renderDropdown() {
    var q = searchEl.value.toLowerCase();
    var visible = allOptions.filter(function(o) {
      return o.label.toLowerCase().indexOf(q) !== -1;
    });
    dropdownEl.innerHTML = '';
    visible.forEach(function(o) {
      var isSel = selected.indexOf(o.value) !== -1;
      var div = document.createElement('div');
      div.className = 'multi-select-option' + (isSel ? ' selected' : '');
      div.innerHTML = '<input type="checkbox" ' + (isSel ? 'checked' : '') + '> <span>' + o.label + '</span>';
      div.addEventListener('click', function() { toggleValue(o.value); });
      dropdownEl.appendChild(div);
    });
    if (visible.length === 0) {
      dropdownEl.innerHTML = '<div style="padding:10px 12px;font-size:12px;color:var(--text-muted)">No results</div>';
    }
  }

  function openDropdown() {
    isOpen = true;
    dropdownEl.style.display = 'block';
    renderDropdown();
  }

  function closeDropdown() {
    isOpen = false;
    dropdownEl.style.display = 'none';
  }

  searchEl.addEventListener('focus', function() { openDropdown(); });
  searchEl.addEventListener('input', function() { if (isOpen) renderDropdown(); });
  document.addEventListener('click', function(e) {
    if (!wrapper.contains(e.target)) closeDropdown();
  });
  tagsEl.addEventListener('click', function() { searchEl.focus(); });

  renderTags();

  return {
    getValue: function() { return selected.slice(); },
    setValue: function(vals) { selected = vals.slice(); renderTags(); renderDropdown(); },
    clear: function() { selected = []; renderTags(); renderDropdown(); },
    close: closeDropdown
  };
}

function capturePhoto(inputId, opts) {
  opts = opts || {};
  var input = document.getElementById(inputId);
  if (!input) {
    input = document.createElement('input');
    input.type = 'file';
    input.id = inputId;
    input.accept = 'image/*';
    input.capture = opts.capture || 'environment';
    input.style.display = 'none';
    document.body.appendChild(input);
  }
  input.accept = 'image/*';
  if (opts.capture) input.setAttribute('capture', opts.capture);
  else input.removeAttribute('capture');
  return new Promise(function(resolve) {
    input.onchange = function(e) {
      var file = e.target.files && e.target.files[0];
      if (!file) return resolve(null);
      if (file.size > 5 * 1024 * 1024) {
        showToast('Image must be under 5MB', 'warning');
        return resolve(null);
      }
      var reader = new FileReader();
      reader.onload = function(ev) {
        var img = new Image();
        img.onload = function() {
          var maxW = opts.maxWidth || 1200;
          var maxH = opts.maxHeight || 900;
          var w = img.width, h = img.height;
          if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
          if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          var quality = opts.quality || 0.8;
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };
    input.value = '';
    input.click();
  });
}

function startCameraCapture(targetId, mode, optsStr) {
  var opts = {};
  if (optsStr) {
    try { opts = JSON.parse(optsStr); } catch(e) {
      try { opts = JSON.parse(JSON.parse(optsStr)); } catch(e2) {}
    }
  }
  var cameraMap = {
    'jcFaultImageInput': 'jcCameraInput',
    'closeRepairImageInput': 'closeRepairCameraInput'
  };
  var galleryInput = document.getElementById(targetId);
  var cameraInputId = cameraMap[targetId];
  var cameraInput = cameraInputId ? document.getElementById(cameraInputId) : null;

  if (mode === 'gallery' && galleryInput) {
    galleryInput.click();
    return;
  }

  if (mode === 'camera') {
    if (cameraInput) {
      cameraInput.click();
      return;
    }
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(function(stream) {
          stream.getTracks().forEach(function(track) { track.stop(); });
          showToast('Camera is available but no camera input found. Please use Choose from Gallery.', 'warning');
        })
        .catch(function(err) {
          if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
            showToast('Camera access denied. Please allow camera permission in your browser settings.', 'error');
          } else if (err.name === 'NotFoundError') {
            showToast('No camera found. Please connect a camera and try again.', 'warning');
          } else {
            showToast('Camera error: ' + (err.message || err), 'warning');
          }
        });
    } else {
      showToast('Camera is not supported in this browser.', 'warning');
    }
  }
}

var micIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
var micOffIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2"/></svg>';
var _voicePopupCleanup = {};

function _isInIframe() {
  try { return window.self !== window.top; } catch(e) { return true; }
}

function _getGASBaseUrl() {
  try { return ScriptApp.getService().getUrl(); } catch(e) {}
  try {
    var m = document.querySelector('script[src*="exec"]');
    if (m) return m.src.split('?')[0];
  } catch(e) {}
  try {
    var links = document.querySelectorAll('link[href*="exec"]');
    if (links.length) return links[0].href.split('?')[0];
  } catch(e) {}
  return window.location.href.split('?')[0].split('#')[0];
}

function startVoiceInput(textareaId) {
  if (!(window.SpeechRecognition || window.webkitSpeechRecognition)) {
    if (_isInIframe()) {
      openVoicePopup(textareaId);
    } else {
      showVoiceNotSupportedDialog();
    }
    return;
  }
  var textarea = document.getElementById(textareaId);
  if (!textarea) return;
  if (textarea._voiceActive) {
    try { textarea._voiceRecognition.stop(); } catch(e) {}
    textarea._voiceActive = false;
    setVoiceBtnState(textareaId, 'idle');
    return;
  }
  if (_isInIframe()) {
    openVoicePopup(textareaId);
    return;
  }
  doStartRecognition(textareaId);
}

function doStartRecognition(textareaId) {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  var textarea = document.getElementById(textareaId);
  if (!textarea || !SpeechRecognition) return;
  var recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;
  textarea._voiceRecognition = recognition;
  textarea._voiceActive = true;
  setVoiceBtnState(textareaId, 'listening');
  var finalTranscript = textarea.value || '';
  var interimDiv = document.getElementById(textareaId + '_interim');
  if (!interimDiv) {
    interimDiv = document.createElement('div');
    interimDiv.id = textareaId + '_interim';
    interimDiv.style.cssText = 'font-size:11px;color:var(--primary);padding:4px 0;min-height:16px;font-style:italic';
    textarea.parentNode.insertBefore(interimDiv, textarea.nextSibling);
  }
  recognition.onresult = function(event) {
    setVoiceBtnState(textareaId, 'recording');
    var interim = '';
    for (var i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalTranscript += (finalTranscript && !finalTranscript.endsWith(' ') ? ' ' : '') + event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    textarea.value = finalTranscript;
    interimDiv.textContent = interim ? 'Hearing: ' + interim : '';
  };
  recognition.onerror = function(event) {
    textarea._voiceActive = false;
    if (interimDiv) interimDiv.textContent = '';
    if (event.error === 'no-speech') {
      setVoiceBtnState(textareaId, 'idle');
      return;
    }
    if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
      setVoiceBtnState(textareaId, 'idle');
      openVoicePopup(textareaId);
      return;
    }
    if (event.error === 'aborted') {
      setVoiceBtnState(textareaId, 'idle');
      return;
    }
    if (event.error === 'not-found') {
      setVoiceBtnState(textareaId, 'idle');
      showVoiceFallbackDialog(textareaId, 'No microphone found. Please connect a microphone and try again.');
      return;
    }
    setVoiceBtnState(textareaId, 'idle');
  };
  recognition.onend = function() {
    textarea._voiceActive = false;
    setVoiceBtnState(textareaId, 'idle');
    if (interimDiv) interimDiv.textContent = '';
  };
  try {
    recognition.start();
  } catch(e) {
    textarea._voiceActive = false;
    setVoiceBtnState(textareaId, 'idle');
    openVoicePopup(textareaId);
  }
}

function openVoicePopup(textareaId) {
  var baseUrl = _getGASBaseUrl();
  var voiceUrl = baseUrl + '?voice=1&targetId=' + encodeURIComponent(textareaId);
  setVoiceBtnState(textareaId, 'listening');
  var popup = null;
  try {
    popup = window.open(voiceUrl, 'cmms_voice_input', 'width=440,height=480,menubar=no,toolbar=no,status=no,scrollbars=no,resizable=yes');
  } catch(e) {}
  if (!popup || popup.closed || typeof popup.document === 'undefined') {
    setVoiceBtnState(textareaId, 'idle');
    showVoiceFallbackDialog(textareaId, 'The voice input window was blocked by your browser. Please allow popups for this site, or type your input manually.');
    return;
  }
  var pollKey = 'cmms_voice_' + textareaId;
  var cleaned = false;
  function cleanup() {
    if (cleaned) return;
    cleaned = true;
    try { localStorage.removeItem(pollKey); } catch(e) {}
    setVoiceBtnState(textareaId, 'idle');
  }
  function onMessage(event) {
    try {
      if (event.data && event.data.type === 'cmms_voice_result' && event.data.targetId === textareaId) {
        var ta = document.getElementById(textareaId);
        if (ta && event.data.text) {
          ta.value = ta.value ? ta.value + ' ' + event.data.text : event.data.text;
        }
        cleanup();
        window.removeEventListener('message', onMessage);
      }
    } catch(e) {}
  }
  window.addEventListener('message', onMessage);
  var pollCount = 0;
  var pollInterval = setInterval(function() {
    pollCount++;
    try {
      var result = localStorage.getItem(pollKey);
      if (result !== null) {
        localStorage.removeItem(pollKey);
        clearInterval(pollInterval);
        var ta = document.getElementById(textareaId);
        if (ta) { ta.value = ta.value ? ta.value + ' ' + result : result; }
        cleanup();
        window.removeEventListener('message', onMessage);
      }
    } catch(ex) {}
    if (pollCount > 600) { clearInterval(pollInterval); }
  }, 500);
  var checkClosed = setInterval(function() {
    try {
      if (popup.closed) {
        clearInterval(checkClosed);
        clearInterval(pollInterval);
        window.removeEventListener('message', onMessage);
        cleanup();
      }
    } catch(ex) {
      clearInterval(checkClosed);
      clearInterval(pollInterval);
      cleanup();
    }
  }, 1000);
}

function setVoiceBtnState(textareaId, state) {
  var btn = document.querySelector('[data-voice="' + textareaId + '"]');
  if (!btn) return;
  btn.classList.remove('voice-idle', 'voice-listening', 'voice-recording', 'voice-denied');
  switch (state) {
    case 'listening':
      btn.style.background = '#3b82f6';
      btn.style.color = '#fff';
      btn.title = 'Listening... Tap to stop';
      btn.classList.add('voice-listening');
      btn.innerHTML = micIcon;
      break;
    case 'recording':
      btn.style.background = '#22c55e';
      btn.style.color = '#fff';
      btn.title = 'Recording... Tap to stop';
      btn.classList.add('voice-recording');
      btn.innerHTML = micIcon;
      break;
    case 'denied':
      btn.style.background = '#ef4444';
      btn.style.color = '#fff';
      btn.title = 'Microphone permission denied';
      btn.classList.add('voice-denied');
      btn.innerHTML = micOffIcon;
      break;
    default:
      btn.style.background = '';
      btn.style.color = '';
      btn.title = 'Voice input';
      btn.innerHTML = micIcon;
  }
}

/* ===== PART 12: OFFLINE SYNC QUEUE ===== */
var OfflineSync = (function() {
  var QUEUE_KEY = 'cmms_offline_queue';
  var isOnline = navigator.onLine;

  function getQueue() {
    try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveQueue(q) {
    try { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); } catch(e) {}
  }
  function add(action) {
    var q = getQueue();
    q.push({ action: action.fn, args: action.args || [], timestamp: Date.now(), id: 'off-' + Date.now() + '-' + Math.floor(Math.random()*1000) });
    saveQueue(q);
    updateOfflineBadge();
  }
  function processQueue() {
    if (!navigator.onLine) return;
    var q = getQueue();
    if (q.length === 0) return;
    var item = q.shift();
    saveQueue(q);
    updateOfflineBadge();
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      var fn = google.script.run;
      if (fn[item.action]) {
        var call = fn[item.action];
        item.args.forEach(function(a) { call = call.withArgs(a); });
        call.withSuccessHandler(function() { processQueue(); })
            .withFailureHandler(function() { q.unshift(item); saveQueue(q); updateOfflineBadge(); });
      } else {
        processQueue();
      }
    } else {
      q.unshift(item); saveQueue(q); updateOfflineBadge();
    }
  }
  function updateOfflineBadge() {
    var q = getQueue();
    var badge = document.getElementById('offlineBadge');
    if (!badge) {
      if (q.length > 0) {
        badge = document.createElement('span');
        badge.id = 'offlineBadge';
        badge.style.cssText = 'position:fixed;bottom:80px;right:14px;z-index:9998;padding:6px 12px;border-radius:20px;background:var(--warning);color:#000;font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-lg)';
        document.body.appendChild(badge);
      }
    }
    if (q.length > 0) {
      badge.textContent = q.length + ' pending sync';
      badge.style.display = 'flex';
    } else if (badge) {
      badge.remove();
    }
  }
  window.addEventListener('online', function() {
    isOnline = true;
    var banner = document.getElementById('offlineBanner');
    if (banner) banner.style.display = 'none';
    processQueue();
    showToast('Back online - syncing data...', 'success');
  });
  window.addEventListener('offline', function() {
    isOnline = false;
    var banner = document.getElementById('offlineBanner');
    if (banner) banner.style.display = 'flex';
    showToast('You are offline. Changes will be saved locally.', 'warning');
  });
  return { add: add, processQueue: processQueue, isOnline: function() { return navigator.onLine; }, getCount: function() { return getQueue().length; } };
})();

/* ===== PART 14: REQUEST DEDUP & PERFORMANCE ===== */
var RequestDedup = (function() {
  var pending = {};
  function dedup(key, fn, delay) {
    if (pending[key]) clearTimeout(pending[key]);
    pending[key] = setTimeout(function() {
      delete pending[key];
      fn();
    }, delay || 300);
  }
  return { dedup: dedup };
})();

function memoize(fn) {
  var cache = {};
  return function() {
    var key = Array.prototype.join.call(arguments, '|');
    if (cache[key] !== undefined) return cache[key];
    var result = fn.apply(this, arguments);
    cache[key] = result;
    return result;
  };
}

function highlightBottomNavItem(page) {
  var nav = document.getElementById('mobileBottomNav');
  if (!nav) return;
  nav.querySelectorAll('[onclick]').forEach(function(el) {
    var icon = el.querySelector('.mbnav-icon');
    var label = el.querySelector('span');
    if (el.getAttribute('onclick').indexOf("'" + page + "'") !== -1 || (page === 'scan' && el.getAttribute('onclick').indexOf('openQRScanner') !== -1)) {
      if (icon) icon.style.color = 'var(--primary)';
      if (label) label.style.color = 'var(--primary)';
    } else {
      if (icon) icon.style.color = 'var(--text-muted)';
      if (label) label.style.color = 'var(--text-muted)';
    }
  });
}

/* ===== PWA PUSH NOTIFICATION STUB ===== */
function requestPushPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function sendLocalNotification(title, body, url) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    var n = new Notification(title, { body: body, icon: '?img=logo&size=192', tag: 'cmms-' + Date.now() });
    n.onclick = function() { window.focus(); if (url) window.location.hash = url; };
  } catch(e) {}
}
