<script>
var LOGO_URL = '?img=logo';

(function() {
  var cached = localStorage.getItem('cmms_logo_cache');
  if (cached) {
    LOGO_URL = cached;
    document.querySelectorAll('.logo-img, .login-logo-img, .topbar-logo-img, .loading-logo-img, .sidebar-logo-img').forEach(function(el) { if (el) el.src = cached; });
    document.querySelectorAll('link[rel="icon"], link[rel="apple-touch-icon"]').forEach(function(el) { if (el) el.href = cached; });
  } else {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      var dataUrl = canvas.toDataURL('image/png');
      localStorage.setItem('cmms_logo_cache', dataUrl);
      LOGO_URL = dataUrl;
      document.querySelectorAll('.logo-img, .login-logo-img, .topbar-logo-img, .loading-logo-img, .sidebar-logo-img').forEach(function(el) { if (el) el.src = dataUrl; });
      document.querySelectorAll('link[rel="icon"], link[rel="apple-touch-icon"]').forEach(function(el) { if (el) el.href = dataUrl; });
    };
    img.src = LOGO_URL;
  }
})();

function iconBtn(iconName, onclick, tooltip, extraClass) {
  var svg = ICONS[iconName] || '';
  var cls = 'icon-btn' + (extraClass ? ' ' + extraClass : '');
  return '<button class="' + cls + '" onclick="' + onclick + '" title="' + (tooltip || '') + '">' + svg + '</button>';
}

function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

    else if (page === 'approvejobcard') { show = isAdmin || hasPermission('approveJobCard'); }
    else if (page === 'checklists') { show = isAdmin || hasPermission('managePM'); }
    else if (page === 'pm') { show = isAdmin || hasPermission('managePM'); }

    else if (page === 'goodsreceipt') { show = isAdmin || hasPermission('manageInventory'); }
    else if (page === 'pmhistory') { show = isAdmin || hasPermission('managePM'); }

}

function closeUserMenu() {

    e.target.style.display = 'none';
    e.target.classList.remove('show');

    var email = (currentUser && currentUser.email) || '';

      google.script.run.logUserLogout(email);

    stopNotificationRefresh();
    currentUser = null;
    localStorage.removeItem('cmms_user');
    document.getElementById('appContainer').style.display = 'none';
    document.getElementById('loginPage').style.display = 'block';
    var emailEl = document.getElementById('loginEmail');
    var passEl = document.getElementById('loginPassword');

    if (passEl) passEl.value = '';

function openApproveJobCard() {
  if (!isAdmin() && !hasPermission('approveJobCard')) {
    showToast('You do not have permission to approve job cards', 'warning');
    return;
  }
  navigateTo('jobcards');
  setTimeout(function() {
    if (typeof switchJcTab === 'function') switchJcTab('pendingapproval');
  }, 600);
}

function toggleSidebar() {
  var sidebar = document.getElementById('mainSidebar');
  if (window.innerWidth <= 768) {
    sidebar.classList.toggle('open');
  } else {
    sidebar.classList.toggle('collapsed');
  }
}

function initSidebar() {
  var sidebar = document.getElementById('mainSidebar');
  if (!sidebar) return;
  if (window.innerWidth > 768) {
    sidebar.classList.add('collapsed');
    sidebar.addEventListener('mouseenter', function() {
      if (window.innerWidth > 768) sidebar.classList.remove('collapsed');
    });
    sidebar.addEventListener('mouseleave', function() {
      if (window.innerWidth > 768) sidebar.classList.add('collapsed');
    });
  }
}

function startClock() {
  function updateClock() {
    var now = new Date();
    var formatted = formatDateTime(now);
    var clockEl = document.getElementById('topbarClock');
    if (clockEl) clockEl.textContent = formatted;
    else setText('clockTime', formatted);
  }
  updateClock();
  setInterval(updateClock, 30000);
}

function loadTheme() {
  var prefs = localStorage.getItem('cmms_themePrefs');
  if (prefs) {
    try { return JSON.parse(prefs); } catch(e) {}
  }
  return { mode: 'dark', accentColor: '#6366f1', cardStyle: 'glass', sidebarStyle: 'default', fontSize: 'medium' };
}

function saveThemePrefs(prefs) {
  localStorage.setItem('cmms_themePrefs', JSON.stringify(prefs));
}

function applyTheme(prefs) {
  prefs = prefs || loadTheme();
  var mode = prefs.mode;
  if (mode === 'auto') {
    mode = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', mode === 'light' ? 'light' : 'dark');
  if (prefs.accentColor) {
    document.documentElement.style.setProperty('--primary', prefs.accentColor);
    var r = parseInt(prefs.accentColor.slice(1,3), 16);
    var g = parseInt(prefs.accentColor.slice(3,5), 16);
    var b = parseInt(prefs.accentColor.slice(5,7), 16);
    document.documentElement.style.setProperty('--primary-dark', `rgb(${Math.max(0,r-20)},${Math.max(0,g-20)},${Math.max(0,b-20)})`);
    document.documentElement.style.setProperty('--primary-light', `rgba(${r},${g},${b},0.14)`);
    document.documentElement.style.setProperty('--primary-glow', `rgba(${r},${g},${b},0.25)`);
  }
  var sizes = { small: '12px', medium: '14px', large: '16px' };
  document.documentElement.style.fontSize = sizes[prefs.fontSize] || '14px';
  var cardGlass = document.querySelectorAll('.card, .stat-card, .chart-card, .modal');
  cardGlass.forEach(function(el) {
    el.style.backdropFilter = prefs.cardStyle === 'solid' ? 'none' : '';
    el.style.webkitBackdropFilter = prefs.cardStyle === 'solid' ? 'none' : '';
    el.style.background = prefs.cardStyle === 'solid' ? '' : '';
  });
  var sidebar = document.getElementById('mainSidebar');
  if (sidebar) {
    sidebar.style.borderRightWidth = prefs.sidebarStyle === 'borderless' ? '0' : '';
    sidebar.style.boxShadow = prefs.sidebarStyle === 'elevated' ? 'var(--shadow-lg)' : '';
  }
  updateThemeToggleIcon(mode);
}

function toggleTheme() {
  var prefs = loadTheme();
  var currentMode = document.documentElement.getAttribute('data-theme') || 'dark';
  prefs.mode = currentMode === 'dark' ? 'light' : 'dark';
  saveThemePrefs(prefs);
  applyTheme(prefs);
}

function updateThemeToggleIcon(mode) {
  var btn = document.getElementById('themeToggle');
  if (!btn) return;
  if (mode === 'light') {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
    btn.title = 'Switch to Dark Mode';
  } else {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
    btn.title = 'Switch to Light Mode';
  }
}

function formatDateTime(date) {
  if (!date) return '';
  var d = date instanceof Date ? date : new Date(date);
  if (isNaN(d.getTime())) return '';
  var day = String(d.getDate()).padStart(2, '0');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var month = months[d.getMonth()];
  var year = d.getFullYear();
  var hours = d.getHours();
  var ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12 || 12;
  var mins = String(d.getMinutes()).padStart(2, '0');
  return day + ' ' + month + ' ' + year + ' | ' + String(hours).padStart(2, '0') + ':' + mins + ' ' + ampm;
}

function nowLocalISO() {
  var d = new Date();
  var offset = -d.getTimezoneOffset();
  var sign = offset >= 0 ? '+' : '-';
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' +
         pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()) +
         sign + pad(Math.floor(Math.abs(offset) / 60)) + ':' + pad(Math.abs(offset) % 60);
}

function autoFillDateTime(inputId) {
  var el = document.getElementById(inputId);
  if (!el) return;
  var d = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  el.value = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' +
             pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function recordTimestamp(fieldId) {
  autoFillDateTime(fieldId);
}

function formatDuration(ms) {
  if (!ms || ms < 0) ms = 0;
  var totalMinutes = Math.floor(ms / 60000);
  var days = Math.floor(totalMinutes / 1440);
  var hours = Math.floor((totalMinutes % 1440) / 60);
  var minutes = totalMinutes % 60;
  var parts = [];
  if (days > 0) parts.push(days + 'd');
  if (hours > 0 || days > 0) parts.push(hours + 'h');
  parts.push(minutes + 'm');
  return parts.join(' ');
}

function formatDurationFromDates(startStr, endStr) {
  if (!startStr) return '—';
  var start = new Date(startStr);
  var end = endStr ? new Date(endStr) : new Date();
  return formatDuration(end.getTime() - start.getTime());
}

function initLiveTimers() {
  setInterval(function() {
    document.querySelectorAll('.live-timer[data-start]').forEach(function(el) {
      var start = el.getAttribute('data-start');
      if (start) {
        var diff = Date.now() - new Date(start).getTime();
        el.textContent = formatDuration(diff);
      }
    });
  }, 10000);
}

function showToast(message, type) {
  type = type || 'success';
  var container = document.getElementById('toastContainer');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    container.id = 'toastContainer';
    document.body.appendChild(container);
  }
  var icons = { success: '\u2713', error: '\u2715', warning: '\u26A0', info: '\u2139' };
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.innerHTML = '<span>' + (icons[type] || '\u2139') + '</span><span>' + message + '</span>';
  container.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    toast.style.transition = 'all 0.3s ease';

function renderTable(data, columns, actions, page, pageSize, containerId) {
  containerId = containerId || 'tableContainer';
  var container = document.getElementById(containerId);
  if (!container) { console.error('renderTable() container not found: #' + containerId); return; }
  page = page || 1;
  pageSize = pageSize || PAGE_SIZE;

  console.log('renderTable() [' + containerId + '] INPUT data type:', typeof data, 'length:', data ? data.length : 'N/A', 'isArray:', Array.isArray(data));
  if (data && data.length > 0) {
    console.log('renderTable() [' + containerId + '] first record keys:', Object.keys(data[0]).join(','));
    console.log('renderTable() [' + containerId + '] first record:', JSON.stringify(data[0]));
  } else if (data && data.length === 0) {
    console.warn('renderTable() [' + containerId + '] DATA IS AN EMPTY ARRAY');
  } else if (!data) {
    console.error('renderTable() [' + containerId + '] DATA IS NULL/UNDEFINED');
  }

  if (!data || data.length === 0) {
    console.warn('renderTable() [' + containerId + '] No data to render. typeof data:', typeof data, 'isArray:', Array.isArray(data), 'isNull:', data === null, 'isUndefined:', data === undefined);
    if (data && typeof data === 'object' && !Array.isArray(data)) {
      console.warn('renderTable() [' + containerId + '] data is an OBJECT (not array) with keys:', Object.keys(data).join(','));
    }
    container.innerHTML =
      '<div class="empty-state">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>' +
        '<h3>No Data Found</h3>' +
        '<p>No records available in this module.</p>' +
      '</div>';
    return;
  }

  var totalPages = Math.ceil(data.length / pageSize);
  var start = (page - 1) * pageSize;
  var end = Math.min(start + pageSize, data.length);
  var pageData = data.slice(start, end);

  var html = '<div class="table-container"><table><thead><tr>';
  columns.forEach(function(col) {
    html += '<th>' + (col.label || col) + '</th>';
  });
  if (actions) html += '<th style="width:120px">Actions</th>';
  html += '</tr></thead><tbody>';

  pageData.forEach(function(row) {
    html += '<tr>';
    columns.forEach(function(col) {
      var key = col.key || col;
      var val = row[key] !== undefined && row[key] !== null ? row[key] : '';

      if (col.badge) {
        var badgeClass = 'badge badge-primary';
        if (col.badgeMap) {
          var mapKey = val;
          if (!(mapKey in col.badgeMap)) {
            mapKey = Object.keys(col.badgeMap).find(function(k) { return k.toLowerCase() === String(val).toLowerCase(); }) || mapKey;
          }
          badgeClass = 'badge badge-' + (col.badgeMap[mapKey] || 'primary');
        }
        val = '<span class="badge badge-' + (col.badgeMap ? (function() {
          var bm = col.badgeMap;
          var mapKey = val;
          if (!(mapKey in bm)) {
            mapKey = Object.keys(bm).find(function(k) { return k.toLowerCase() === String(val).toLowerCase(); }) || mapKey;
          }
          return bm[mapKey] || 'primary';
        })() : 'primary') + '">' + (col.badgeMap ? (function() {
          var bm = col.badgeMap;
          var mapKey = val;
          if (!(mapKey in bm)) {
            mapKey = Object.keys(bm).find(function(k) { return k.toLowerCase() === String(val).toLowerCase(); }) || mapKey;
          }
          return bm[mapKey] || val;
        })() : val) + '</span>';
      }

      if (col.format) val = col.format(val, row);

      if (col.date) {
        var d = new Date(val);
        if (!isNaN(d.getTime())) val = formatDateTime(d).split(' | ')[0];
      }

      if (col.datetime) {
        var d = new Date(val);
        if (!isNaN(d.getTime())) val = formatDateTime(d);
      }

      html += '<td>' + val + '</td>';
    });

    if (actions) {
      html += '<td><div class="actions-cell">';
      actions.forEach(function(action) {
        if (action.condition && !action.condition(row)) return;
        var idField = action.idField || Object.keys(row)[0];
        var onclick = action.onclick ? action.onclick.replace(/\{id\}/g, row[idField]) : '';
        if (action.icon && ICONS[action.icon]) {
          var svg = ICONS[action.icon];
          var cls = 'icon-btn icon-btn-' + (action.color || 'primary');
          html += '<button class="' + cls + '" onclick="' + onclick + '" title="' + (action.label || '') + '">' + svg + '</button>';
        } else {
          var cls = action.class || 'btn-primary';
          html += '<button class="btn btn-sm ' + cls + '" onclick="' + onclick + '" title="' + (action.label || '') + '">' + action.label + '</button>';
        }
      });
      html += '</div></td>';
    }
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  if (totalPages > 1) {
    var pageFn = containerId.charAt(0).toUpperCase() + containerId.slice(1) + 'Page';
    html += '<div class="pagination">' +
      '<div class="pagination-info">Showing ' + (start + 1) + ' to ' + end + ' of ' + data.length + ' entries</div>' +
      '<div class="pagination-btns">' +
      '<button onclick="changePage(\'' + containerId + '\',' + (page - 1) + ')" ' + (page <= 1 ? 'disabled' : '') + '>Prev</button>';
    for (var p = 1; p <= totalPages; p++) {
      html += '<button class="' + (p === page ? 'active' : '') + '" onclick="changePage(\'' + containerId + '\',' + p + ')">' + p + '</button>';
    }
    html += '<button onclick="changePage(\'' + containerId + '\',' + (page + 1) + ')" ' + (page >= totalPages ? 'disabled' : '') + '>Next</button>' +
      '</div></div>';
  }
  container.innerHTML = html;
}

function changePage(containerId, page) {
  var state = window.__pageStates || {};
  if (state[containerId]) {
    state[containerId](page);
  }
}

function registerPageState(containerId, renderFn) {
  if (!window.__pageStates) window.__pageStates = {};
  window.__pageStates[containerId] = renderFn;
}

// ─── Global Refresh System ───────────────────────────────────────────
var __refreshActive = false;
var __autoRefreshTimer = null;
var __lastDataVersion = '';
var __formEditing = false;

document.addEventListener('focusin', function(e) {
  var tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') __formEditing = true;
});
document.addEventListener('focusout', function(e) {
  var tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
    setTimeout(function() {
      var ft = document.activeElement && document.activeElement.tagName;
      if (ft !== 'INPUT' && ft !== 'TEXTAREA' && ft !== 'SELECT') __formEditing = false;
    }, 100);
  }
});

function refreshCurrentPage() {
  if (__refreshActive) return;
  __refreshActive = true;

  var page = currentPage;
  if (!page || page === 'login') { __refreshActive = false; return; }

  var state = capturePageState(page);
  window.__refreshState = state;
  window.__refreshPage = page;
  showRefreshSpinner(true);

  google.script.run
    .withSuccessHandler(function() { callRefreshLoad(page, state); })
    .withFailureHandler(function() { callRefreshLoad(page, state); })
    .flushSpreadsheet();
}

function callRefreshLoad(page, state) {
  var fnName = (window.__loadFnMap && window.__loadFnMap[page]) || 'load' + capitalize(page) + 'Data';
  var loadFn = window[fnName];
  if (loadFn) {
    loadFn();
    scheduleRefreshRestore(state);
  } else {
    finishRefresh();
  }
}

function showRefreshSpinner(show) {
  var btn = document.getElementById('topbarRefreshBtn');
  if (!btn) return;
  btn.classList.toggle('refreshing', show);
}

function capturePageState(page) {
  var pageEl = document.getElementById(page + 'Page');
  if (!pageEl) return { searchValues: {}, filterValues: {}, pageNumber: 1 };

  var state = { searchValues: {}, filterValues: {}, pageNumber: 1 };

  pageEl.querySelectorAll('input[type="text"], input[type="search"]').forEach(function(inp) {
    if (inp.id) state.searchValues[inp.id] = inp.value;
  });
  pageEl.querySelectorAll('select').forEach(function(sel) {
    if (sel.id) state.filterValues[sel.id] = sel.value;
  });

  var activePage = pageEl.querySelector('.pagination .active');
  if (activePage) state.pageNumber = parseInt(activePage.textContent) || 1;

  return state;
}

function scheduleRefreshRestore(state) {
  var attempts = 0;
  var check = setInterval(function() {
    attempts++;
    var overlay = document.getElementById('loadingOverlay');
    var isLoading = overlay && overlay.classList.contains('show');
    if (!isLoading || attempts >= 30) {
      clearInterval(check);
      setTimeout(function() { applyRefreshRestore(state); }, 400);
    }
  }, 200);
}

function applyRefreshRestore(state) {
  if (!state) { finishRefresh(); return; }

  var pageEl = document.getElementById(currentPage + 'Page');

  if (pageEl) {
    Object.keys(state.searchValues).forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = state.searchValues[id];
    });
    Object.keys(state.filterValues).forEach(function(id) {
      restoreSelectDelayed(id, state.filterValues[id]);
    });
    reRenderCurrentTable(state.pageNumber);
  }

  showToast('Data refreshed successfully.', 'success');
  finishRefresh();
  showAutoRefreshBanner();
}

function finishRefresh() {
  __refreshActive = false;
  window.__refreshState = null;
  window.__refreshPage = null;
  showRefreshSpinner(false);
}

function restoreSelectDelayed(id, value, retries) {
  retries = retries || 8;
  var el = document.getElementById(id);
  if (!el) return;
  var exists = Array.from(el.options).some(function(o) { return o.value === value; });
  if (exists) { el.value = value; }
  else if (retries > 0) { setTimeout(function() { restoreSelectDelayed(id, value, retries - 1); }, 150); }
}

function reRenderCurrentTable(pageNumber) {
  var pageEl = document.getElementById(currentPage + 'Page');
  if (!pageEl) return;
  var states = window.__pageStates || {};
  for (var cid in states) {
    var c = document.getElementById(cid);
    if (c && pageEl.contains(c)) { states[cid](pageNumber); return; }
  }
}

// ─── Auto Refresh ────────────────────────────────────────────────────
function startAutoRefresh() {
  if (__autoRefreshTimer) return;
  google.script.run
    .withSuccessHandler(function(v) { __lastDataVersion = v; })
    .withFailureHandler(function() {})
    .getDataVersion();
  __autoRefreshTimer = setInterval(autoRefreshCheck, 60000);
}

function stopAutoRefresh() {
  if (__autoRefreshTimer) { clearInterval(__autoRefreshTimer); __autoRefreshTimer = null; }
}

function autoRefreshCheck() {
  if (__formEditing || __refreshActive) return;
  google.script.run
    .withSuccessHandler(function(v) {
      if (__lastDataVersion && v !== __lastDataVersion) showNewDataBanner();
      __lastDataVersion = v;

    .getDataVersion();
}

function getFilteredNotifications() {
  var searchQ = (document.getElementById('notifSearchInput') && document.getElementById('notifSearchInput').value || '').toLowerCase().trim();
  var priorityFilter = (document.getElementById('notifFilterPriority') && document.getElementById('notifFilterPriority').value || '');
  var moduleFilter = (document.getElementById('notifFilterModule') && document.getElementById('notifFilterModule').value || '');
  var typeFilter = (document.getElementById('notifFilterType') && document.getElementById('notifFilterType').value || '');
  var list = notifications;
  if (__notifListFilter === 'unread') list = list.filter(function(n) { return (n.ReadStatus || '').toLowerCase() !== 'read'; });
  else if (__notifListFilter === 'read') list = list.filter(function(n) { return (n.ReadStatus || '').toLowerCase() === 'read'; });
  if (searchQ) {
    list = list.filter(function(n) {
      return (n.Title && n.Title.toLowerCase().indexOf(searchQ) > -1) ||
             (n.Message && n.Message.toLowerCase().indexOf(searchQ) > -1) ||
             (n.Module && n.Module.toLowerCase().indexOf(searchQ) > -1) ||
             (n.NotificationID && n.NotificationID.toLowerCase().indexOf(searchQ) > -1);
    });
  }
  if (priorityFilter) list = list.filter(function(n) { return n.Priority === priorityFilter; });
  if (moduleFilter) list = list.filter(function(n) { return n.Module === moduleFilter; });
  if (typeFilter) list = list.filter(function(n) { return (n.NotificationType || 'Information') === typeFilter; });
  return list;
}

function renderNotifications() {
  var list = document.getElementById('notificationList');
  if (!list) return;
  var filtered = getFilteredNotifications();
  var countEl = document.getElementById('notifPanelCount');
  if (countEl) countEl.textContent = filtered.length + ' notification' + (filtered.length !== 1 ? 's' : '');
  if (filtered.length === 0) {
    list.innerHTML =
      '<div class="notification-empty">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>' +
        '<p>No notifications</p>' +
      '</div>';
    return;
  }
  var maxPanelItems = 100;
  var displayNots = filtered.slice(0, maxPanelItems);
  var html = '';
  displayNots.forEach(function(n) {
    var isUnread = (n.ReadStatus || '').toLowerCase() !== 'read';
    var mod = n.Module || 'System';
    var notifType = n.NotificationType || 'Information';
    var typeCfg = notifTypeColors[notifType] || notifTypeColors['Information'];
    var typeIcon = notifTypeIcons[notifType] || defaultNotifIcon;
    var modIcon = moduleIcons[mod] || defaultNotifIcon;
    var priBadge = priorityBadgeMap[n.Priority] || 'primary';
    var dt = n.CreatedDateTime || '';
    var timeAgo = getTimeAgo(dt);
    var actionUrl = n.ActionURL || '';
    var nid = escapeHtml(n.NotificationID);
    var safeTitle = escapeHtml(n.Title);
    var safeMsg = escapeHtml(n.Message || '').substring(0, 120);
    var safeMod = escapeHtml(mod);
    html +=
      '<div class="notification-item' + (isUnread ? ' unread' : '') + '" onclick="handleNotifClick(\'' + nid + '\', \'' + escapeHtml(actionUrl) + '\')">' +
        '<div class="notification-icon" style="background:' + typeCfg.bg + ';color:' + typeCfg.color + '">' + typeIcon + '</div>' +
        '<div class="notification-content">' +
          '<div class="notif-title">' + safeTitle + '<span class="notif-type-dot" style="background:' + typeCfg.color + '"></span></div>' +
          '<div class="notif-desc">' + safeMsg + '</div>' +
          '<div class="notif-meta">' +
            '<span class="badge badge-' + priBadge + '" style="font-size:8px;padding:0 5px">' + n.Priority + '</span>' +
            '<span class="badge badge-secondary" style="font-size:8px;padding:0 5px">' + safeMod + '</span>' +
            '<span class="notif-time">' + timeAgo + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="notification-actions" onclick="event.stopPropagation()">' +
          (isUnread ? '<button class="notif-action-btn" onclick="markSingleNotificationRead(\'' + nid + '\')" title="Mark as Read">&#10003;</button>' : '') +
          '<button class="notif-action-btn danger" onclick="deleteSingleNotification(\'' + nid + '\')" title="Delete">&#10005;</button>' +
          (actionUrl ? '<button class="notif-action-btn" onclick="handleNotifClick(\'' + nid + '\', \'' + escapeHtml(actionUrl) + '\')" title="Open">&#8599;</button>' : '') +
        '</div>' +
      '</div>';
  });
  if (filtered.length > maxPanelItems) {
    html += '<div style="text-align:center;padding:10px;font-size:12px;color:var(--text-muted)">+' + (filtered.length - maxPanelItems) + ' more. <a href="#" onclick="navigateTo(\'notifications\');toggleNotificationPanel();return false">View all</a></div>';
  }
  list.innerHTML = html;
}

function getTimeAgo(dateTimeStr) {
  if (!dateTimeStr) return '';
  var now = new Date();
  var d = new Date(dateTimeStr);
  if (isNaN(d.getTime())) return dateTimeStr;
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 172800) return 'Yesterday';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return formatDate(d);
}

function renderEmailDropdown() {
  var list = document.getElementById('emailPanelList');
  if (!list) return;
  var statsEl = document.getElementById('emailDropdownSent');
  if (statsEl && emailPanelData.stats) {
    document.getElementById('emailDropdownSent').textContent = emailPanelData.stats.sentToday || '0';
    document.getElementById('emailDropdownFailed').textContent = emailPanelData.stats.failedToday || '0';
    document.getElementById('emailDropdownPending').textContent = emailPanelData.stats.pendingToday || '0';
  }
  var emails = emailPanelData.recentEmails || [];
  if (emails.length === 0) {
    list.innerHTML = '<div class="email-panel-empty">No emails sent yet.</div>';
    return;
  }
  var maxShow = 10;
  var html = '';
  var count = Math.min(emails.length, maxShow);
  for (var i = 0; i < count; i++) {
    var e = emails[i];
    var statusClass = e.Status === 'Sent' ? 'sent' : (e.Status === 'Failed' ? 'failed' : 'pending');
    var statusLabel = e.Status || 'Unknown';
    var dt = e.DateTime || '';
    var timeAgo = getTimeAgo(dt);
    html +=
      '<div class="email-panel-item">' +
        '<div class="email-item-main">' +
          '<div class="email-item-subject" title="' + escapeHtml(e.Subject || '') + '">' + escapeHtml((e.Subject || '').substring(0, 40)) + '</div>' +
          '<div class="email-item-recipient">' + escapeHtml(e.Recipient || '') + '</div>' +
        '</div>' +
        '<div class="email-item-meta">' +
          '<span class="email-status-dot ' + statusClass + '" title="' + statusLabel + '"></span>' +
          '<span class="email-item-time">' + timeAgo + '</span>' +
        '</div>' +
      '</div>';
  }
  if (emails.length > maxShow) {
    html += '<div class="email-panel-more">+' + (emails.length - maxShow) + ' more</div>';
  }
  list.innerHTML = html;
}

function startEmailPanelRefresh() {

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

  if (targetSundayOffId) {
    var sunEl = document.getElementById(targetSundayOffId);
    if (sunEl && dept && dept.SundayOff) {
      sunEl.value = dept.SundayOff;

  }
  if (targetHoursId) {
    var hrsEl = document.getElementById(targetHoursId);
    if (hrsEl && dept && dept.HoursPerDay) {
      hrsEl.value = dept.HoursPerDay;
    }
  }
}

  if (lo) {
    var loStyle = window.getComputedStyle(lo);
    console.log('loadingOverlay classes:', lo.className, '| display:', loStyle.display, '| z-index:', loStyle.zIndex);
    if (loStyle.display !== 'none') console.warn('loadingOverlay is VISIBLE - may cause blank page!');
  }
  
  var pages = document.querySelectorAll('.page');
  console.log('Elements with .page class:', pages.length);
  pages.forEach(function(p) {
    if (p.classList.contains('active')) {
      var cs = window.getComputedStyle(p);
      if (cs.display === 'none') console.warn('Active page "' + p.id + '" has display:none!');
    }
  });
  
  var bodyStyle = window.getComputedStyle(document.body);
  console.log('body background:', bodyStyle.backgroundColor, '| body height:', bodyStyle.height);
  
  console.log('=== END DIAGNOSTIC [' + context + '] ===');
}

function diagnoseDataPipeline() {
  console.log('=== DATA PIPELINE DIAGNOSTIC ===');
  console.log('Step 1: Testing google.script.run connectivity...');
  google.script.run
    .withSuccessHandler(function(result) {
      console.log('Step 1: PING OK - server responded:', result);
      console.log('Step 2: Fetching data from all modules...');
      var modules = [
        { name: 'getUsers', fn: 'getUsers' },
        { name: 'getMachines', fn: 'getMachines' },
        { name: 'getAssets', fn: 'getAssets' },
        { name: 'getTechnicians', fn: 'getTechnicians' },
        { name: 'getJobCards', fn: 'getJobCards' },
        { name: 'getPMRecords', fn: 'getPMRecords' },
        { name: 'getSpareParts', fn: 'getSpareParts' },
        { name: 'getChecklistTemplates', fn: 'getChecklistTemplates' },
        { name: 'getChecklists', fn: 'getChecklists' }
      ];
      var idx = 0;
      function fetchNext() {
        if (idx >= modules.length) {
          console.log('=== END DATA PIPELINE DIAGNOSTIC ===');
          return;
        }
        var mod = modules[idx];
        idx++;
        google.script.run
          .withSuccessHandler(function(modName) {
            return function(data) {
              console.log('Module "' + modName + '": typeof=' + typeof data, 'isArray=' + Array.isArray(data), 'length=' + (data ? data.length : 'N/A'));
              if (data && data.length > 0) {
                console.log('Module "' + modName + '": FIRST RECORD KEYS:', Object.keys(data[0]).join(','));
                console.log('Module "' + modName + '": FIRST RECORD:', JSON.stringify(data[0]).substring(0, 200));
              } else {
                console.warn('Module "' + modName + '": NO DATA (null, undefined, or empty array)');
              }
              fetchNext();
            };
          }(mod.name))
          .withFailureHandler(function(modName) {
            return function(err) {
              console.error('Module "' + modName + '": CALL FAILED:', err);
              fetchNext();
            };
          }(mod.name))
          [mod.fn]();
      }
      fetchNext();
    })
    .withFailureHandler(function(err) {
      console.error('Step 1: PING FAILED - google.script.run is not responding:', err);
      console.log('=== END DATA PIPELINE DIAGNOSTIC ===');
    })
    .testPing();
}

(function() {
  console.log('IIFE startup: checking localStorage for cmms_user');
  var stored = localStorage.getItem('cmms_user');
  if (stored) {
    console.log('IIFE: found stored user, parsing and checking session');
    currentUser = JSON.parse(stored);
    google.script.run
      .withSuccessHandler(function(result) {
        console.log('IIFE: checkSession returned:', result);
        if (result && result.loggedIn) {
          console.log('IIFE: session valid, showing app');
          document.getElementById('loginPage').style.display = 'none';
          document.getElementById('appContainer').style.display = 'flex';
          applyTheme();
          updateUserInfo();
          initSidebar();
          loadNotifications();
          startNotificationRefresh();
          loadEmailPanelData();
          startEmailPanelRefresh();
          startClock();
          initLiveTimers();
          startAutoRefresh();
          navigateTo('dashboard');
          setTimeout(function() { runFrontendDiagnostic('post-navigate'); }, 500);
        } else {
          console.log('IIFE: session invalid, clearing stored user');
          localStorage.removeItem('cmms_user');
          document.getElementById('loginPage').style.display = 'block';
        }
      })
      .withFailureHandler(function(err) {
        console.error('IIFE: checkSession FAILED:', err);
        localStorage.removeItem('cmms_user');
        document.getElementById('loginPage').style.display = 'block';
      })
      .checkSession();
  } else {
    console.log('IIFE: no stored user found, showing login page');
  }
})();
