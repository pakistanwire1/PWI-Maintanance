<div id="confirmOverlay" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <div class="modal-title" id="confirmTitle">Confirm</div>
      <button class="modal-close" onclick="closeConfirm()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="confirm-dialog" style="text-align:center;padding:12px 0">
        <p id="confirmMessage" style="margin:12px 0 24px;font-size:14px;color:var(--text-light)"></p>
        <div class="btn-group" style="justify-content:center" id="confirmButtons"></div>
      </div>
    </div>
  </div>
</div>
