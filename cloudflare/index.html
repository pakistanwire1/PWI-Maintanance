<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="PWI Computerized Maintenance Management System">
  <title>PWI CMMS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app" class="app">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="main-wrapper">
      <header id="topbar" class="topbar"></header>
      <main id="mainContent" class="main-content">
        <div class="login-container">
          <div class="login-card">
            <div class="login-logo"><img src="logo.svg" alt="CMMS" onerror="this.style.display='none'"></div>
            <h1 class="login-title">PWI CMMS</h1>
            <p class="login-subtitle">Loading...</p>
            <div class="spinner"></div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <div id="notifPanel" class="notif-panel"></div>
  <div id="loadingOverlay" class="loading-overlay" style="display:none"><div class="spinner"></div></div>
  <div id="confirmOverlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header"><h3 id="confirmTitle"></h3></div>
      <div class="modal-body"><p id="confirmMessage"></p></div>
      <div class="modal-footer" id="confirmButtons"></div>
    </div>
  </div>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/core/icons.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/session.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/theme.js"></script>
  <script src="js/core/nav.js"></script>
  <script src="js/core/notify.js"></script>
  <script src="js/core/loader.js"></script>
  <script src="js/core/dashboard.js"></script>
  <script src="js/pages/machines.js"></script>
  <script src="js/pages/assets.js"></script>
  <script src="js/pages/users.js"></script>
  <script src="js/pages/technicians.js"></script>
  <script src="js/pages/departments.js"></script>
  <script src="js/pages/sections.js"></script>
  <script src="js/pages/checklists.js"></script>
  <script src="js/pages/jobcards.js"></script>
  <script src="js/pages/openjc.js"></script>
  <script src="js/pages/startjc.js"></script>
  <script src="js/pages/closejc.js"></script>
  <script src="js/pages/pendingjc.js"></script>
  <script src="js/pages/approvejc.js"></script>
  <script src="js/pages/pm.js"></script>
  <script src="js/pages/pmhistory.js"></script>
  <script src="js/pages/spareparts.js"></script>
  <script src="js/pages/inventory.js"></script>
  <script src="js/pages/inventorytxns.js"></script>
  <script src="js/pages/stockhistory.js"></script>
  <script src="js/pages/goodsreceipt.js"></script>
  <script src="js/pages/breakdownhistory.js"></script>
  <script src="js/pages/notifications.js"></script>
  <script src="js/pages/qr.js"></script>
  <script src="js/pages/email.js"></script>
  <script src="js/pages/whatsapp.js"></script>
  <script src="js/pages/reports.js"></script>
  <script src="js/pages/audit.js"></script>
  <script src="js/pages/backup.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/app.js"></script>
  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  </script>
</body>
</html>
