<div id="stockhistoryPage" class="page">
  <div class="dashboard-grid" id="shSummaryCards" style="margin-bottom:16px">
    <div class="stat-card stat-primary">
      <div class="stat-inner">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg></div>
        <div class="stat-info"><h3 id="shTotalMovements">0</h3><p>Total Movements</p></div>
      </div>
    </div>
    <div class="stat-card stat-success">
      <div class="stat-inner">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="stat-info"><h3 id="shGoodsReceipt">0</h3><p>Goods Receipt</p></div>
      </div>
    </div>
    <div class="stat-card stat-warning">
      <div class="stat-inner">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg></div>
        <div class="stat-info"><h3 id="shIssues">0</h3><p>Issues</p></div>
      </div>
    </div>
    <div class="stat-card stat-info">
      <div class="stat-inner">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div class="stat-info"><h3 id="shUniqueParts">0</h3><p>Unique Parts</p></div>
      </div>
    </div>
  </div>

  <div class="filter-bar" id="shFilterBar">
    <div class="form-group">
      <label>Search</label>
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="form-control" id="shSearch" placeholder="Search stock history..." onkeyup="searchSHTable()">
      </div>
    </div>
    <div class="form-group">
      <label>Part</label>
      <select class="form-control" id="shFilterPart"><option value="">All Parts</option></select>
    </div>
    <div class="form-group">
      <label>Type</label>
      <select class="form-control" id="shFilterType">
        <option value="">All Types</option>
        <option value="Goods Receipt">Goods Receipt</option>
        <option value="Issue">Issue</option>
        <option value="Return">Return</option>
        <option value="Adjustment">Adjustment</option>
      </select>
    </div>
    <div class="form-group">
      <label>From</label>
      <input type="date" class="form-control" id="shFilterFromDate">
    </div>
    <div class="form-group">
      <label>To</label>
      <input type="date" class="form-control" id="shFilterToDate">
    </div>
    <div class="form-group" style="align-self:flex-end">
      <button class="btn btn-primary btn-sm" onclick="applySHFilter()">Apply</button>
      <button class="btn btn-secondary btn-sm" onclick="clearSHFilter()">Clear</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">Stock Movement History</div>
      <div class="card-actions">
        <button class="btn btn-secondary" onclick="exportSHCSV()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><path d="M10 2v11"/><path d="M6 9l4 4 4-4"/><path d="M3 15v2a1 1 0 001 1h12a1 1 0 001-1v-2"/></svg> Export Excel</button>
        <button class="btn btn-secondary" onclick="exportSHPDF()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><path d="M6 14H4a2 2 0 01-2-2V8a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2h-2"/><path d="M6 12h8v5H6v-5z"/><path d="M6 5V3a1 1 0 011-1h6a1 1 0 011 1v2"/></svg> PDF</button>
        <button class="btn btn-secondary" onclick="printSH()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><path d="M6 14H4a2 2 0 01-2-2V8a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2h-2"/><path d="M6 12h8v5H6v-5z"/><path d="M6 5V3a1 1 0 011-1h6a1 1 0 011 1v2"/></svg> Print</button>
        <button class="btn btn-secondary" onclick="loadStockHistoryData()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><path d="M17 10a7 7 0 01-13.5 2"/><path d="M3 10a7 7 0 0113.5-2"/><path d="M17 4v4h-4"/></svg> Refresh</button>
      </div>
    </div>
    <div id="shTableContainer"></div>
  </div>
</div>

<div class="modal-overlay" id="shViewModal" style="display:none">
  <div class="modal modal-wide">
    <div class="modal-header">
      <div class="modal-title" id="shViewTitle">Stock Movement Details</div>
      <button class="modal-close" onclick="hideModal('shViewModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="view-grid">
        <div class="view-section">
          <h4>Part Info</h4>
          <div class="view-row"><span>Part Code</span><strong id="shViewPartCode">-</strong></div>
          <div class="view-row"><span>Part Name</span><strong id="shViewPartName">-</strong></div>
          <div class="view-row"><span>Transaction Type</span><strong id="shViewType">-</strong></div>
          <div class="view-row"><span>Quantity</span><strong id="shViewQty">-</strong></div>
        </div>
        <div class="view-section">
          <h4>Balance</h4>
          <div class="view-row"><span>Balance Before</span><strong id="shViewBalanceBefore">-</strong></div>
          <div class="view-row"><span>Balance After</span><strong id="shViewBalanceAfter">-</strong></div>
          <div class="view-row"><span>Reference No</span><strong id="shViewRefNo">-</strong></div>
          <div class="view-row"><span>Created At</span><strong id="shViewCreatedAt">-</strong></div>
        </div>
      </div>
      <div class="view-grid" style="margin-top:16px">
        <div class="view-section" style="grid-column:1/-1">
          <h4>Remarks</h4>
          <p id="shViewRemarks" style="color:var(--text);font-size:13px;line-height:1.5">-</p>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="hideModal('shViewModal')">Close</button>
    </div>
  </div>
</div>

<script>
var shData = [];
var shPage = 1;
var shFilter = { search: '', part: '', type: '', fromDate: '', toDate: '' };
var shSearchDebounce = null;

function loadStockHistoryData() {
  showLoading(true);
  google.script.run
    .withSuccessHandler(function(data) {
      shData = data || [];
      showLoading(false);
      updateSHSummary();
      renderSHTable();
      loadSHFilterParts();
    })
    .withFailureHandler(function(err) { showLoading(false); showToast('Failed to load stock history', 'error'); })
    .getStockHistory();
}

function loadSHFilterParts() {
  google.script.run
    .withSuccessHandler(function(data) {
      var parts = data || [];
      var sel = document.getElementById('shFilterPart');
      sel.innerHTML = '<option value="">All Parts</option>';
      parts.forEach(function(item) { sel.innerHTML += '<option value="' + escHtml(item.PartCode || '') + '">' + escHtml(item.PartName || item.PartCode || '') + '</option>'; });
    })
    .withFailureHandler(function() {})
    .getSpareParts();
}

function updateSHSummary() {
  var total = shData.length;
  var gr = shData.filter(function(r) { return (r.TransactionType || '').toLowerCase() === 'goods receipt'; }).length;
  var issue = shData.filter(function(r) { return (r.TransactionType || '').toLowerCase() === 'issue'; }).length;
  var uniqueParts = {};
  shData.forEach(function(r) { if (r.PartCode) uniqueParts[r.PartCode] = true; });
  document.getElementById('shTotalMovements').textContent = total;
  document.getElementById('shGoodsReceipt').textContent = gr;
  document.getElementById('shIssues').textContent = issue;
  document.getElementById('shUniqueParts').textContent = Object.keys(uniqueParts).length;
}

function renderSHTable() {
  var data = applySHClientFilters(shData);
  var columns = [
    { key: 'PartCode', label: 'Part Code' },
    { key: 'PartName', label: 'Part Name' },
    { key: 'TransactionType', label: 'Type', badge: true, badgeMap: { 'Goods Receipt': 'success', 'Issue': 'warning', 'Return': 'info', 'Adjustment': 'danger' } },
    { key: 'Quantity', label: 'Qty' },
    { key: 'BalanceBefore', label: 'Before' },
    { key: 'BalanceAfter', label: 'After' },
    { key: 'ReferenceNo', label: 'Reference' },
    { key: 'CreatedAt', label: 'Date', datetime: true }
  ];
  var actions = [
    { label: 'View', icon: 'view', color: 'primary', onclick: "viewSH('{id}')", idField: 'PartCode' }
  ];
  renderTable(data, columns, actions, shPage, PAGE_SIZE, 'shTableContainer');
  registerPageState('shTableContainer', function(p) { shPage = p; renderSHTable(); });
}

function viewSH(id) {
  var item = shData.find(function(r) { return r.PartCode === id && r.CreatedAt === document.getElementById('shViewCreatedAt').textContent; }) || shData[0];
  if (!item) { showToast('Record not found', 'error'); return; }
  document.getElementById('shViewPartCode').textContent = item.PartCode || '-';
  document.getElementById('shViewPartName').textContent = item.PartName || '-';
  document.getElementById('shViewType').textContent = item.TransactionType || '-';
  document.getElementById('shViewQty').textContent = item.Quantity || '0';
  document.getElementById('shViewBalanceBefore').textContent = item.BalanceBefore || '0';
  document.getElementById('shViewBalanceAfter').textContent = item.BalanceAfter || '0';
  document.getElementById('shViewRefNo').textContent = item.ReferenceNo || '-';
  document.getElementById('shViewCreatedAt').textContent = item.CreatedAt || '-';
  document.getElementById('shViewRemarks').textContent = item.Remarks || '-';
  openModalForm('shView', 'Stock Movement - ' + id);
}

function searchSHTable() {
  var query = document.getElementById('shSearch').value;
  shFilter.search = query;
  if (shSearchDebounce) clearTimeout(shSearchDebounce);
  shSearchDebounce = setTimeout(function() { shPage = 1; renderSHTable(); }, 300);
}

function applySHFilter() {
  shFilter.part = document.getElementById('shFilterPart').value;
  shFilter.type = document.getElementById('shFilterType').value;
  shFilter.fromDate = document.getElementById('shFilterFromDate').value;
  shFilter.toDate = document.getElementById('shFilterToDate').value;
  shPage = 1;
  renderSHTable();
}

function clearSHFilter() {
  document.getElementById('shFilterPart').value = '';
  document.getElementById('shFilterType').value = '';
  document.getElementById('shFilterFromDate').value = '';
  document.getElementById('shFilterToDate').value = '';
  document.getElementById('shSearch').value = '';
  shFilter = { search: '', part: '', type: '', fromDate: '', toDate: '' };
  shPage = 1;
  renderSHTable();
}

function applySHClientFilters(data) {
  if (shFilter.search) {
    var q = shFilter.search.toLowerCase();
    data = data.filter(function(r) {
      return (r.PartCode && r.PartCode.toLowerCase().indexOf(q) > -1) ||
             (r.PartName && r.PartName.toLowerCase().indexOf(q) > -1) ||
             (r.ReferenceNo && r.ReferenceNo.toLowerCase().indexOf(q) > -1);
    });
  }
  if (shFilter.part) data = data.filter(function(r) { return r.PartCode === shFilter.part; });
  if (shFilter.type) data = data.filter(function(r) { return (r.TransactionType || '').toLowerCase() === shFilter.type.toLowerCase(); });
  if (shFilter.fromDate) {
    var from = new Date(shFilter.fromDate);
    data = data.filter(function(r) {
      var d = r.CreatedAt ? new Date(r.CreatedAt) : null;
      return d && d >= from;
    });
  }
  if (shFilter.toDate) {
    var to = new Date(shFilter.toDate);
    to.setHours(23, 59, 59, 999);
    data = data.filter(function(r) {
      var d = r.CreatedAt ? new Date(r.CreatedAt) : null;
      return d && d <= to;
    });
  }
  return data;
}

function exportSHCSV() {
  var data = applySHClientFilters(shData);
  if (!data || data.length === 0) { showToast('No data to export', 'warning'); return; }
  var headers = ['PartCode','PartName','TransactionType','Quantity','BalanceBefore','BalanceAfter','ReferenceNo','Remarks','CreatedBy','CreatedAt'];
  var csv = headers.join(',') + '\n';
  data.forEach(function(r) {
    var row = headers.map(function(h) {
      var val = r[h] !== undefined && r[h] !== null ? r[h] : '';
      val = String(val).replace(/"/g, '""');
      if (val.indexOf(',') > -1 || val.indexOf('"') > -1 || val.indexOf('\n') > -1) val = '"' + val + '"';
      return val;
    });
    csv += row.join(',') + '\n';
  });
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'StockHistory_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Export completed', 'success');
}

function exportSHPDF() {
  var data = applySHClientFilters(shData);
  if (!data || data.length === 0) { showToast('No data to export', 'warning'); return; }
  var html = '<html><head><style>table{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:12px}th,td{border:1px solid #ccc;padding:6px;text-align:left}th{background:#1F4E78;color:#fff}</style></head><body>';
  html += '<h2 style="text-align:center">Stock History Report</h2><p style="text-align:center">Generated: ' + new Date().toLocaleString() + '</p>';
  html += '<table><thead><tr><th>Part Code</th><th>Part Name</th><th>Type</th><th>Qty</th><th>Before</th><th>After</th><th>Reference</th></tr></thead><tbody>';
  data.forEach(function(r) {
    html += '<tr><td>' + escHtml(r.PartCode || '') + '</td><td>' + escHtml(r.PartName || '') + '</td><td>' + escHtml(r.TransactionType || '') + '</td><td>' + escHtml(String(r.Quantity || '')) + '</td><td>' + escHtml(String(r.BalanceBefore || '')) + '</td><td>' + escHtml(String(r.BalanceAfter || '')) + '</td><td>' + escHtml(r.ReferenceNo || '') + '</td></tr>';
  });
  html += '</tbody></table></body></html>';
  var blob = new Blob([html], { type: 'text/html' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'StockHistory_' + new Date().toISOString().slice(0, 10) + '.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('PDF export completed', 'success');
}

function printSH() {
  var data = applySHClientFilters(shData);
  if (!data || data.length === 0) { showToast('No data to print', 'warning'); return; }
  var html = '<html><head><style>table{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:11px}th,td{border:1px solid #000;padding:4px;text-align:left}th{background:#1F4E78;color:#fff}@media print{body{print-color-adjust:exact;-webkit-print-color-adjust:exact}}</style></head><body>';
  html += '<h2 style="text-align:center">Stock History Report</h2><p style="text-align:center">Generated: ' + new Date().toLocaleString() + '</p>';
  html += '<table><thead><tr><th>Part Code</th><th>Part Name</th><th>Type</th><th>Qty</th><th>Before</th><th>After</th><th>Reference</th></tr></thead><tbody>';
  data.forEach(function(r) {
    html += '<tr><td>' + escHtml(r.PartCode || '') + '</td><td>' + escHtml(r.PartName || '') + '</td><td>' + escHtml(r.TransactionType || '') + '</td><td>' + escHtml(String(r.Quantity || '')) + '</td><td>' + escHtml(String(r.BalanceBefore || '')) + '</td><td>' + escHtml(String(r.BalanceAfter || '')) + '</td><td>' + escHtml(r.ReferenceNo || '') + '</td></tr>';
  });
  html += '</tbody></table></body></html>';
  var w = window.open('', '', 'width=800,height=600');
  w.document.write(html);
  w.document.close();
  w.print();
}
</script>
