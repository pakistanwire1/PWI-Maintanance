<script>
(function() {
  var saved = localStorage.getItem('cmms_remember_email');
  if (saved) {
    var emailInput = document.getElementById('loginEmail');
    if (emailInput) {
      emailInput.value = saved;
      document.getElementById('loginRemember').checked = true;
    }
  }
})();

function handleLogin(e) {
  e.preventDefault();
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  var btn = document.getElementById('loginBtn');
  var errorDiv = document.getElementById('loginError');
  var remember = document.getElementById('loginRemember').checked;

  errorDiv.style.display = 'none';
  btn.disabled = true;
  btn.querySelector('.login-btn-text').textContent = 'Signing in...';
  btn.querySelector('.spinner').style.display = 'inline-block';

  if (remember) {
    localStorage.setItem('cmms_remember_email', email);
  } else {
    localStorage.removeItem('cmms_remember_email');
  }

  google.script.run
    .withSuccessHandler(function(result) {
      btn.disabled = false;
      btn.querySelector('.login-btn-text').textContent = 'Sign In';
      btn.querySelector('.spinner').style.display = 'none';
      if (result.success) {
        currentUser = result.user;
        localStorage.setItem('cmms_user', JSON.stringify(result.user));
        showApp();
      } else {
        errorDiv.textContent = result.message;
        errorDiv.style.display = 'block';
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.querySelector('.login-btn-text').textContent = 'Sign In';
      btn.querySelector('.spinner').style.display = 'none';
      errorDiv.textContent = 'Connection error. Please try again.';
      errorDiv.style.display = 'block';
    })
    .loginUser(email, password);
  return false;
}
</script>
