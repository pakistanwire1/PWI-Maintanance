<div id="qrPage" class="page">
<div class="page-content">
  <div class="page-header">
    <h2><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg> QR &amp; Barcode Center</h2>
  </div>

  <div class="qr-summary" id="qrSummaryCards">
    <div class="stat-card stat-primary"><div class="stat-inner"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg></div><div class="stat-info"><h3 id="qrStatGenerated">0</h3><p>QR Generated</p></div></div></div>
    <div class="stat-card stat-warning"><div class="stat-inner"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="stat-info"><h3 id="qrStatPending">0</h3><p>Pending</p></div></div></div>
    <div class="stat-card stat-success"><div class="stat-inner"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div><div class="stat-info"><h3 id="qrStatPrinted">0</h3><p>Labels Printed</p></div></div></div>
  </div>

  <div class="qr-controls">
    <div class="qr-tabs" id="qrModuleTabs">
      <button class="qr-tab active" data-module="Machine" onclick="switchQRModule('Machine', this)">Machines</button>
      <button class="qr-tab" data-module="Asset" onclick="switchQRModule('Asset', this)">Assets</button>
      <button class="qr-tab" data-module="Spare Part" onclick="switchQRModule('Spare Part', this)">Spare Parts</button>
    </div>
    <div class="qr-actions">
      <button class="filter-btn btn-primary" onclick="bulkGenerateQR()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg> Bulk Generate QR</button>
      <button class="filter-btn btn-success" onclick="bulkGenerateBarcode()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M2 4h2v16H2zM6 4h1v16H6zM9 4h2v16H9zM13 4h1v16h-1zM16 4h2v16h-2zM20 4h2v16h-2z"/></svg> Bulk Generate Barcode</button>
      <button class="filter-btn btn-info" onclick="showQRScanDialog()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M1 7V4a3 3 0 0 1 3-3h3M1 17v3a3 3 0 0 0 3 3h3M23 17v3a3 3 0 0 1-3 3h-3M23 7V4a3 3 0 0 0-3-3h-3"/></svg> Scan</button>
    </div>
  </div>

  <div class="qr-search-bar">
    <input type="text" id="qrSearchInput" placeholder="Search by name, code or ID..." onkeyup="filterQRTable()">
    <select id="qrStatusFilter" onchange="filterQRTable()"><option value="">All Status</option><option value="Active">Active</option><option value="Inactive">Inactive</option></select>
    <select id="qrQRFilter" onchange="filterQRTable()"><option value="">QR: All</option><option value="generated">Generated</option><option value="pending">Pending</option></select>
  </div>

  <div class="qr-table-wrap" id="qrTableWrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>ID / Code</th>
          <th>Name</th>
          <th>Department</th>
          <th>QR Code</th>
          <th>Barcode</th>
          <th>QR Generated</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="qrTableBody">
        <tr><td colspan="9" class="qr-empty">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="page-footer-actions">
    <div class="page-info" id="qrPageInfo">Showing 0 records</div>
  </div>
</div>

<div class="modal-overlay" id="qrScanModal" style="display:none" onclick="if(event.target===this)closeQRScanDialog()">
  <div class="modal-container" style="max-width:480px">
    <div class="modal-header"><h3>Scan QR / Barcode</h3><button class="modal-close" onclick="closeQRScanDialog()">&times;</button></div>
    <div class="modal-body" style="padding:20px">
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">Enter QR Code URL or Barcode Number</label>
        <input type="text" id="qrScanInput" placeholder="Scan or type QR code / barcode..." style="width:100%;padding:10px 12px;font-size:14px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:monospace" autofocus onkeydown="if(event.key==='Enter')processQRScan()">
      </div>
      <div style="display:flex;gap:8px">
        <button class="filter-btn btn-primary" onclick="processQRScan()" style="flex:1">Look Up</button>
        <button class="filter-btn btn-secondary" onclick="closeQRScanDialog()">Cancel</button>
      </div>
      <div id="qrScanResult" style="margin-top:12px"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="qrLabelModal" style="display:none" onclick="if(event.target===this)closeQRLabelDialog()">
  <div class="modal-container" style="max-width:600px">
    <div class="modal-header"><h3>Print Label</h3><button class="modal-close" onclick="closeQRLabelDialog()">&times;</button></div>
    <div class="modal-body" style="padding:20px">
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">Label Size</label>
        <select id="qrLabelSize" style="width:100%;padding:8px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px">
          <option value="50x25mm">50 × 25 mm</option>
          <option value="75x50mm" selected>75 × 50 mm</option>
          <option value="100x50mm">100 × 50 mm</option>
          <option value="A4 Multiple">A4 Multiple Labels</option>
        </select>
      </div>
      <div id="qrLabelPreview" style="display:flex;justify-content:center;padding:16px;background:#fff;border-radius:var(--radius-sm);margin-bottom:14px;min-height:120px;align-items:center;color:#999">Select label size to preview</div>
      <div style="display:flex;gap:8px">
        <button class="filter-btn btn-primary" onclick="printQRLabel()" style="flex:1"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Print</button>
        <button class="filter-btn btn-secondary" onclick="closeQRLabelDialog()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
var currentQRModule = 'Machine';
var qrModuleData = [];
var qrFilteredData = [];
var qrLabelRecordId = null;

function loadQRBarcodeData() {
  loadQRStatistics();
  loadQRModuleData('Machine');
}

function loadQRStatistics() {
  google.script.run
    .withSuccessHandler(function(stats) {
      document.getElementById('qrStatGenerated').textContent = stats.generated || 0;
      document.getElementById('qrStatPending').textContent = stats.pending || 0;
      document.getElementById('qrStatPrinted').textContent = stats.printed || 0;
    })
    .withFailureHandler(function() {})
    .getQRStatistics();
}

function loadQRModuleData(module) {
  currentQRModule = module;
  document.getElementById('qrTableBody').innerHTML = '<tr><td colspan="9" class="qr-empty">Loading...</td></tr>';
  google.script.run
    .withSuccessHandler(function(records) {
      qrModuleData = records || [];
      filterQRTable();
    })
    .withFailureHandler(function() {
      document.getElementById('qrTableBody').innerHTML = '<tr><td colspan="9" class="qr-empty">Error loading data</td></tr>';
    })
    .getQRModuleRecords(module);
}

function switchQRModule(module, btn) {
  document.querySelectorAll('.qr-tab').forEach(function(t) { t.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  document.getElementById('qrSearchInput').value = '';
  document.getElementById('qrStatusFilter').value = '';
  document.getElementById('qrQRFilter').value = '';
  loadQRModuleData(module);
}

function filterQRTable() {
  var search = (document.getElementById('qrSearchInput').value || '').toLowerCase();
  var status = document.getElementById('qrStatusFilter').value;
  var qrFilter = document.getElementById('qrQRFilter').value;
  qrFilteredData = qrModuleData.filter(function(r) {
    if (search && (r.name || '').toLowerCase().indexOf(search) === -1 && (r.id || '').toLowerCase().indexOf(search) === -1 && (r.code || '').toLowerCase().indexOf(search) === -1) return false;
    if (status && r.status !== status) return false;
    if (qrFilter === 'generated' && !r.qrCode) return false;
    if (qrFilter === 'pending' && r.qrCode) return false;
    return true;
  });
  renderQRTable();
}

function renderQRTable() {
  var tbody = document.getElementById('qrTableBody');
  if (!qrFilteredData.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="qr-empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg><br>No records found</td></tr>';
    document.getElementById('qrPageInfo').textContent = 'Showing 0 records';
    return;
  }
  var html = '';
  for (var i = 0; i < qrFilteredData.length; i++) {
    var r = qrFilteredData[i];
    var hasQR = r.qrCode ? true : false;
    var hasBarcode = r.barcode ? true : false;
    var statusBadge = r.status === 'Active' ? '<span class="badge badge-success">Active</span>' : '<span class="badge badge-danger">Inactive</span>';
    html += '<tr>';
    html += '<td>' + (i + 1) + '</td>';
    html += '<td><span class="mono">' + escapeHtml(r.code) + '</span></td>';
    html += '<td><strong>' + escapeHtml(r.name) + '</strong></td>';
    html += '<td>' + escapeHtml(r.department || '') + '</td>';
    html += '<td class="qr-cell">' + (hasQR ? '<span class="qr-check" onclick="previewQRCode(\'' + escapeHtml(r.id) + '\',\'' + escapeHtml(r.qrCode) + '\')">&#10003;</span>' : '<button class="btn-xs btn-primary" onclick="generateSingleQR(\'' + escapeHtml(r.id) + '\')">Generate</button>') + '</td>';
    html += '<td class="qr-cell">' + (hasBarcode ? '<span class="mono-sm">' + escapeHtml(r.barcode) + '</span>' : '<button class="btn-xs btn-success" onclick="generateSingleBarcode(\'' + escapeHtml(r.id) + '\')">Generate</button>') + '</td>';
    html += '<td class="muted">' + (r.qrGeneratedDate ? r.qrGeneratedDate : '-') + '</td>';
    html += '<td>' + statusBadge + '</td>';
    html += '<td class="qr-actions-cell">' +
      (hasQR ? '<button class="btn-xs btn-info" onclick="showQRLabelDialog(\'' + escapeHtml(r.id) + '\')" title="Print Label">&#128424;</button> ' : '') +
      (hasQR ? '<button class="btn-xs btn-secondary" onclick="previewQRCode(\'' + escapeHtml(r.id) + '\',\'' + escapeHtml(r.qrCode) + '\')" title="View QR">&#128065;</button>' : '') +
    '</td>';
    html += '</tr>';
  }
  tbody.innerHTML = html;
  document.getElementById('qrPageInfo').textContent = 'Showing ' + qrFilteredData.length + ' records';
}

function generateSingleQR(id) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (res) { loadQRModuleData(currentQRModule); loadQRStatistics(); showToast('QR code generated for ' + (res.name || id)); }
    })
    .withFailureHandler(function(err) { showToast('Error: ' + err.message, 'error'); })
    .generateQRCodeForRecord(currentQRModule, id);
}

function generateSingleBarcode(id) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (res) { loadQRModuleData(currentQRModule); loadQRStatistics(); showToast('Barcode generated for ' + (res.name || id)); }
    })
    .withFailureHandler(function(err) { showToast('Error: ' + err.message, 'error'); })
    .generateBarcodeForRecord(currentQRModule, id);
}

function bulkGenerateQR() {
  if (!confirm('Generate QR codes for all records in ' + currentQRModule + ' without QR codes?')) return;
  google.script.run
    .withSuccessHandler(function(results) {
      loadQRModuleData(currentQRModule);
      loadQRStatistics();
      showToast('Generated ' + results.length + ' QR codes');
    })
    .withFailureHandler(function(err) { showToast('Error: ' + err.message, 'error'); })
    .bulkGenerateQRCode(currentQRModule);
}

function bulkGenerateBarcode() {
  if (!confirm('Generate barcodes for all records in ' + currentQRModule + ' without barcodes?')) return;
  google.script.run
    .withSuccessHandler(function(results) {
      loadQRModuleData(currentQRModule);
      loadQRStatistics();
      showToast('Generated ' + results.length + ' barcodes');
    })
    .withFailureHandler(function(err) { showToast('Error: ' + err.message, 'error'); })
    .bulkGenerateBarcode(currentQRModule);
}

function previewQRCode(id, qrContent) {
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.cssText = 'display:flex;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:9999;align-items:center;justify-content:center';
  overlay.onclick = function(e) { if (e.target === overlay) document.body.removeChild(overlay); };
  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;padding:24px;border-radius:8px;text-align:center;max-width:340px';
  box.innerHTML = '<div id="qrPreviewCanvas" style="margin:0 auto 12px;width:200px;height:200px"></div><div style="color:#333;font-size:13px;margin-bottom:8px;word-break:break-all">' + escapeHtml(qrContent) + '</div><button style="padding:6px 16px;border:none;border-radius:4px;background:#6366f1;color:#fff;cursor:pointer;font-size:12px" onclick="document.body.removeChild(this.parentNode.parentNode)">Close</button>';
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  setTimeout(function() {
    if (typeof QRCode !== 'undefined') {
      new QRCode(document.getElementById('qrPreviewCanvas'), { text: qrContent, width: 200, height: 200, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
    }
  }, 100);
}

function showQRLabelDialog(id) {
  qrLabelRecordId = id;
  document.getElementById('qrLabelModal').style.display = 'flex';
  document.getElementById('qrLabelPreview').innerHTML = '<span style="color:#999">Loading preview...</span>';
  updateLabelPreview();
}

function closeQRLabelDialog() {
  document.getElementById('qrLabelModal').style.display = 'none';
  qrLabelRecordId = null;
}

function updateLabelPreview() {
  var size = document.getElementById('qrLabelSize').value;
  if (!qrLabelRecordId) return;
  google.script.run
    .withSuccessHandler(function(data) {
      if (!data) { document.getElementById('qrLabelPreview').innerHTML = '<span style="color:#999">No data</span>'; return; }
      var preview = document.getElementById('qrLabelPreview');
      var isMulti = (size === 'A4 Multiple');
      preview.innerHTML = '';
      var labelCount = isMulti ? 8 : 1;
      var container = document.createElement('div');
      container.style.cssText = isMulti ? 'display:flex;flex-wrap:wrap;gap:4px;justify-content:center' : 'display:flex;flex-direction:column;align-items:center';
      for (var i = 0; i < labelCount; i++) {
        var label = document.createElement('div');
        var w = isMulti ? '180px' : (size === '50x25mm' ? '200px' : size === '100x50mm' ? '400px' : '300px');
        var h = isMulti ? '90px' : (size === '50x25mm' ? '100px' : size === '100x50mm' ? '200px' : '200px');
        label.style.cssText = 'border:1px solid #333;padding:6px;font-family:Arial,sans-serif;width:' + w + ';height:' + h + ';display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:' + (isMulti ? '7px' : size === '50x25mm' ? '8px' : '10px') + ';background:#fff;color:#333;overflow:hidden';
        label.innerHTML = '<div style="font-weight:bold;font-size:1.2em;margin-bottom:1px;">' + escapeHtml(data.name) + '</div><div style="color:#666;margin-bottom:1px;">' + escapeHtml(data.code) + '</div><div style="color:#888;font-size:0.85em;margin-bottom:2px;">' + escapeHtml(data.department || '') + '</div><div style="font-size:0.75em;color:#999;margin-bottom:2px;">' + escapeHtml(data.module) + '</div><div id="qrLabelImg' + i + '" style="margin:2px 0;width:60px;height:60px"></div><div style="font-family:monospace;font-size:0.85em;letter-spacing:1px;color:#555">' + escapeHtml(data.barcode || '') + '</div>';
        container.appendChild(label);
        setTimeout(function(idx) {
          var el = document.getElementById('qrLabelImg' + idx);
          if (el && typeof QRCode !== 'undefined') {
            new QRCode(el, { text: data.qrContent, width: 60, height: 60, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
          }
        }, 200, i);
      }
      preview.appendChild(container);
    })
    .withFailureHandler(function() { document.getElementById('qrLabelPreview').innerHTML = '<span style="color:#999">Error loading preview</span>'; })
    .getPrintLabelData(currentQRModule, qrLabelRecordId, size);
}

document.getElementById('qrLabelSize').addEventListener('change', updateLabelPreview);

function printQRLabel() {
  var size = document.getElementById('qrLabelSize').value;
  if (!qrLabelRecordId) return;
  google.script.run
    .withSuccessHandler(function(data) {
      if (!data) { showToast('Error: No label data', 'error'); return; }
      var isMulti = (size === 'A4 Multiple');
      var labelCount = isMulti ? 8 : 1;
      var printWindow = window.open('', '_blank', 'width=800,height=600');
      var html = '<!DOCTYPE html><html><head><title>Print Label</title>';
      html += '<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>';
      html += '<style>body{margin:0;padding:10px;font-family:Arial,sans-serif}';
      html += '.label{border:1px solid #333;padding:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;';
      if (isMulti) {
        html += 'width:180px;height:90px;font-size:7px;float:left;margin:4px}';
      } else if (size === '50x25mm') {
        html += 'width:200px;height:100px;font-size:8px;margin:auto}';
      } else if (size === '100x50mm') {
        html += 'width:400px;height:200px;font-size:12px;margin:auto}';
      } else {
        html += 'width:300px;height:200px;font-size:10px;margin:auto}';
      }
      html += '.qr-wrap{margin:2px 0;display:flex;justify-content:center}';
      html += '.barcode{font-family:monospace;font-size:0.85em;letter-spacing:1px;color:#555}';
      html += '.name{font-weight:bold}';
      html += '@media print{body{margin:0;padding:5px}.label{page-break-inside:avoid;border:1px solid #000}}';
      html += '</style></head><body>';
      html += '<div style="' + (isMulti ? '' : 'display:flex;flex-direction:column;align-items:center') + '">';
      for (var i = 0; i < labelCount; i++) {
        html += '<div class="label">';
        html += '<div class="name" style="font-size:1.2em">' + escapeHtml(data.name) + '</div>';
        html += '<div style="color:#666">' + escapeHtml(data.code) + '</div>';
        html += '<div style="color:#888;font-size:0.85em">' + escapeHtml(data.department || '') + '</div>';
        if (!isMulti) html += '<div style="font-size:0.75em;color:#999">' + escapeHtml(data.module) + '</div>';
        html += '<div class="qr-wrap"><div id="qrImg' + i + '" style="width:60px;height:60px"></div></div>';
        html += '<div class="barcode">' + escapeHtml(data.barcode || '') + '</div>';
        html += '</div>';
      }
      html += '</div>';
      html += '<script>window.onload=function(){';
      html += 'var d=' + JSON.stringify(data) + ';';
      html += 'for(var i=0;i<' + labelCount + ';i++){var el=document.getElementById("qrImg"+i);if(el&&typeof QRCode!=="undefined"){new QRCode(el,{text:d.qrContent,width:60,height:60,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.H})}}';
      html += 'setTimeout(function(){window.print();window.close()},500)';
      html += '}<\/script>';
      html += '</body></html>';
      printWindow.document.write(html);
      printWindow.document.close();
      loadQRStatistics();
      showToast('Label sent to printer');
    })
    .withFailureHandler(function(err) { showToast('Error: ' + err.message, 'error'); })
    .getPrintLabelData(currentQRModule, qrLabelRecordId, size);
}

function showQRScanDialog() {
  document.getElementById('qrScanModal').style.display = 'flex';
  document.getElementById('qrScanInput').value = '';
  document.getElementById('qrScanResult').innerHTML = '';
  setTimeout(function() { document.getElementById('qrScanInput').focus(); }, 200);
}

function closeQRScanDialog() {
  document.getElementById('qrScanModal').style.display = 'none';
}

function processQRScan() {
  var input = document.getElementById('qrScanInput').value.trim();
  if (!input) { showToast('Please enter or scan a QR code / barcode', 'warning'); return; }
  var resultDiv = document.getElementById('qrScanResult');
  resultDiv.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:10px">Searching...</div>';
  google.script.run
    .withSuccessHandler(function(result) { renderQRScanResult(result, input, resultDiv); })
    .withFailureHandler(function() { resultDiv.innerHTML = '<div style="text-align:center;color:var(--danger)">Error searching record</div>'; })
    .scanQRCode(input);
}

function renderQRScanResult(result, input, resultDiv) {
  if (result) {
    buildQRScanResultUI(result, resultDiv);
    return;
  }
  google.script.run
    .withSuccessHandler(function(barcodeResult) {
      if (barcodeResult) {
        buildQRScanResultUI(barcodeResult, resultDiv);
      } else {
        resultDiv.innerHTML = '<div style="text-align:center;padding:16px;color:var(--danger)"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><br>No record found for this QR / barcode</div>';
      }
    })
    .withFailureHandler(function() { resultDiv.innerHTML = '<div style="text-align:center;color:var(--danger)">Error searching record</div>'; })
    .scanBarcode(input);
}

function buildQRScanResultUI(result, resultDiv) {
  var mod = result.module;
  var link = '';
  if (mod === 'Machine') link = "navigateTo('machines')";
  else if (mod === 'Asset') link = "navigateTo('assets')";
  else if (mod === 'Spare Part') link = "navigateTo('spareparts')";
  else if (mod === 'PM Equipment') link = "navigateTo('pm')";
  resultDiv.innerHTML = '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px">' +
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">' +
    '<div style="width:36px;height:36px;border-radius:50%;background:var(--success-bg);color:var(--success);display:flex;align-items:center;justify-content:center;font-size:18px">&#10003;</div>' +
    '<div><strong style="font-size:14px">' + escapeHtml(result.name) + '</strong><br><span style="font-size:11px;color:var(--text-muted)">' + escapeHtml(result.code) + ' | ' + escapeHtml(result.module) + '</span></div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;margin-bottom:10px">' +
    '<div><span style="color:var(--text-secondary)">Department:</span> ' + escapeHtml(result.department || '-') + '</div>' +
    '<div><span style="color:var(--text-secondary)">Status:</span> ' + escapeHtml(result.status) + '</div>' +
    '<div style="grid-column:span 2"><span style="color:var(--text-secondary)">Barcode:</span> <span class="mono">' + escapeHtml(result.barcode || '-') + '</span></div>' +
    '</div>' +
    '<button class="filter-btn btn-primary" onclick="closeQRScanDialog();' + link + '" style="width:100%">Open ' + escapeHtml(mod) + ' Record</button>' +
    '</div>';
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
</script>
