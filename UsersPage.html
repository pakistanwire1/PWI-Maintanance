<div id="usersPage" class="page">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Users Management</div>
      <div class="card-actions">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="form-control" id="usersSearchInput" placeholder="Search users..." onkeyup="usersSearchTable()">
        </div>
        <select class="form-control" id="usersRoleFilter" onchange="usersFilterTable()" style="width:140px;font-size:12.5px">
          <option value="">All Roles</option>
          <option value="Admin">Admin</option>
          <option value="Department Manager">Department Manager</option>
          <option value="Maintenance Manager">Maintenance Manager</option>
          <option value="Supervisor">Supervisor</option>
          <option value="Technician">Technician</option>
          <option value="Operator">Operator</option>
          <option value="Viewer">Viewer</option>
        </select>
        <select class="form-control" id="usersStatusFilter" onchange="usersFilterTable()" style="width:120px;font-size:12.5px">
          <option value="">All Status</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
        <button class="btn btn-secondary" onclick="usersExportExcel()" title="Export to Excel"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><path d="M10 2v11"/><path d="M6 9l4 4 4-4"/><path d="M3 15v2a1 1 0 001 1h12a1 1 0 001-1v-2"/></svg> Export</button>
        <button class="btn btn-secondary" onclick="loadUsersData()" title="Refresh"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg></button>
        <button class="btn btn-primary" onclick="usersOpenForm()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><circle cx="10" cy="10" r="9"/><path d="M10 6v8"/><path d="M6 10h8"/></svg> Add User</button>
      </div>
    </div>

    <div class="users-summary" id="usersSummaryBar">
      <div class="users-summary-item"><span class="users-summary-value" id="usersTotalCount">0</span><span class="users-summary-label">Total</span></div>
      <div class="users-summary-item"><span class="users-summary-value" id="usersActiveCount">0</span><span class="users-summary-label">Active</span></div>
      <div class="users-summary-item"><span class="users-summary-value" id="usersInactiveCount">0</span><span class="users-summary-label">Inactive</span></div>
    </div>

    <div id="usersTableContainer"></div>
  </div>
</div>

<div class="modal-overlay" id="userFormModal" style="display:none">
  <div class="modal modal-wide" style="max-width:920px">
    <div class="modal-header">
      <div class="modal-title" id="userFormModalTitle">Add User</div>
      <button class="modal-close" onclick="hideModal('userFormModal')">&times;</button>
    </div>
    <form id="userForm" onsubmit="return usersSave(event)">
      <div class="modal-body">
        <input type="hidden" name="originalEmail" id="userFormOriginalEmail">
        <div class="form-row">
          <div class="form-group">
            <label>Employee ID</label>
            <input type="text" name="EmployeeID" class="form-control" placeholder="e.g. EMP-001">
          </div>
          <div class="form-group">
            <label>Email <span class="field-required">*</span></label>
            <input type="email" name="Email" class="form-control" required id="userFormEmail">
          </div>
        </div>
        <div class="form-group">
          <label>Name <span class="field-required">*</span></label>
          <input type="text" name="Name" class="form-control" required>
        </div>
        <div class="form-row" id="userFormPasswordRow">
          <div class="form-group">
            <label>Password <span class="field-required" id="userFormPwdRequired">*</span></label>
            <input type="password" name="Password" class="form-control" id="userFormPassword" autocomplete="new-password">
          </div>
          <div class="form-group" id="userFormConfirmPwdGroup">
            <label>Confirm Password <span class="field-required" id="userFormConfirmPwdRequired">*</span></label>
            <input type="password" class="form-control" id="userFormConfirmPassword" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label>Mobile</label>
            <input type="text" name="Mobile" class="form-control" placeholder="e.g. 9876543210">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Department</label>
            <select name="Department" class="form-control" id="userFormDepartment" onchange="usersFormDeptChange()">
              <option value="">Select Department</option>
            </select>
          </div>
          <div class="form-group">
            <label>Section</label>
            <select name="Section" class="form-control" id="userFormSection">
              <option value="">Select Section</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Designation</label>
            <input type="text" name="Designation" class="form-control" placeholder="Job title / designation">
          </div>
          <div class="form-group">
            <label>Role</label>
            <select name="Role" class="form-control" id="userFormRole">
              <option value="Admin">Admin</option>
              <option value="Department Manager">Department Manager</option>
              <option value="Maintenance Manager">Maintenance Manager</option>
              <option value="Supervisor">Supervisor</option>
              <option value="Technician">Technician</option>
              <option value="Operator">Operator</option>
              <option value="Viewer">Viewer</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Status</label>
            <select name="Status" class="form-control">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--text);font-size:13px">Job Card Permissions</label>
          <div class="perm-card-grid" id="userFormPermsJobCard"></div>
        </div>
        <div class="form-group">
          <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--text);font-size:13px">Management Permissions</label>
          <div class="perm-card-grid" id="userFormPermsManagement"></div>
        </div>
        <div class="form-group">
          <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--text);font-size:13px">General Permissions</label>
          <div class="perm-card-grid" id="userFormPermsGeneral"></div>
          <small style="color:var(--text-muted);font-size:11px;display:block;margin-top:4px">System Administrator overrides all individual permissions</small>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="hideModal('userFormModal')">Cancel</button>
        <button type="submit" class="btn btn-primary"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M15 17v-5H5v5"/><path d="M5 3v4h7"/><path d="M4 3h10l3 3v10a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1z"/></svg> Save</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="resetPasswordModal" style="display:none">
  <div class="modal" style="max-width:460px">
    <div class="modal-header">
      <div class="modal-title">Reset Password</div>
      <button class="modal-close" onclick="hideModal('resetPasswordModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div style="text-align:center;padding:10px 0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;opacity:0.3;margin-bottom:12px"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <p style="color:var(--text-secondary);font-size:13px;margin-bottom:6px" id="resetPwdUserName"></p>
        <p style="color:var(--text-muted);font-size:12px;margin-bottom:16px">A temporary password will be generated. The user will need to change it on next login.</p>
        <div id="resetPwdResult" style="display:none;margin-bottom:14px">
          <div style="background:var(--bg-accent-soft);border:1px solid var(--border);border-radius:8px;padding:14px;">
            <label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px">Temporary Password</label>
            <div style="font-family:monospace;font-size:16px;font-weight:700;color:var(--primary);letter-spacing:2px;word-break:break-all" id="resetPwdGeneratedPw"></div>
            <button class="btn btn-sm btn-secondary" onclick="usersCopyPwd()" style="margin-top:8px"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" style="width:14px;height:14px"><rect x="3" y="3" width="13" height="13" rx="1"/><path d="M7 7h10v10H7z"/></svg> Copy</button>
          </div>
        </div>
        <div class="btn-group" style="justify-content:center">
          <button class="btn btn-secondary" onclick="hideModal('resetPasswordModal')">Close</button>
          <button class="btn btn-warning" id="resetPwdGenerateBtn" onclick="usersGenerateResetPwd()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" style="width:16px;height:16px"><path d="M17 10a7 7 0 01-13.5 2"/><path d="M3 10a7 7 0 0113.5-2"/><path d="M17 4v4h-4"/></svg> Generate &amp; Reset</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="viewUserModal" style="display:none">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <div class="modal-title" id="viewUserModalTitle">View User</div>
      <button class="modal-close" onclick="hideModal('viewUserModal')">&times;</button>
    </div>
    <div class="modal-body" id="viewUserModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="hideModal('viewUserModal')">Close</button>
    </div>
  </div>
</div>

<script>
var usersData = [];
var usersPage = 1;
var usersSortCol = '';
var usersSortDir = 'asc';
var USERS_PERM_GROUPS = {
  jobCard: ['CanOpenJobCard','CanStartJobCard','CanCloseJobCard','CanApproveJobCard'],
  management: ['CanManageMachines','CanManageAssets','CanManageSpareParts','CanManagePM','CanManageTechnicians','CanManageDepartments','CanManageSections','CanManageUsers','CanViewDashboard','CanViewReports','CanManageInventory'],
  general: ['IsAdmin']
};
var USERS_PERM_LABELS = {
  CanOpenJobCard:'Open Job Card', CanStartJobCard:'Start Job Card', CanCloseJobCard:'Close Job Card', CanApproveJobCard:'Approve Job Card',
  CanManageMachines:'Manage Machines', CanManageAssets:'Manage Assets', CanManageSpareParts:'Manage Spare Parts', CanManagePM:'Manage PM',
  CanManageTechnicians:'Manage Technicians', CanManageDepartments:'Manage Departments', CanManageSections:'Manage Sections', CanManageUsers:'Manage Users',
  CanViewDashboard:'View Dashboard', CanViewReports:'View Reports', CanManageInventory:'Manage Inventory',
  IsAdmin:'System Administrator'
};

function loadUsersData() {
  showLoading(true);
  google.script.run
    .withSuccessHandler(function(data) { usersData = data || []; showLoading(false); usersPage = 1; usersRenderTable(); })
    .withFailureHandler(function(err) { showLoading(false); showToast('Failed to load users: ' + (err.message || err), 'error'); })
    .getUsers();
}

function usersRenderTable() {
  var container = document.getElementById('usersTableContainer');
  var list = usersGetFilteredData();
  var total = list.length;
  var totalPages = Math.ceil(total / PAGE_SIZE) || 1;
  if (usersPage > totalPages) usersPage = totalPages;
  var start = (usersPage - 1) * PAGE_SIZE;
  var end = Math.min(start + PAGE_SIZE, total);
  var paged = list.slice(start, end);

  document.getElementById('usersTotalCount').textContent = usersData.length;
  document.getElementById('usersActiveCount').textContent = usersData.filter(function(u) { return u.Status === 'Active'; }).length;
  document.getElementById('usersInactiveCount').textContent = usersData.filter(function(u) { return u.Status !== 'Active'; }).length;

  if (!paged.length) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40" style="opacity:0.3;margin-bottom:12px"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>' +
        '<h3>No Users Found</h3>' +
        '<p>' + (usersData.length ? 'No users match the current filter.' : 'No users are registered in the system.') + '</p>' +
      '</div>';
    return;
  }

  var html = '<div class="table-container"><table class="users-table"><thead><tr>';
  var cols = [
    { key:'UserID', label:'User ID', sortable:true },
    { key:'EmployeeID', label:'Employee ID', sortable:true },
    { key:'Name', label:'Name', sortable:true },
    { key:'Email', label:'Email', sortable:true },
    { key:'Department', label:'Department', sortable:true },
    { key:'Designation', label:'Designation', sortable:true },
    { key:'Role', label:'Role', sortable:true },
    { key:'Status', label:'Status', sortable:true }
  ];
  cols.forEach(function(col) {
    var sortIndicator = '';
    if (col.sortable) {
      var isActive = usersSortCol === col.key;
      var arrow = isActive ? (usersSortDir === 'asc' ? ' &#9650;' : ' &#9660;') : ' &#9650;&#9660;';
      sortIndicator = '<span class="sort-arrow' + (isActive ? ' active' : '') + '">' + arrow + '</span>';
      html += '<th class="sortable" onclick="usersSort(\'' + col.key + '\')">' + col.label + sortIndicator + '</th>';
    } else {
      html += '<th>' + col.label + '</th>';
    }
  });
  html += '<th style="width:130px">Actions</th></tr></thead><tbody>';

  paged.forEach(function(u) {
    var roleBadgeMap = { 'Admin':'danger', 'Department Manager':'primary', 'Maintenance Manager':'warning', 'Supervisor':'info', 'Technician':'info', 'Operator':'secondary', 'Viewer':'secondary' };
    var rb = roleBadgeMap[u.Role] || 'secondary';
    var sc = u.Status === 'Active' ? 'success' : 'secondary';
    var emailSafe = (u.Email || '').replace(/'/g, "\\'");
    html += '<tr>' +
      '<td><span class="text-muted">' + escHtml(u.UserID || '') + '</span></td>' +
      '<td>' + escHtml(u.EmployeeID || '-') + '</td>' +
      '<td><strong>' + escHtml(u.Name || '') + '</strong></td>' +
      '<td>' + escHtml(u.Email || '') + '</td>' +
      '<td>' + escHtml(u.Department || '') + '</td>' +
      '<td>' + escHtml(u.Designation || '-') + '</td>' +
      '<td><span class="badge badge-' + rb + '">' + escHtml(u.Role || '') + '</span></td>' +
      '<td><span class="badge badge-' + sc + '">' + escHtml(u.Status || '') + '</span></td>' +
      '<td><div class="actions-cell">' +
        iconBtn('view', "usersView('" + emailSafe + "')", 'View') +
        iconBtn('edit', "usersEdit('" + emailSafe + "')", 'Edit') +
        '<button class="icon-btn icon-btn-warning" onclick="usersResetPwd(\'' + emailSafe + '\')" title="Reset Password"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" style="width:18px;height:18px"><rect x="3" y="11" width="14" height="7" rx="1"/><path d="M7 11V7a3 3 0 016 0v4"/></svg></button>' +
        iconBtn('trash', "usersDelete('" + emailSafe + "')", 'Delete', 'icon-btn-danger') +
      '</div></td></tr>';
  });
  html += '</tbody></table></div>';

  if (totalPages > 1) {
    html += '<div class="pagination">' +
      '<div class="pagination-info">Showing ' + (start + 1) + ' to ' + end + ' of ' + total + ' entries</div>' +
      '<div class="pagination-btns">' +
      '<button onclick="usersSetPage(' + (usersPage - 1) + ')" ' + (usersPage <= 1 ? 'disabled' : '') + '>Prev</button>';
    var maxBtns = 7;
    var halfBtns = Math.floor(maxBtns / 2);
    var fromPage = Math.max(1, usersPage - halfBtns);
    var toPage = Math.min(totalPages, fromPage + maxBtns - 1);
    if (toPage - fromPage + 1 < maxBtns) fromPage = Math.max(1, toPage - maxBtns + 1);
    for (var p = fromPage; p <= toPage; p++) {
      html += '<button class="' + (p === usersPage ? 'active' : '') + '" onclick="usersSetPage(' + p + ')">' + p + '</button>';
    }
    html += '<button onclick="usersSetPage(' + (usersPage + 1) + ')" ' + (usersPage >= totalPages ? 'disabled' : '') + '>Next</button>' +
      '</div></div>';
  }
  container.innerHTML = html;
}

function usersSetPage(page) {
  usersPage = page;
  usersRenderTable();
}

function usersSort(col) {
  if (usersSortCol === col) {
    usersSortDir = usersSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    usersSortCol = col;
    usersSortDir = 'asc';
  }
  usersData.sort(function(a, b) {
    var va = (a[col] || '').toString().toLowerCase();
    var vb = (b[col] || '').toString().toLowerCase();
    if (va < vb) return usersSortDir === 'asc' ? -1 : 1;
    if (va > vb) return usersSortDir === 'asc' ? 1 : -1;
    return 0;
  });
  usersPage = 1;
  usersRenderTable();
}

function usersGetFilteredData() {
  var query = document.getElementById('usersSearchInput').value.trim().toLowerCase();
  var roleFilter = document.getElementById('usersRoleFilter').value;
  var statusFilter = document.getElementById('usersStatusFilter').value;
  return usersData.filter(function(u) {
    if (roleFilter && u.Role !== roleFilter) return false;
    if (statusFilter && u.Status !== statusFilter) return false;
    if (query) {
      var match = (u.Name && u.Name.toLowerCase().indexOf(query) !== -1) ||
                  (u.Email && u.Email.toLowerCase().indexOf(query) !== -1) ||
                  (u.EmployeeID && u.EmployeeID.toLowerCase().indexOf(query) !== -1) ||
                  (u.Department && u.Department.toLowerCase().indexOf(query) !== -1) ||
                  (u.Designation && u.Designation.toLowerCase().indexOf(query) !== -1) ||
                  (u.UserID && u.UserID.toLowerCase().indexOf(query) !== -1) ||
                  (u.Role && u.Role.toLowerCase().indexOf(query) !== -1);
      if (!match) return false;
    }
    return true;
  });
}

function usersSearchTable() {
  usersPage = 1;
  usersRenderTable();
}

function usersFilterTable() {
  usersPage = 1;
  usersRenderTable();
}

function usersBuildPermCards() {
  var groups = [
    { id: 'userFormPermsJobCard', perms: USERS_PERM_GROUPS.jobCard },
    { id: 'userFormPermsManagement', perms: USERS_PERM_GROUPS.management },
    { id: 'userFormPermsGeneral', perms: USERS_PERM_GROUPS.general }
  ];
  groups.forEach(function(g) {
    var container = document.getElementById(g.id);
    if (!container) return;
    var html = '';
    g.perms.forEach(function(p) {
      html += '<label class="perm-card">' +
        '<input type="checkbox" name="' + p + '" value="TRUE">' +
        '<span class="perm-card-check"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="4 10 8 14 16 6"/></svg></span>' +
        '<span class="perm-card-label">' + (USERS_PERM_LABELS[p] || p) + '</span>' +
        '</label>';
    });
    container.innerHTML = html;
  });
}

function usersLoadDepts() {
  google.script.run
    .withSuccessHandler(function(data) {
      var sel = document.getElementById('userFormDepartment');
      sel.innerHTML = '<option value="">Select Department</option>';
      (data || []).forEach(function(d) {
        if (d.Status === 'Active') {
          sel.innerHTML += '<option value="' + escHtml(d.Department) + '">' + escHtml(d.Department) + '</option>';
        }
      });
    })
    .withFailureHandler(function() {})
    .getDepartmentList();
}

function usersFormDeptChange() {
  var dept = document.getElementById('userFormDepartment').value;
  var secSel = document.getElementById('userFormSection');
  secSel.innerHTML = '<option value="">Select Section</option>';
  if (!dept) return;
  google.script.run
    .withSuccessHandler(function(sections) {
      (sections || []).forEach(function(s) {
        secSel.innerHTML += '<option value="' + escHtml(s.Section) + '">' + escHtml(s.Section) + '</option>';
      });
    })
    .withFailureHandler(function() {})
    .getSectionList();
}

function usersOpenForm() {
  document.getElementById('userFormOriginalEmail').value = '';
  document.getElementById('userFormEmail').disabled = false;
  document.getElementById('userFormEmail').value = '';
  document.getElementById('userFormPassword').required = true;
  document.getElementById('userFormPwdRequired').style.display = 'inline';
  document.getElementById('userFormConfirmPwdRequired').style.display = 'inline';
  document.getElementById('userFormConfirmPwdGroup').style.display = 'block';
  resetForm('userForm');
  document.getElementById('userFormSection').innerHTML = '<option value="">Select Section</option>';
  usersBuildPermCards();
  usersLoadDepts();
  document.getElementById('userFormModalTitle').textContent = 'Add User';
  showModal('userFormModal');
}

function usersEdit(email) {
  var item = usersData.find(function(r) { return r.Email === email; });
  if (!item) return;
  document.getElementById('userFormOriginalEmail').value = email;
  document.getElementById('userFormEmail').disabled = true;
  document.getElementById('userFormPassword').required = false;
  document.getElementById('userFormPwdRequired').style.display = 'none';
  document.getElementById('userFormConfirmPwdRequired').style.display = 'none';
  document.getElementById('userFormConfirmPwdGroup').style.display = 'none';
  setFormData('userForm', item);
  document.getElementById('userFormModalTitle').textContent = 'Edit User - ' + (item.Name || email);
  usersBuildPermCards();
  USERS_PERM_GROUPS.jobCard.concat(USERS_PERM_GROUPS.management).concat(USERS_PERM_GROUPS.general).forEach(function(f) {
    var el = document.querySelector('#userForm input[name="' + f + '"]');
    if (el) {
      var val = item[f];
      el.checked = val === true || val === 'Yes' || val === 'true' || val === 'TRUE';
    }
  });
  usersLoadDepts();
  if (item.Department) {
    setTimeout(function() {
      document.getElementById('userFormDepartment').value = item.Department || '';
      usersFormDeptChange();
      setTimeout(function() {
        if (item.Section) {
          document.getElementById('userFormSection').value = item.Section || '';
        }
      }, 300);
    }, 100);
  }
  showModal('userFormModal');
}

function usersSave(e) {
  e.preventDefault();
  var data = getFormData('userForm');
  USERS_PERM_GROUPS.jobCard.concat(USERS_PERM_GROUPS.management).concat(USERS_PERM_GROUPS.general).forEach(function(f) {
    var el = document.querySelector('#userForm input[name="' + f + '"]');
    data[f] = el && el.checked ? 'TRUE' : 'FALSE';
  });
  var origEmail = document.getElementById('userFormOriginalEmail').value;

  if (!origEmail) {
    var pw = document.getElementById('userFormPassword').value;
    var cpw = document.getElementById('userFormConfirmPassword').value;
    if (pw !== cpw) {
      showToast('Passwords do not match', 'error');
      return false;
    }
  }

  showLoading(true);
  if (origEmail) {
    if (!data.Password) delete data.Password;
    google.script.run
      .withSuccessHandler(function(result) { usersData = result; showLoading(false); hideModal('userFormModal'); showToast('User updated successfully', 'success'); usersRenderTable(); })
      .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to update user', 'error'); })
      .updateUser(origEmail, data);
  } else {
    google.script.run
      .withSuccessHandler(function(result) { usersData = result; showLoading(false); hideModal('userFormModal'); showToast('User added successfully', 'success'); usersRenderTable(); })
      .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to add user', 'error'); })
      .addUser(data);
  }
}

function usersDelete(email) {
  if (currentUser && email === currentUser.email) { showToast('Cannot delete yourself', 'error'); return; }
  var item = usersData.find(function(r) { return r.Email === email; });
  showConfirm('Delete User', 'Are you sure you want to delete "' + escHtml(item ? item.Name : email) + '"? This action cannot be undone.', function() {
    showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) { usersData = result; showLoading(false); showToast('User deleted', 'success'); usersRenderTable(); })
      .withFailureHandler(function(err) { showLoading(false); showToast(err.message || 'Failed to delete user', 'error'); })
      .deleteUser(email);
  });
}

var usersResetPwdEmail = '';

function usersResetPwd(email) {
  usersResetPwdEmail = email;
  var item = usersData.find(function(r) { return r.Email === email; });
  document.getElementById('resetPwdUserName').textContent = 'Reset password for: ' + escHtml(item ? item.Name : email);
  document.getElementById('resetPwdResult').style.display = 'none';
  document.getElementById('resetPwdGeneratedPw').textContent = '';
  document.getElementById('resetPwdGenerateBtn').disabled = false;
  document.getElementById('resetPwdGenerateBtn').innerHTML = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" style="width:16px;height:16px"><path d="M17 10a7 7 0 01-13.5 2"/><path d="M3 10a7 7 0 0113.5-2"/><path d="M17 4v4h-4"/></svg> Generate &amp; Reset';
  showModal('resetPasswordModal');
}

function usersGenerateResetPwd() {
  var btn = document.getElementById('resetPwdGenerateBtn');
  btn.disabled = true;
  btn.textContent = 'Resetting...';
  google.script.run
    .withSuccessHandler(function(result) {
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" style="width:16px;height:16px"><path d="M17 10a7 7 0 01-13.5 2"/><path d="M3 10a7 7 0 0113.5-2"/><path d="M17 4v4h-4"/></svg> Generate &amp; Reset';
      if (result.success) {
        document.getElementById('resetPwdGeneratedPw').textContent = result.tempPassword;
        document.getElementById('resetPwdResult').style.display = 'block';
        showToast('Password reset successfully', 'success');
        loadUsersData();
      } else {
        showToast('Failed to reset password: ' + (result.message || 'Unknown error'), 'error');
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" style="width:16px;height:16px"><path d="M17 10a7 7 0 01-13.5 2"/><path d="M3 10a7 7 0 0113.5-2"/><path d="M17 4v4h-4"/></svg> Generate &amp; Reset';
      showToast('Failed to reset password: ' + (err.message || err), 'error');
    })
    .resetPassword(usersResetPwdEmail);
}

function usersCopyPwd() {
  var pw = document.getElementById('resetPwdGeneratedPw').textContent;
  if (!pw) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(pw).then(function() {
      showToast('Password copied to clipboard', 'success');
    }).catch(function() {
      usersFallbackCopy(pw);
    });
  } else {
    usersFallbackCopy(pw);
  }
}

function usersFallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('Password copied to clipboard', 'success');
  } catch (e) {
    showToast('Could not copy password. Please select and copy manually.', 'warning');
  }
  document.body.removeChild(ta);
}

function usersView(email) {
  var item = usersData.find(function(r) { return r.Email === email; });
  if (!item) return;
  document.getElementById('viewUserModalTitle').textContent = 'User Details - ' + escHtml(item.Name || '');
  var html = '<div class="view-user-details">';
  var fields = [
    { label:'User ID', key:'UserID' },
    { label:'Employee ID', key:'EmployeeID' },
    { label:'Name', key:'Name' },
    { label:'Email', key:'Email' },
    { label:'Mobile', key:'Mobile' },
    { label:'Department', key:'Department' },
    { label:'Section', key:'Section' },
    { label:'Designation', key:'Designation' },
    { label:'Role', key:'Role' },
    { label:'Status', key:'Status' },
    { label:'Last Login Date', key:'LastLoginDate' },
    { label:'Last Login Time', key:'LastLoginTime' },
    { label:'Created By', key:'CreatedBy' },
    { label:'Created At', key:'CreatedAt' },
    { label:'Updated By', key:'UpdatedBy' },
    { label:'Updated At', key:'UpdatedAt' }
  ];
  fields.forEach(function(f) {
    var val = item[f.key] || '-';
    html += '<div class="view-row"><span>' + f.label + '</span><strong>' + escHtml(val) + '</strong></div>';
  });
  html += '</div>';
  html += '<div style="margin-top:16px"><label style="display:block;margin-bottom:8px;font-weight:600;font-size:13px;color:var(--text)">Permissions</label><div class="perm-card-grid">';
  var allPerms = USERS_PERM_GROUPS.jobCard.concat(USERS_PERM_GROUPS.management).concat(USERS_PERM_GROUPS.general);
  allPerms.forEach(function(p) {
    var val = item[p];
    var enabled = val === true || val === 'Yes' || val === 'true' || val === 'TRUE';
    html += '<div class="perm-card perm-card-view' + (enabled ? ' perm-card-on' : ' perm-card-off') + '">' +
      '<span class="perm-card-icon">' + (enabled
        ? '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="4 10 8 14 16 6"/></svg>'
        : '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="5" x2="15" y2="15"/><line x1="15" y1="5" x2="5" y2="15"/></svg>') +
      '</span>' +
      '<span class="perm-card-label">' + (USERS_PERM_LABELS[p] || p) + '</span></div>';
  });
  html += '</div></div>';
  document.getElementById('viewUserModalBody').innerHTML = html;
  showModal('viewUserModal');
}

function usersExportExcel() {
  showLoading(true);
  google.script.run
    .withSuccessHandler(function(result) {
      showLoading(false);
      if (result.success) {
        window.open(result.url, '_blank');
        showToast('Users exported to Excel successfully', 'success');
      } else {
        showToast('Export failed', 'error');
      }
    })
    .withFailureHandler(function(err) {
      showLoading(false);
      showToast('Export failed: ' + (err.message || err), 'error');
    })
    .exportUsersToExcel();
}

document.addEventListener('DOMContentLoaded', function() {
  usersBuildPermCards();
});
</script>
