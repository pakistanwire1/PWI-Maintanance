<div id="pmhistoryPage" class="page">
  <div class="dashboard-grid" id="pmhSummaryCards" style="margin-bottom:16px">
    <div class="stat-card stat-primary">
      <div class="stat-inner">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg></div>
        <div class="stat-info"><h3 id="pmhTotalCount">0</h3><p>Total Records</p></div>
      </div>
    </div>
    <div class="stat-card stat-success">
      <div class="stat-inner">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="stat-info"><h3 id="pmhCompletedCount">0</h3><p>Completed</p></div>
      </div>
    </div>
    <div class="stat-card stat-danger">
      <div class="stat-inner">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <div class="stat-info"><h3 id="pmhOverdueCount">0</h3><p>Overdue / Missed</p></div>
      </div>
    </div>
    <div class="stat-card stat-info">
      <div class="stat-inner">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="stat-info"><h3 id="pmhThisMonth">0</h3><p>This Month</p></div>
      </div>
    </div>
  </div>

  <div class="filter-bar" id="pmhFilterBar">
    <div class="form-group">
      <label>Search</label>
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="form-control" id="pmhSearch" placeholder="Search PM history..." onkeyup="searchPMHistoryTable()">
      </div>
    </div>
    <div class="form-group">
      <label>Machine</label>
      <select class="form-control" id="pmhFilterMachine"><option value="">All Machines</option></select>
    </div>
    <div class="form-group">
      <label>Technician</label>
      <select class="form-control" id="pmhFilterTechnician"><option value="">All Technicians</option></select>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select class="form-control" id="pmhFilterStatus">
        <option value="">All Status</option>
        <option value="Completed">Completed</option>
        <option value="Overdue">Overdue</option>
        <option value="Missed">Missed</option>
        <option value="Scheduled">Scheduled</option>
        <option value="In Progress">In Progress</option>
      </select>
    </div>
    <div class="form-group" style="align-self:flex-end">
      <button class="btn btn-primary btn-sm" onclick="applyPMHFilter()">Apply</button>
      <button class="btn btn-secondary btn-sm" onclick="clearPMHFilter()">Clear</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">PM History Records</div>
      <div class="card-actions">
        <button class="btn btn-secondary" onclick="exportPMHCSV()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><path d="M10 2v11"/><path d="M6 9l4 4 4-4"/><path d="M3 15v2a1 1 0 001 1h12a1 1 0 001-1v-2"/></svg> Export Excel</button>
        <button class="btn btn-secondary" onclick="exportPMHPDF()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><path d="M6 14H4a2 2 0 01-2-2V8a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2h-2"/><path d="M6 12h8v5H6v-5z"/><path d="M6 5V3a1 1 0 011-1h6a1 1 0 011 1v2"/></svg> PDF</button>
        <button class="btn btn-secondary" onclick="printPMH()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><path d="M6 14H4a2 2 0 01-2-2V8a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2h-2"/><path d="M6 12h8v5H6v-5z"/><path d="M6 5V3a1 1 0 011-1h6a1 1 0 011 1v2"/></svg> Print</button>
        <button class="btn btn-secondary" onclick="loadPMHistoryData()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0"><path d="M17 10a7 7 0 01-13.5 2"/><path d="M3 10a7 7 0 0113.5-2"/><path d="M17 4v4h-4"/></svg> Refresh</button>
      </div>
    </div>
    <div id="pmhTableContainer"></div>
  </div>
</div>

<div class="modal-overlay" id="pmhViewModal" style="display:none">
  <div class="modal modal-wide">
    <div class="modal-header">
      <div class="modal-title" id="pmhViewTitle">PM History Details</div>
      <button class="modal-close" onclick="hideModal('pmhViewModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="view-grid">
        <div class="view-section">
          <h4>Schedule Info</h4>
          <div class="view-row"><span>PM Number</span><strong id="pmhViewPMNumber">-</strong></div>
          <div class="view-row"><span>Title</span><strong id="pmhViewTitle">-</strong></div>
          <div class="view-row"><span>Machine Name</span><strong id="pmhViewMachine">-</strong></div>
          <div class="view-row"><span>Technician</span><strong id="pmhViewTechnician">-</strong></div>
          <div class="view-row"><span>Status</span><strong id="pmhViewStatus">-</strong></div>
        </div>
        <div class="view-section">
          <h4>Dates</h4>
          <div class="view-row"><span>Completion Date</span><strong id="pmhViewCompletionDate">-</strong></div>
          <div class="view-row"><span>Next Due Date</span><strong id="pmhViewNextDue">-</strong></div>
          <div class="view-row"><span>Created At</span><strong id="pmhViewCreatedAt">-</strong></div>
          <div class="view-row"><span>Created By</span><strong id="pmhViewCreatedBy">-</strong></div>
        </div>
      </div>
      <div class="view-grid" style="margin-top:16px">
        <div class="view-section" style="grid-column:1/-1">
          <h4>Remarks</h4>
          <p id="pmhViewRemarks" style="color:var(--text);font-size:13px;line-height:1.5">-</p>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="hideModal('pmhViewModal')">Close</button>
    </div>
  </div>
</div>

<script>
var pmhData = [];
var pmhPage = 1;
var pmhFilter = { search: '', machine: '', technician: '', status: '' };
var pmhSearchDebounce = null;

function loadPMHistoryData() {
  showLoading(true);
  google.script.run
    .withSuccessHandler(function(data) {
      pmhData = data || [];
      showLoading(false);
      updatePMHSummary();
      renderPMHTable();
      loadPMHFilterSelects();
    })
    .withFailureHandler(function(err) { showLoading(false); showToast('Failed to load PM history', 'error'); })
    .getPMHistory();
}

function loadPMHFilterSelects() {
  google.script.run
    .withSuccessHandler(function(m) {
      var sel = document.getElementById('pmhFilterMachine');
      if (sel) sel.innerHTML = '<option value="">All Machines</option>';
      (m || []).forEach(function(item) { sel.innerHTML += '<option value="' + (item.MachineID || '') + '">' + escHtml(item.MachineName || '') + '</option>'; });
    })
    .withFailureHandler(function() {})
    .getMachines();
  google.script.run
    .withSuccessHandler(function(t) {
      var sel = document.getElementById('pmhFilterTechnician');
      if (sel) sel.innerHTML = '<option value="">All Technicians</option>';
      (t || []).forEach(function(item) { sel.innerHTML += '<option value="' + (item.EmployeeID || '') + '">' + escHtml(item.TechnicianName || item.Name || '') + '</option>'; });
    })
    .withFailureHandler(function() {})
    .getTechnicians();
}

function updatePMHSummary() {
  var total = pmhData.length;
  var completed = pmhData.filter(function(r) { return r.Status === 'Completed'; }).length;
  var overdue = pmhData.filter(function(r) { return r.Status === 'Overdue' || r.Status === 'Missed'; }).length;
  var now = new Date();
  var monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  var monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  var thisMonth = pmhData.filter(function(r) {
    var d = r.CompletionDate ? new Date(r.CompletionDate) : null;
    return d && d >= monthStart && d <= monthEnd;
  }).length;
  var el = document.getElementById('pmhTotalCount'); if (el) el.textContent = total;
  var el2 = document.getElementById('pmhCompletedCount'); if (el2) el2.textContent = completed;
  var el3 = document.getElementById('pmhOverdueCount'); if (el3) el3.textContent = overdue;
  var el4 = document.getElementById('pmhThisMonth'); if (el4) el4.textContent = thisMonth;
}

function renderPMHTable() {
  var data = applyPMHClientFilters(pmhData);
  var columns = [
    { key: 'PMNumber', label: 'PM No' },
    { key: 'Title', label: 'Title' },
    { key: 'MachineName', label: 'Machine' },
    { key: 'CompletionDate', label: 'Completed', date: true },
    { key: 'NextDueDate', label: 'Next Due', date: true },
    { key: 'TechnicianName', label: 'Technician' },
    { key: 'Status', label: 'Status', badge: true, badgeMap: { 'Completed': 'success', 'Scheduled': 'primary', 'Overdue': 'danger', 'In Progress': 'info', 'Missed': 'danger' } },
    { key: 'Remarks', label: 'Remarks' }
  ];
  var actions = [
    { label: 'View', icon: 'view', color: 'primary', onclick: "viewPMH('{id}')", idField: 'PMNumber' }
  ];
  renderTable(data, columns, actions, pmhPage, PAGE_SIZE, 'pmhTableContainer');
  registerPageState('pmhTableContainer', function(p) { pmhPage = p; renderPMHTable(); });
}

function viewPMH(id) {
  var item = pmhData.find(function(r) { return r.PMNumber === id; });
  if (!item) { showToast('Record not found', 'error'); return; }
  var el = document.getElementById('pmhViewPMNumber'); if (el) el.textContent = item.PMNumber || '-';
  var el2 = document.getElementById('pmhViewTitle'); if (el2) el2.textContent = item.Title || '-';
  var el3 = document.getElementById('pmhViewMachine'); if (el3) el3.textContent = item.MachineName || '-';
  var el4 = document.getElementById('pmhViewTechnician'); if (el4) el4.textContent = item.TechnicianName || item.AssignedTechnicianName || '-';
  var el5 = document.getElementById('pmhViewStatus'); if (el5) el5.textContent = item.Status || '-';
  var el6 = document.getElementById('pmhViewCompletionDate'); if (el6) el6.textContent = item.CompletionDate || '-';
  var el7 = document.getElementById('pmhViewNextDue'); if (el7) el7.textContent = item.NextDueDate || '-';
  var el8 = document.getElementById('pmhViewCreatedAt'); if (el8) el8.textContent = item.CreatedAt || '-';
  var el9 = document.getElementById('pmhViewCreatedBy'); if (el9) el9.textContent = item.CreatedBy || '-';
  var el10 = document.getElementById('pmhViewRemarks'); if (el10) el10.textContent = item.Remarks || '-';
  if (el2) el2.textContent = item.Title || 'PM History Details';
  openModalForm('pmhView', 'PM History - ' + id);
}

function searchPMHistoryTable() {
  var query = document.getElementById('pmhSearch').value;
  pmhFilter.search = query;
  if (pmhSearchDebounce) clearTimeout(pmhSearchDebounce);
  pmhSearchDebounce = setTimeout(function() {
    pmhPage = 1;
    renderPMHTable();
  }, 300);
}

function applyPMHFilter() {
  pmhFilter.machine = document.getElementById('pmhFilterMachine').value;
  pmhFilter.technician = document.getElementById('pmhFilterTechnician').value;
  pmhFilter.status = document.getElementById('pmhFilterStatus').value;
  pmhPage = 1;
  renderPMHTable();
}

function clearPMHFilter() {
  var el = document.getElementById('pmhFilterMachine'); if (el) el.value = '';
  var el2 = document.getElementById('pmhFilterTechnician'); if (el2) el2.value = '';
  var el3 = document.getElementById('pmhFilterStatus'); if (el3) el3.value = '';
  var el4 = document.getElementById('pmhSearch'); if (el4) el4.value = '';
  pmhFilter = { search: '', machine: '', technician: '', status: '' };
  pmhPage = 1;
  renderPMHTable();
}

function applyPMHClientFilters(data) {
  if (pmhFilter.search) {
    var q = pmhFilter.search.toLowerCase();
    data = data.filter(function(r) {
      return (r.PMNumber && r.PMNumber.toLowerCase().indexOf(q) > -1) ||
             (r.Title && r.Title.toLowerCase().indexOf(q) > -1) ||
             (r.MachineName && r.MachineName.toLowerCase().indexOf(q) > -1) ||
             (r.TechnicianName && r.TechnicianName.toLowerCase().indexOf(q) > -1);
    });
  }
  if (pmhFilter.machine) {
    data = data.filter(function(r) { return r.MachineName === pmhFilter.machine || r.MachineID === pmhFilter.machine; });
  }
  if (pmhFilter.technician) {
    data = data.filter(function(r) { return r.TechnicianName === pmhFilter.technician || r.AssignedTechnician === pmhFilter.technician; });
  }
  if (pmhFilter.status) {
    data = data.filter(function(r) { return r.Status === pmhFilter.status; });
  }
  return data;
}

function exportPMHCSV() {
  var data = applyPMHClientFilters(pmhData);
  if (!data || data.length === 0) { showToast('No data to export', 'warning'); return; }
  var headers = ['PMNumber','Title','MachineName','CompletionDate','NextDueDate','TechnicianName','Status','Remarks','CreatedBy','CreatedAt'];
  var csv = headers.join(',') + '\n';
  data.forEach(function(r) {
    var row = headers.map(function(h) {
      var val = r[h] !== undefined && r[h] !== null ? r[h] : '';
      val = String(val).replace(/"/g, '""');
      if (val.indexOf(',') > -1 || val.indexOf('"') > -1 || val.indexOf('\n') > -1) val = '"' + val + '"';
      return val;
    });
    csv += row.join(',') + '\n';
  });
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'PMHistory_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Export completed', 'success');
}

function exportPMHPDF() {
  var data = applyPMHClientFilters(pmhData);
  if (!data || data.length === 0) { showToast('No data to export', 'warning'); return; }
  var html = '<html><head><style>table{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:12px}th,td{border:1px solid #ccc;padding:6px;text-align:left}th{background:#1F4E78;color:#fff}</style></head><body>';
  html += '<h2 style="text-align:center">PM History Report</h2><p style="text-align:center">Generated: ' + new Date().toLocaleString() + '</p>';
  html += '<table><thead><tr><th>PM No</th><th>Title</th><th>Machine</th><th>Completed</th><th>Technician</th><th>Status</th></tr></thead><tbody>';
  data.forEach(function(r) {
    html += '<tr><td>' + escHtml(r.PMNumber || '') + '</td><td>' + escHtml(r.Title || '') + '</td><td>' + escHtml(r.MachineName || '') + '</td><td>' + escHtml(r.CompletionDate || '') + '</td><td>' + escHtml(r.TechnicianName || '') + '</td><td>' + escHtml(r.Status || '') + '</td></tr>';
  });
  html += '</tbody></table></body></html>';
  var blob = new Blob([html], { type: 'text/html' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'PMHistory_' + new Date().toISOString().slice(0, 10) + '.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('PDF export completed', 'success');
}

function printPMH() {
  var data = applyPMHClientFilters(pmhData);
  if (!data || data.length === 0) { showToast('No data to print', 'warning'); return; }
  var html = '<html><head><style>table{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:11px}th,td{border:1px solid #000;padding:4px;text-align:left}th{background:#1F4E78;color:#fff}@media print{body{print-color-adjust:exact;-webkit-print-color-adjust:exact}}</style></head><body>';
  html += '<h2 style="text-align:center">PM History Report</h2><p style="text-align:center">Generated: ' + new Date().toLocaleString() + '</p>';
  html += '<table><thead><tr><th>PM No</th><th>Title</th><th>Machine</th><th>Completed</th><th>Technician</th><th>Status</th></tr></thead><tbody>';
  data.forEach(function(r) {
    html += '<tr><td>' + escHtml(r.PMNumber || '') + '</td><td>' + escHtml(r.Title || '') + '</td><td>' + escHtml(r.MachineName || '') + '</td><td>' + escHtml(r.CompletionDate || '') + '</td><td>' + escHtml(r.TechnicianName || '') + '</td><td>' + escHtml(r.Status || '') + '</td></tr>';
  });
  html += '</tbody></table></body></html>';
  var w = window.open('', '', 'width=800,height=600');
  w.document.write(html);
  w.document.close();
  w.print();
}
</script>
