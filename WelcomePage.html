<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CMMS - Welcome</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #05060a;
      color: #eef0f6;
    }
    .ws-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(25,55,109,0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 30%, rgba(99,102,241,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(25,55,109,0.20) 0%, transparent 40%),
        linear-gradient(180deg, #05060a 0%, #0a0e1a 50%, #05060a 100%);
    }
    .ws-factory {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 42%; z-index: 1;
      background:
        linear-gradient(0deg, #05060a 5%, transparent 55%),
        repeating-linear-gradient(
          90deg,
          rgba(59,130,246,0.045) 0px, rgba(59,130,246,0.045) 3px,
          transparent 3px, transparent 15px,
          rgba(25,55,109,0.035) 15px, rgba(25,55,109,0.035) 18px,
          transparent 18px, transparent 30px
        );
      mask-image: linear-gradient(0deg, #000 12%, transparent 78%);
      -webkit-mask-image: linear-gradient(0deg, #000 12%, transparent 78%);
    }
    .ws-factory::after {
      content: '';
      position: absolute; top: 20%; left: 5%; width: 90%; height: 2px;
      background: repeating-linear-gradient(
        90deg,
        rgba(59,130,246,0.06) 0px, rgba(59,130,246,0.06) 40px,
        transparent 40px, transparent 80px
      );
    }
    .ws-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
      background: radial-gradient(ellipse at center, rgba(5,6,10,0.15) 0%, rgba(5,6,10,0.75) 100%);
    }
    .ws-wrapper {
      position: relative; z-index: 3;
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%; padding: 20px;
    }
    .ws-card {
      background: rgba(10,14,30,0.55);
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 48px 56px;
      max-width: 480px; width: 100%;
      text-align: center;
      box-shadow:
        0 0 90px rgba(25,55,109,0.10),
        0 30px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: ws-in 1.2s ease-out forwards;
    }
    @keyframes ws-in {
      0% { opacity: 0; transform: translateY(24px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .ws-logo-area {
      width: 120px; height: 120px;
      margin: 0 auto 18px;
      border-radius: 20px;
      background: rgba(25,55,109,0.25);
      border: 1px solid rgba(59,130,246,0.12);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .ws-logo-area .logo-img {
      width: 100%; height: 100%;
      object-fit: contain;
      padding: 14px;
    }
    .ws-logo-area .logo-fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .ws-logo-area .logo-fallback .logo-icon {
      width: 54px; height: 54px;
      color: #3b82f6;
      filter: drop-shadow(0 0 14px rgba(59,130,246,0.20));
      animation: ws-glow 3s ease-in-out infinite;
    }
    .ws-logo-area .logo-fallback .logo-letter {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.25em;
      color: #3b82f6;
      opacity: 0.7;
    }
    @keyframes ws-glow {
      0%, 100% { filter: drop-shadow(0 0 14px rgba(59,130,246,0.20)); }
      50% { filter: drop-shadow(0 0 26px rgba(59,130,246,0.40)); }
    }

    .ws-company {
      font-size: 18px; font-weight: 700;
      color: #eef0f6;
      letter-spacing: 0.03em;
      margin-bottom: 4px;
      opacity: 0; animation: ws-up 0.6s ease-out 0.25s forwards;
    }
    .ws-division {
      font-size: 12px;
      color: #9498b8;
      font-weight: 500;
      margin-bottom: 1px;
      opacity: 0; animation: ws-up 0.6s ease-out 0.35s forwards;
    }
    .ws-division-highlight {
      color: #3b82f6;
      font-weight: 600;
    }
    .ws-title {
      font-size: 11px;
      color: #9498b8;
      letter-spacing: 0.05em;
      margin-top: 12px;
      margin-bottom: 20px;
      opacity: 0; animation: ws-up 0.6s ease-out 0.45s forwards;
    }
    .ws-sep {
      width: 50px; height: 2px;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      margin: 0 auto 18px;
      border-radius: 2px;
      opacity: 0; animation: ws-up 0.6s ease-out 0.55s forwards;
    }
    .ws-welcome {
      font-size: 36px; font-weight: 800;
      background: linear-gradient(135deg, #eef0f6 0%, #3b82f6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
      opacity: 0; animation: ws-up 0.6s ease-out 0.65s forwards;
    }
    .ws-version {
      font-size: 11px;
      color: #3b82f6;
      letter-spacing: 0.04em;
      font-weight: 500;
      margin-bottom: 24px;
      opacity: 0; animation: ws-up 0.6s ease-out 0.75s forwards;
    }
    @keyframes ws-up {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .ws-progress {
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px; overflow: hidden;
      margin-bottom: 20px;
      opacity: 0; animation: ws-fade 0.4s ease-out 1s forwards;
    }
    .ws-progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border-radius: 3px;
      transition: width 0.3s linear;
    }
    @keyframes ws-fade {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .ws-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 40px;
      background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(99,102,241,0.10));
      color: #3b82f6;
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 14px;
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.35s ease;
      opacity: 0; animation: ws-fade 0.5s ease-out 1.15s forwards;
    }
    .ws-btn:hover {
      background: linear-gradient(135deg, rgba(59,130,246,0.25), rgba(99,102,241,0.18));
      border-color: rgba(59,130,246,0.35);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(59,130,246,0.15);
    }
    .ws-btn:disabled {
      opacity: 0.5; cursor: not-allowed; transform: none;
    }
    .ws-btn svg {
      transition: transform 0.3s ease;
    }
    .ws-btn:hover:not(:disabled) svg {
      transform: translateX(3px);
    }
    .ws-error {
      font-size: 11px; color: #ef4444;
      margin-top: 12px;
      display: none;
    }
    .ws-retry-btn {
      display: none;
      margin-top: 8px;
      padding: 6px 18px;
      background: rgba(239,68,68,0.12);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .ws-retry-btn:hover {
      background: rgba(239,68,68,0.2);
    }

    @media (max-width: 520px) {
      .ws-card { padding: 32px 24px; border-radius: 18px; }
      .ws-welcome { font-size: 28px; }
      .ws-company { font-size: 15px; }
      .ws-logo-area { width: 100px; height: 100px; }
      .ws-logo-area .logo-fallback .logo-icon { width: 42px; height: 42px; }
      .ws-btn { padding: 12px 30px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="ws-bg"></div>
  <div class="ws-factory"></div>
  <div class="ws-overlay"></div>
  <div class="ws-wrapper">
    <div class="ws-card">
      <div class="ws-logo-area" id="wsLogoArea">
        <img class="logo-img" id="wsLogoImg" alt="Pakistan Wire Industries" style="display:none" onload="this.style.display='block';document.getElementById('wsLogoFallback').style.display='none'">
        <div class="logo-fallback" id="wsLogoFallback">
          <svg class="logo-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="4" y="4" width="56" height="56" rx="12" stroke="currentColor" fill="none" opacity="0.3"/>
            <path d="M20 20 L44 20 L44 28 L28 28 L28 36 L44 36 L44 44 L20 44 Z" stroke="currentColor" fill="none"/>
            <circle cx="32" cy="32" r="6" stroke="currentColor" fill="none"/>
            <path d="M32 18 L32 46 M18 32 L46 32" stroke="currentColor" stroke-width="1" opacity="0.3"/>
          </svg>
          <span class="logo-letter">PWI</span>
        </div>
      </div>
      <div class="ws-company">Pakistan Wire Industries (Pvt.) Ltd.</div>
      <div class="ws-division"><span class="ws-division-highlight">Spoke Division</span></div>
      <div class="ws-division"><span class="ws-division-highlight">Control Cable Division</span></div>
      <div class="ws-title">Computerized Maintenance Management System</div>
      <div class="ws-sep"></div>
      <div class="ws-welcome">Welcome</div>
      <div class="ws-version">Enterprise Edition 2026</div>
      <div class="ws-progress">
        <div class="ws-progress-bar" id="wsProgressBar"></div>
      </div>
      <button class="ws-btn" id="wsBtn" onclick="wsEnter()">
        ENTER CMMS
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
      <div class="ws-error" id="wsError">
        <span id="wsErrorText">Connection error. Please try again.</span>
      </div>
      <button class="ws-retry-btn" id="wsRetryBtn" onclick="wsEnter()">Retry</button>
    </div>
  </div>
  <script>
    var wsTimer = null;
    var wsLoaded = false;

    function wsEnter() {
      if (wsLoaded) return;
      wsLoaded = true;
      if (wsTimer) { clearTimeout(wsTimer); wsTimer = null; }
      var btn = document.getElementById('wsBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border:2px solid rgba(59,130,246,0.2);border-top-color:#3b82f6;border-radius:50%;display:inline-block;animation:spin 0.6s linear infinite;margin-right:6px"></span> Loading...';
      document.getElementById('wsError').style.display = 'none';
      document.getElementById('wsRetryBtn').style.display = 'none';
      google.script.run
        .withSuccessHandler(function(html) {
          if (html && html.length > 0) {
            document.open();
            document.write(html);
            document.close();
          } else {
            wsEnterFail('Received empty response');
          }
        })
        .withFailureHandler(function(err) {
          wsEnterFail(err.message || 'Connection failed');
        })
        .getAppHtml();
    }

    function wsEnterFail(msg) {
      console.error('Welcome: Failed to load app -', msg);
      var btn = document.getElementById('wsBtn');
      btn.disabled = false;
      btn.innerHTML = 'ENTER CMMS <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
      document.getElementById('wsErrorText').textContent = 'Could not connect to server: ' + (msg || 'Unknown error');
      document.getElementById('wsError').style.display = 'block';
      document.getElementById('wsRetryBtn').style.display = 'inline-block';
      wsLoaded = false;
    }

    function wsStart() {
      var bar = document.getElementById('wsProgressBar');
      if (!bar) return;
      var duration = 3000, start = Date.now();
      function tick() {
        var pct = Math.min(100, ((Date.now() - start) / duration) * 100);
        bar.style.width = pct + '%';
        if (pct >= 100) wsEnter();
        else wsTimer = setTimeout(tick, 50);
      }
      wsTimer = setTimeout(tick, 50);
    }
    wsStart();
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
